var current = 0;

function showHymn(idx) {
  current = parseInt(idx);
  document.getElementById("hymn-select").value = current;
  var container = document.getElementById("music");
  container.innerHTML = '';
  var user = {
    img_out: function(str) { container.innerHTML += str; },
    errmsg: function(msg) { console.warn("abc2svg:", msg); },
    read_file: function() { return ""; }
  };
  var abc = new abc2svg.Abc(user);
  abc.tosvg("hymn", hymns[current].abc);
}

function prev() { if (current > 0) showHymn(current - 1); }
function next() { if (current < hymns.length - 1) showHymn(current + 1); }

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') prev();
  if (e.key === 'ArrowRight') next();
});

showHymn(0);
</script>
