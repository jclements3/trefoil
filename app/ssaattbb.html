<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SSAATTBB Viewer</title>
<script src="abc2svg/abc2svg-1.js"></script>
<script src="abc2svg/snd-1.js"></script>
<script>
abc2svg.jsdir = '';
abc2svg.loadjs = function(fn, relay, onerror) {
  var s = document.createElement('script');
  s.src = fn;
  s.onload = function() { if (relay) relay(); };
  s.onerror = function() { if (onerror) onerror(fn); };
  document.head.appendChild(s);
};
</script>
<style>
body { font-family: sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
#controls {
  position: sticky; top: 0; background: #fff; padding: 8px 12px;
  border-bottom: 2px solid #999; z-index: 10;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
#hymn-select { font-size: 18px; padding: 6px; max-width: 500px; flex: 1; }
#key-filter { font-size: 18px; padding: 6px; }
button {
  font-size: 18px; padding: 8px 16px; cursor: pointer;
  border: 2px solid #666; border-radius: 6px; background: #eee;
}
button:hover { background: #ddd; }
#info { font-size: 16px; color: #444; margin-left: 10px; }
.warn { color: #e65100; font-weight: bold; }
#score-wrapper {
  overflow-x: auto; overflow-y: hidden;
  margin: 10px 20px; background: white;
}
#score {
  padding: 10px;
  min-height: 100px;
}
</style>
</head>
<body>
<div id="controls">
  <select id="key-filter">
    <option value="">All keys</option>
    <option value="Eb">Eb</option>
    <option value="Bb">Bb</option>
    <option value="F">F</option>
    <option value="C">C</option>
    <option value="G">G</option>
    <option value="D">D</option>
    <option value="A">A</option>
    <option value="E">E</option>
  </select>
  <select id="hymn-select" size="1"></select>
  <button id="play-btn" onclick="togglePlay()">Play</button>
  <button onclick="nav(-1)">Prev</button>
  <button onclick="nav(1)">Next</button>
  <span id="info"></span>
</div>
<div id="score-wrapper"><div id="score"></div></div>

<script>
var DATA = [], filtered = [], currentIdx = 0;
var abcplay = null, playing = false, currentTune = null;

function init() {
  fetch('ssaattbb_data.json?v=' + Date.now()).then(function(r) { return r.json(); }).then(function(d) {
    DATA = d;
    applyFilter();
  });
}

function applyFilter() {
  var key = document.getElementById('key-filter').value;
  filtered = key ? DATA.filter(function(h) { return h.key === key; }) : DATA.slice();
  populateSelect();
  if (filtered.length > 0) { currentIdx = 0; render(); }
}

function populateSelect() {
  var sel = document.getElementById('hymn-select');
  sel.innerHTML = '';
  filtered.forEach(function(h, i) {
    var opt = document.createElement('option');
    opt.value = i;
    opt.textContent = h.t + (h.violations > 0 ? ' *' : '');
    sel.appendChild(opt);
  });
}

function render() {
  if (filtered.length === 0) return;
  var h = filtered[currentIdx];
  document.getElementById('hymn-select').value = currentIdx;

  var scoreDiv = document.getElementById('score');
  scoreDiv.innerHTML = '';

  if (abcplay && playing) { abcplay.stop(); playing = false; updatePlayBtn(); }

  var user = {
    img_out: function(svg) { scoreDiv.innerHTML += svg; },
    errmsg: function(msg) { console.warn('abc2svg:', msg); },
    read_file: function() { return ''; },
    get_abcmodel: function(tsfirst, voice_tb, anno_type, info) {
      currentTune = [tsfirst, voice_tb, anno_type, info];
    }
  };

  var abc = new abc2svg.Abc(user);
  abc.tosvg('ssaattbb', h.abc);

  var info = 'Key: ' + h.key;
  if (h.violations > 0) {
    info += ' <span class="warn">' + h.violations + ' violation(s)</span>';
  }
  document.getElementById('info').innerHTML = info;
}

function togglePlay() {
  if (!currentTune) return;
  if (playing) {
    if (abcplay) abcplay.stop();
    playing = false;
    updatePlayBtn();
    return;
  }
  var playconf = {
    onend: function() { playing = false; updatePlayBtn(); },
    onnote: function() {},
    sfu: 'abc2svg/Scc1t2'
  };
  if (!abcplay) abcplay = AbcPlay(playconf);
  abcplay.add(currentTune[0], currentTune[1], currentTune[3]);
  abcplay.play(currentTune[0], null);
  playing = true;
  updatePlayBtn();
}

function updatePlayBtn() {
  var btn = document.getElementById('play-btn');
  btn.textContent = playing ? 'Stop' : 'Play';
  btn.style.background = playing ? '#4CAF50' : '#eee';
  btn.style.color = playing ? 'white' : 'black';
}

function nav(dir) {
  currentIdx = (currentIdx + dir + filtered.length) % filtered.length;
  render();
}

document.getElementById('hymn-select').addEventListener('change', function() {
  currentIdx = parseInt(this.value);
  render();
});
document.getElementById('key-filter').addEventListener('change', applyFilter);
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') nav(-1);
  else if (e.key === 'ArrowRight') nav(1);
});

init();
</script>
</body>
</html>
