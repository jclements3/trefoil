<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>Lead Sheets</title>
<style>
body { font-family: sans-serif; margin: 20px; background: #f8f6f1; }
#controls { margin-bottom: 10px; }
#list { max-height: 200px; overflow-y: auto; border: 1px solid #ccc; background: #fff; margin-bottom: 10px; }
.item { padding: 6px 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
.item:hover { background: #dbeafe; }
.item.active { background: #dbeafe; font-weight: bold; }
#music { margin-top: 10px; }
select { font-size: 14px; padding: 4px; }
</style>
</head><body>
<h2>Lead Sheets (Melody + Chords)</h2>
<div id="controls">
  Key: <select id="key-filter"><option value="">All</option></select>
  <input id="search" placeholder="Search..." style="font-size:14px;padding:4px;margin-left:8px;width:200px;">
</div>
<div id="list"></div>
<div id="music"></div>
<script src="app/src/main/assets/abc2svg/abc2svg-1.js"></script>
<script>
var hymns = [];
var current = -1;

fetch('lead_sheets.json').then(r=>r.json()).then(data=>{
  hymns = data;
  var keys = new Set();
  data.forEach(h => keys.add(h.key));
  var sel = document.getElementById('key-filter');
  Array.from(keys).sort().forEach(k => {
    var o = document.createElement('option'); o.value=k; o.textContent=k; sel.appendChild(o);
  });
  render_list();
});

function render_list() {
  var filt = document.getElementById('key-filter').value;
  var q = document.getElementById('search').value.toLowerCase();
  var el = document.getElementById('list');
  el.innerHTML = '';
  hymns.forEach((h,i) => {
    if (filt && h.key !== filt) return;
    if (q && h.t.toLowerCase().indexOf(q) < 0) return;
    var d = document.createElement('div');
    d.className = 'item' + (i===current?' active':'');
    d.textContent = h.t + ' (' + h.key + ')';
    d.onclick = () => show(i);
    el.appendChild(d);
  });
}

function show(i) {
  current = i;
  render_list();
  var el = document.getElementById('music');
  el.innerHTML = '';
  var user = {
    img_out: function(s){ el.innerHTML += s; },
    errmsg: function(m){ console.warn('abc2svg:',m); },
    read_file: function(){ return ''; },
    anno_start: function(){}, anno_stop: function(){},
    get_abcmodel: function(){}
  };
  var abc = new Abc(user);
  abc.tosvg('lead', hymns[i].abc);
}

document.getElementById('key-filter').onchange = render_list;
document.getElementById('search').oninput = render_list;
</script>
</body></html>
