<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chord Table Player</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DejaVu Sans', 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
h1 { font-size: 20px; text-align: center; margin-bottom: 10px; color: #8ecae6; }

.controls {
  display: flex; gap: 14px; align-items: center; justify-content: center;
  flex-wrap: wrap; margin-bottom: 12px; padding: 10px 14px;
  background: #16213e; border-radius: 8px;
}
.controls label { font-size: 13px; color: #aaa; }
.controls select, .controls input { font-size: 14px; padding: 4px 8px; border-radius: 4px; border: 1px solid #444; background: #0f3460; color: #e0e0e0; }
.controls input[type=range] { width: 100px; }
.controls button {
  padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer;
  font-size: 13px; font-weight: bold;
}
#stopBtn { background: #e74c3c; color: white; }
#playAllBtn { background: #27ae60; color: white; }

.nowplaying { text-align: center; font-size: 14px; color: #8ecae6; min-height: 22px; margin-bottom: 10px; }

table { border-collapse: collapse; margin: 0 auto; }
th { background: #2C3E50; color: white; padding: 6px 2px; font-size: 14px; text-align: center; }
th.mode-name { font-size: 11px; color: #aac; font-weight: normal; }
td { padding: 6px 2px; text-align: center; font-size: 18px; cursor: pointer;
     border: 1px solid #2a2a4a; transition: background 0.15s; }
td:hover { background: #1a3a5c; }
td.active { background: #0f3460; outline: 2px solid #8ecae6; }
td.empty { color: #555; cursor: default; }
td.empty:hover { background: none; }
tr:nth-child(even) td { background: #0d1b2a; }
tr:nth-child(even) td:hover { background: #1a3a5c; }
tr:nth-child(even) td.active { background: #0f3460; }
td.pattern-col { font-weight: bold; color: #ffd166; background: #16213e !important; cursor: pointer; padding: 6px 4px; }
td.pattern-col:hover { background: #1a3a5c !important; }

.legend { font-size: 11px; color: #888; text-align: center; margin-top: 12px; line-height: 1.6; }
</style>
</head>
<body>
<h1>Diatonic Chord Table</h1>
<div class="nowplaying" id="nowPlaying"></div>
<div class="controls">
  <label>Key
    <select id="keySelect">
      <option value="-3">Eb</option><option value="-1">Bb</option>
      <option value="5">F</option><option value="0">C</option>
      <option value="7" selected>G</option><option value="2">D</option>
      <option value="9">A</option><option value="4">E</option>
    </select>
  </label>
  <label>Octave
    <select id="octSelect">
      <option value="2">2</option><option value="3" selected>3</option>
      <option value="4">4</option><option value="5">5</option>
    </select>
  </label>
  <label>BPM <input type="range" id="bpmSlider" min="30" max="200" value="80">
    <span id="bpmVal">80</span>
  </label>
  <label><input type="checkbox" id="arpCheck" checked> Arpeggiate</label>
  <button id="playAllBtn" onclick="playAll()">Play All</button>
  <button id="stopBtn" onclick="stopPlayback()">Stop</button>
</div>

<table id="chordTable"></table>

<div class="legend">
  Click a cell to hear that voicing. Click a +intervals label to hear that row across all 7 degrees.<br>
  Click a degree column header to hear all patterns on that degree.
</div>

<script>
// Chord table data from handout_chord_table.tex
// Each row: [+intervals, [degree1_label, degree2_label, ...]]
// "—" means not valid for that degree
const ROWS = [
  ["24",  ["\u2460s2","\u2461s2","\u2014","\u2463s2","\u2464s2","\u2465s2","\u2014"]],
  ["33",  ["\u2460","\u2461","\u2462","\u2463","\u2464","\u2465","\u2466\u00b0"]],
  ["34",  ["\u2465\u00b2","\u2466\u00b0\u00b2","\u2460\u00b2","\u2461\u00b2","\u2462\u00b2","\u2463\u00b2","\u2464\u00b2"]],
  ["42",  ["\u2460s4","\u2461s4","\u2462s4","\u2014","\u2464s4","\u2465s4","\u2014"]],
  ["43",  ["\u2463\u00b9","\u2464\u00b9","\u2465\u00b9","\u2466\u00b0\u00b9","\u2460\u00b9","\u2461\u00b9","\u2462\u00b9"]],
  ["44",  ["\u2014","\u2461q","\u2462q","\u2014","\u2464q","\u2465q","\u2466q"]],
  ["233", ["\u2461m7\u00b9","\u2462m7\u00b9","\u2463\u0394\u00b9","\u2464\u2077\u00b9","\u2465m7\u00b9","\u2466\u00f87\u00b9","\u2460\u0394\u00b9"]],
  ["323", ["\u2463\u0394\u00b2","\u2464\u2077\u00b2","\u2465m7\u00b2","\u2466\u00f87\u00b2","\u2460\u0394\u00b2","\u2461m7\u00b2","\u2462m7\u00b2"]],
  ["332", ["\u24606","\u2461m6","\u2460\u0394\u00b3","\u24636","\u24646","\u2463\u0394\u00b3","\u2464\u2077\u00b3"]],
  ["333", ["\u2460\u0394","\u2461m7","\u2462m7","\u2463\u0394","\u2464\u2077","\u2465m7","\u2466\u00f87"]],
  ["334", ["\u2460+8","\u2461+8","\u2462+8","\u2463+8","\u2464+8","\u2465+8","\u2466+8"]],
  ["433", ["\u2460s4+8","\u2461s4+8","\u2014","\u2014","\u2464s4+8","\u2014","\u2014"]],
  ["434", ["\u24636\u00b9","\u24646\u00b9","\u2463\u0394\u00b3","\u2464\u2077\u00b3","\u24606\u00b9","\u2461m6\u00b9","\u2460\u0394\u00b3"]],
  ["444", ["\u2014","\u2461q7","\u2462q7","\u2014","\u2014","\u2465q7","\u2466q7"]],
];

const MODES = ["Ionian","Dorian","Phrygian","Lydian","Mixolydian","Aeolian","Locrian"];
const MAJOR_SCALE = [0, 2, 4, 5, 7, 9, 11];
const KEY_NAMES = {0:'C',2:'D','-3':'Eb',4:'E',5:'F',7:'G',9:'A','-1':'Bb'};
const NOTE_NAMES = ['C','Db','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

function midiToName(m) { return NOTE_NAMES[((m%12)+12)%12] + (Math.floor(m/12)-1); }
function midiToFreq(m) { return 440 * Math.pow(2, (m-69)/12); }

// +intervals string → diatonic degree offsets from start
// "33" → [0, 2, 4]  (root, skip 2 degrees, skip 2 more)
function intervalsToOffsets(ivs) {
  const offsets = [0];
  let acc = 0;
  for (const ch of ivs) { acc += parseInt(ch) - 1; offsets.push(acc); }
  return offsets;
}

// Compute MIDI notes for a chord: key root (semitones), degree (0-6), +intervals, octave
function chordMidi(keyRoot, degree, intervals, octave) {
  const offsets = intervalsToOffsets(intervals);
  return offsets.map(off => {
    const totalDeg = degree + off;
    const oct = octave + Math.floor(totalDeg / 7);
    const step = ((totalDeg % 7) + 7) % 7;
    return 12 * (oct + 1) + keyRoot + MAJOR_SCALE[step];
  });
}

// --- Audio ---
let audioCtx = null;
let playbackId = 0;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playNote(ctx, midi, start, dur) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.value = midiToFreq(midi);
  gain.gain.setValueAtTime(0, start);
  gain.gain.linearRampToValueAtTime(0.2, start + 0.02);
  gain.gain.setValueAtTime(0.2, start + dur * 0.8);
  gain.gain.linearRampToValueAtTime(0, start + dur);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(start); osc.stop(start + dur);
}

function scheduleChord(ctx, midis, startTime, beatDur, arp) {
  const chordDur = beatDur * (midis.length + 1);
  if (arp) {
    // Arpeggiate up, then block chord
    let t = startTime;
    for (const m of midis) {
      playNote(ctx, m, t, beatDur * 0.8);
      t += beatDur * 0.5;
    }
    // Block chord after arpeggio
    for (const m of midis) playNote(ctx, m, t, beatDur * 1.5);
    return t + beatDur * 2;
  } else {
    for (const m of midis) playNote(ctx, m, startTime, chordDur * 0.9);
    return startTime + chordDur;
  }
}

let activeCell = null;

function clearActive() {
  document.querySelectorAll('td.active').forEach(c => c.classList.remove('active'));
}

async function playCell(rowIdx, deg) {
  const row = ROWS[rowIdx];
  if (row[1][deg] === '\u2014') return; // skip empty

  stopPlayback();
  const id = ++playbackId;
  const ctx = getCtx();
  if (ctx.state === 'suspended') await ctx.resume();

  const keyRoot = parseInt(document.getElementById('keySelect').value);
  const octave = parseInt(document.getElementById('octSelect').value);
  const arp = document.getElementById('arpCheck').checked;
  const bpm = parseInt(document.getElementById('bpmSlider').value);
  const beatDur = 60 / bpm;

  const intervals = row[0];
  const midis = chordMidi(keyRoot, deg, intervals, octave);
  const names = midis.map(midiToName).join(' ');

  clearActive();
  const cell = document.getElementById(`cell-${rowIdx}-${deg}`);
  cell?.classList.add('active');

  document.getElementById('nowPlaying').textContent =
    `${row[1][deg]}  [+${intervals} on deg ${deg+1}]  ${names}`;

  const t = ctx.currentTime + 0.05;
  const end = scheduleChord(ctx, midis, t, beatDur, arp);

  setTimeout(() => {
    if (playbackId !== id) return;
    clearActive();
    document.getElementById('nowPlaying').textContent = '';
  }, (end - t) * 1000 + 200);
}

// Play all cells in a row (across 7 degrees) or all rows on one degree
async function playSequence(cells) {
  stopPlayback();
  const id = ++playbackId;
  const ctx = getCtx();
  if (ctx.state === 'suspended') await ctx.resume();

  const keyRoot = parseInt(document.getElementById('keySelect').value);
  const octave = parseInt(document.getElementById('octSelect').value);
  const arp = document.getElementById('arpCheck').checked;
  const bpm = parseInt(document.getElementById('bpmSlider').value);
  const beatDur = 60 / bpm;

  let t = ctx.currentTime + 0.05;
  const baseTime = t;

  for (const {rowIdx, deg} of cells) {
    const row = ROWS[rowIdx];
    if (row[1][deg] === '\u2014') { t += beatDur; continue; }

    const intervals = row[0];
    const midis = chordMidi(keyRoot, deg, intervals, octave);
    const names = midis.map(midiToName).join(' ');
    const label = row[1][deg];

    const ri = rowIdx, d = deg;
    setTimeout(() => {
      if (playbackId !== id) return;
      clearActive();
      const cell = document.getElementById(`cell-${ri}-${d}`);
      cell?.classList.add('active');
      document.getElementById('nowPlaying').textContent =
        `${label}  [+${intervals} on deg ${d+1}]  ${names}`;
    }, (t - baseTime) * 1000);

    t = scheduleChord(ctx, midis, t, beatDur, arp);
    t += beatDur * 1.5; // silence between chords
  }

  setTimeout(() => {
    if (playbackId !== id) return;
    clearActive();
    document.getElementById('nowPlaying').textContent = '';
  }, (t - baseTime) * 1000 + 200);
}

function playPatternRow(rowIdx) {
  const cells = [];
  for (let d = 0; d < 7; d++) cells.push({rowIdx, deg: d});
  playSequence(cells);
}

function playDegreeCol(deg) {
  const cells = [];
  for (let r = 0; r < ROWS.length; r++) cells.push({rowIdx: r, deg});
  playSequence(cells);
}

function playAll() {
  const cells = [];
  for (let r = 0; r < ROWS.length; r++) {
    for (let d = 0; d < 7; d++) cells.push({rowIdx: r, deg: d});
  }
  playSequence(cells);
}

function stopPlayback() {
  playbackId++;
  clearActive();
  document.getElementById('nowPlaying').textContent = '';
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
}

// --- Build table ---
function buildTable() {
  const table = document.getElementById('chordTable');
  let html = '<tr><th></th>';
  for (let d = 0; d < 7; d++) {
    html += `<th style="cursor:pointer" onclick="playDegreeCol(${d})">` +
            `<span class="mode-name">${MODES[d]}</span><br>${d+1}</th>`;
  }
  html += '</tr>';

  ROWS.forEach((row, ri) => {
    html += '<tr>';
    html += `<td class="pattern-col" onclick="playPatternRow(${ri})" title="Play row">+${row[0]}</td>`;
    row[1].forEach((label, d) => {
      const isEmpty = label === '\u2014';
      html += `<td id="cell-${ri}-${d}" class="${isEmpty ? 'empty' : ''}" ` +
              `onclick="${isEmpty ? '' : `playCell(${ri},${d})`}">${label}</td>`;
    });
    html += '</tr>';
  });
  table.innerHTML = html;
}

document.getElementById('bpmSlider').oninput = function() {
  document.getElementById('bpmVal').textContent = this.value;
};

buildTable();
</script>
</body>
</html>
