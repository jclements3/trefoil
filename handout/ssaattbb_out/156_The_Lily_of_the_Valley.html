s 8vb): A A/ B A/  concert: A3 A3/ Bb3 A3/ \u2014 in T1 range ok\n% T2 (written): F F/ F F/  concert: F3 \u2014 in T2 range ok\n% Bar: A, A,/ B, A,/  concert: A2 \u2014 in Baritone range ok\n% B1: F, F,/ F, F,/   concert: F2 \u2014 in B1 range ok\n[V:1] c c/ d c/ |\n[V:2] A A/ B A/ |\n[V:3] F F/ F F/ |\n[V:4] C C/ D C/ |\n[V:5] A A/ B A/ |\n[V:6] F F/ F F/ |\n[V:7] A, A,/ B, A,/ |\n[V:8] F, F,/ F, F,/ |\n%\n% Bar 2: F major\n% S1: c/ A2 F/\n% S2: A/ F2 C/  (third below)\n% A1: F/ C2 A/  (arpeggiate down chord tones)\n% A2: F/ F2 F/  (original alto, oblique)\n% T1 (written): C/ A2 F/  concert: C4 A3 F3\n% T2 (written): A,/ F2 C/ concert: A2 F2? \u2014 F2 is below T2 comfortable range. Use C/ A2 F/ wait, T2 min G2.\n%   T2 written A,/ = concert A2 ok. F2? \u2014 too low for T2. Use C/ instead: C/ A,2 C/  concert C3 A2 C3 \u2014 ok\n% Bar: F, F,/ F, A,,/ concert F2 \u2014 ok\n% B1: F,/ F,2 A,,/  concert F2 then A1 \u2014 ok\n[V:1] c/ A2 F/ |\n[V:2] A/ F2 C/ |\n[V:3] F/ C2 A/ |\n[V:4] F/ F2 F/ |\n[V:5] C/ A2 F/ |\n[V:6] C/ A,2 C/ |\n[V:7] F, F,/ F, A,,/ |\n[V:8] F,/ F,2 A,,/ |\n%\n% Bar 3: Bb and F (Bb pedal)\n% Harmony: IV - I\n% S1: G F/ F D/\n% S2: E D/ D B,/  (diatonic \u2014 E natural in F key, Bb as B,)\n% A1: C A,/ B, F/  (C-Bb-F, stepwise down, chord tones Bb)\n% A2: B, B,/ B, D/  (Bb as root, then D)\n% T1 (written): G F/ F D/  concert G3 F3 F3 D3 \u2014 T1 ok (B2-G4)\n% T2 (written): E D/ D B,/  concert E3 D3 D3 Bb2 \u2014 T2 ok (G2-E4, Bb2 = B,,2? No: B, in ABC = Bb2? In F major B = Bb. B2 = Bb2 concert. T2 min G2, so Bb2 ok)\n% Bar: B,, D,/ B,, D,/  concert Bb1 D2 \u2014 ok for Baritone (E2 min... Bb1 is below Baritone range E2!)\n%   Correct: use B,, minimum is E,, = E2 in bass clef. B,, = Bb1 \u2014 too low. Use D, D,/ B,, D,/\n%   D, = D2 concert \u2014 ok for Baritone. B,, = Bb1 \u2014 still too low.\n%   Baritone min E2. Written in bass clef: E, = E2. B,, = Bb1 \u2014 too low.\n%   Use: B,, B,,/ B,, D,/... Baritone sings Bb1? Out of range (min E2).\n% :1] C3/2 F G/ |\n[V:2] A,3/2 C E/ |\n[V:3] F3/2 A C/ |\n[V:4] F3/2 F A/ |\n[V:5] C3/2 F G/ |\n[V:6] A,3/2 C E/ |\n[V:7] A, A,/ B, C/ |\n[V:8] F, F,/ F, C,/ |\n%\n% Bar 5: F\n% Harmony: I\n% S1: A A/ A A/\n% S2: F F/ F F/  (third below)\n% A1: C C/ D C/  (passing tone D, independent)\n% A2: A, A,/ B, A,/  (inner voice, stepwise)\n% T1 (written): F F/ F F/  concert F3 \u2014 ok\n% T2 (written): D D/ D D/  concert D3 \u2014 ok\n% Bar: F, F,/ F, F,/  concert F2 \u2014 ok\n% B1: F, F,/ F, F,/  concert F2 \u2014 ok\n% Note: Bar and B1 same \u2014 allow unison at phrase mid-point (strong beat 1 only; they diverge at bar 6)\n[V:1] A A/ A A/ |\n[V:2] F F/ F F/ |\n[V:3] C C/ D C/ |\n[V:4] A, A,/ B, A,/ |\n[V:5] F F/ F F/ |\n[V:6] D D/ D D/ |\n[V:7] F, F,/ F, F,/ |\n[V:8] F, F,/ F, F,/ |\n%\n% Bar 6: F and Bb\n% Harmony: I  IV\n% S1: d c/ A F/\n% S2: B A/ F D/  (third below, diatonic Bb = B in F key)\n% A1: F F/ F A/  (oblique then up)\n% A2: D D/ C D/  (passing motion contrary to A1)\n% T1 (written): B, C/ C C/  concert Bb2 C3 C3 C3 \u2014 ok for T1\n% T2 (written): G, A,/ A, A,/  concert G2 A2 A2 A2 \u2014 ok\n% Bar: D, D,/ D, F,/  concert D2 F2 \u2014 ok\n% B1: B,, A,,/ F, A,,/  concert Bb1 Ab1?? Ab1 not in key \u2014 use B,, A,,/ F,, A,,/ \u2014 A,, = Ab1 below range\n%   Original bass: B, A,/ F, A,,/ \u2014 B, = Bb2, A, = A2, F, = F2, A,, = Ab1. Ab1 is below range AND not diatonic (Ab not in F major).\n%   In F major: A = A natural. A,, = A1 (below bass clef ledger \u2014 too low and out of range for B1 min C2)\n%   Replace: B1 uses B,, = Bb1? Min C2 for B1. Bb1 below.\n%   Use: B, A,/ F, C,/  \u2014 Bb2 A2 F2 C2 \u2014 all within B1 range (C2-A3). \u2713\n%   Actually A,, in ABC bass clef = A1 (below C2) is below range. Replace A,, with C, (C2). Stepwise: F, C,/ = F2 C2, big leap down. Or F, F,/ = oblique. Let's use:\n%   B1: B, A,/ F, F,/  \u2014 Bb2 A2 F2 F2 \u2014 all ok.\n% Bar: D, D,/ D, F,/  \u2014 D2 F2 \u2014 ok for Baritone (min E2, so D2 = below!)\n%   Baritone
