<script>
var abc_src = "X: 171\nT: Blessed Assurance\nC: Words: Fanny Crosby, 1873.\nC: Music: Phoebe P. Knapp, 1873.\nC: Arr. for SSAATTBB double choir and lever harp (D major, 2 sharps).\nC: Copyright: public domain.\nM: 9/8\nL: 1/4\n%%staves [(1 2) (3 4) (5 6) (7 8)]\nV:1 name=\"Soprano I\"  clef=treble\nV:2 name=\"Soprano II\" clef=treble\nV:3 name=\"Alto I\"     clef=treble\nV:4 name=\"Alto II\"    clef=treble\nV:5 name=\"Tenor I\"    clef=treble middle=B3 transpose=-12\nV:6 name=\"Tenor II\"   clef=treble middle=B3 transpose=-12\nV:7 name=\"Baritone\"   clef=bass\nV:8 name=\"Bass I\"     clef=bass\nK: D\n%\n% ============================================================\n% VERSE 1, PHRASE 1  (pickup + bars 1-4)\n% Texture: SSAA only (bars 1-2); full 8 voices (bars 3-4)\n% Harmonic centres: I | I  V | I | ii-V | V\n% ============================================================\n%\n% Pickup \u2014 3 eighth notes (anacrusis)\n%\n[V:1] [Q:1/4=100] F/ E/ D/ |\n[V:2]              D/ C/ D/ |\n[V:3]              A,/ A,/ F,/ |\n[V:4]              F,/ E,/ D,/ |\n[V:5]              z3/2 |\n[V:6]              z3/2 |\n[V:7]              z3/2 |\n[V:8]              z3/2 |\n%\n% Bar 1  (9/8 = 4.5 quarter counts in L:1/4)\n% S1: A A | G A B      Harmony: I \u2014 V7 (pedal)\n% S2: F F | D D E      third below S1 on chord tones\n% A1: D D | D D D      sustains I then steps\n% A2: D D | B, A, G,   steps downward in contrary motion\n% TTBB: tacet\n%\n[V:1] A3/2 A3/2 G/ A/ B/ |\n[V:2] F3/2 F3/2 D/ D/ E/ |\n[V:3] D3/2 D3/2 D/ D/ D/ |\n[V:4] D3/2 D3/2 B,/ A,/ G,/ |\n[V:5] z9/2 |\n[V:6] z9/2 |\n[V:7] z9/2 |\n[V:8] z9/2 |\n%\n% Bar 2  (9/8)\n% S1: A. | A F A        Harmony: I\n% S2: F. | F D F\n% A1: D. | D D D\n% A2: D. | D D D\n% TTBB: tacet\n%\n[V:1] A3 A/ F/ A/ |\n[V:2] F3 F/ D/ F/ |\n[V:3] D3 D/ D/ D/ |\n[V:4] D3 D/ D/ D/ |\n[V:5] z9/2 |\n[V:6] z9/2 |\n[V:7] z9/2 |\n[V:8] z9/2 |\n%\n% Bar 3  (9/8)\n% S1: d.  c  c/ B/ A/ ^G/   Harmony: ii7 \u2014 V (G# in S1 only: chromatic)\n% S2: F.  E  E/ E/ E/ E/    diatonic; E = 5th of A, 3rd of C# \u2014 use E throughout\n% A1: A   A  A/ B/ A/ A/    upper alto, diatonic neighbour motion\n% A2: D   E  D/ D/ D/ D/    lower alto, contrary to A1\n% T1: A   A  A/ A/ A/ A/    (written; sounds A2) \u2014 enters with ii7\n% T2: F   E  E/ E/ E/ E/    (written; sounds F2-E2)\n% Bar: D  E  E/ E/ E/ E/    Baritone on root/3rd of ii7\u2192V\n% B1: D,  E, E,/ E,/ E,/ E,/  Bass on root of ii7\u2192V\n%\n[V:1] d3/2 c c/ B/ A/ ^G/ |\n[V:2] F3/2 E E/ E/ E/ E/ |\n[V:3] A3/2 A A/ B/ A/ A/ |\n[V:4] D3/2 E D/ D/ D/ D/ |\n[V:5] A3/2 A A/ A/ A/ A/ |\n[V:6] F3/2 E E/ E/ E/ E/ |\n[V:7] D3/2 E E/ E/ E/ E/ |\n[V:8] D,3/2 E, E,/ E,/ E,/ E,/ |\n%\n% Bar 4  (9/8) \u2014 half bar; cadence on V (A major)\n% S1: A3            Melody holds on V\n% S2: E3            third above V root \u2014 wait, E is 5th of A; D is 4th...\n%                   use C# (3rd of A) instead \u2014 written C in K:D\n% A1: A3            fifth of A chord (unison with S1 pitch class \u2014 OK since A1\u2260S1 register)\n% A2: E3            hold; fifth of A\n% T1: A3            (sounds A2) bass of V\n% T2: E3            (sounds E2) fifth of V\n% Bar: C3           (sounds C#3) third of V (natural 3rd of A major \u2014 C# is diatonic)\n% B1: A,,3          bass root of V in low register\n%\n[V:1] A3 |\n[V:2] C3 |\n[V:3] A3 |\n[V:4] E3 |\n[V:5] A3 |\n[V:6] E3 |\n[V:7] C3 |\n[V:8] A,,3 |\n%\n% ============================================================\n% VERSE 1, PHRASE 2  (pickup + bars 5-8)\n% Texture: Full 8 voices \u2014 SSAA and TTBB antiphonal within phrase\n% Harmonic centres: I | I | IV-I6-V | I\n% ============================================================\n%\n% Pickup \u2014 3 eighth notes\n%\n[V:1] F/ E/ D/ |\n[V:2] D/ D/ D/ |\n[V:3] A,/ A,/ F,/ |\n[V:4] F,/ E,/ D,/ |\n[V:5] A/ G/ F/ |\n[V:6] F/ E/ D/ |\n[V:7] D,/ E,/ F,/ |\n[V:8] D,/ D,/ D,/ |\n%\n% Bar 5  (9/8)  \u2014 same melody as bar 1\n% S1: A A | G A B\n% S2: F F | D D E\n% A1: D D | D D D\n% A2: D D | B, A, G,\n% T1: A A | B A G   (written; sounds octave lower) \u2014 contrasts with SSAA\n% T2: F F | G F E   (written)\n% Bar: F, F, | G, F, E,  (bass clef)\n% B1: D, D, | D, D, D,\n%\n[V:1] A3/2 A3/2 G/ A/ B/ |\n[V:2] F3/2 F3/2 D/ D/ E/ |\n[V:3] D3/2 D3/2 D/ D/ D/ |\n[V:4] D3/2 D3/2 B,/ A,/ G,/ |\n[V:5] A3/2 A3/2 B/ A/ G/ |\n[V:6] F3/2 F3/2 G/ F/ E/ |\n[V:7] F,3/2 F,3/2 G,/ F,/ E,/ |\n[V:8] D,3/2 D,3/2 D,/ D,/ D,/ |\n%\n% Bar 6  (9/8)\n% S1: A. | D E F      Melody descends then rises (phrase 2 variation)\n% S2: F. | D D D      thirds below\n% A1: D. | D E F      follows S1 a third below (parallel 3rds with S1 OK here)\n%                     \u2192 avoids parallel octaves by moving together\n%          actually make A1 more independent: D. | B, C D\n% A2: D. | A, B, A,  contrary motion descending\n% T1: F. | F G A     (written; sounds F2-A2) steps upward\n% T2: D. | D E F     (written; sounds D2-F2) parallel thirds with T1\n%          better: D. | D D D  sustain\n% Bar: F,. | F, E, D,  smooth descent\n% B1: D,. | D, D, D,   sustained\n%\n[V:1] A3 D/ E/ F/ |\n[V:2] F3 D/ D/ D/ |\n[V:3] D3 B,/ C/ D/ |\n[V:4] D3 A,/ B,/ A,/ |\n[V:5] F3 F/ G/ A/ |\n[V:6] D3 D/ E/ F/ |\n[V:7] F,3 F,/ E,/ D,/ |\n[V:8] D,3 D,/ D,/ D,/ |\n%\n% Bar 7  (9/8)\n% S1: G.  E.  D/ E/ C/   Harmony: IV  I6  V  (C = C# in K:D, leading tone \u2192 D)\n% S2: E.  B,.  D/ C/ A,/  a sixth below S1 at opening, third at cadence\n% A1: B,. G,. A,/ B,/ B,/  neighbour motion, diatonic\n% A2: G,. G,. F,/ E,/ E,/  contrary motion to A1, descends\n% T1: B.  G.  A/ B/ G/   (written; sounds B2-G2) steps\n% T2: G.  E.  F/ G/ E/   (written; sounds G2-E2) a third below T1\n% Bar: G,,. E,,. F,,/ G,,/ E,,/  baritone descent\n% B1: G,,. G,,. A,,/ A,,/ A,,/  bass pedal then stepwise\n%\n[V:1] G3/2 E3/2 D/ E/ C/ |\n[V:2] E3/2 B,3/2 D/ C/ A,/ |\n[V:3] B,3/2 G,3/2 A,/ B,/ B,/ |\n[V:4] G,3/2 G,3/2 F,/ E,/ E,/ |\n[V:5] B3/2 G3/2 A/ B/ G/ |\n[V:6] G3/2 E3/2 F/ G/ E/ |\n[V:7] G,,3/2 E,,3/2 F,,/ G,,/ E,,/ |\n[V:8] G,,3/2 G,,3/2 A,,/ A,,/ A,,/ |\n%\n% Bar 8  (9/8) \u2014 cadence on I (D major)\n% S1: D3   root of I, sustained\n% S2: A,3  fifth below S1 \u2014 actually A3 (a fifth below D4) \u2014 use F# (third)\n%         S2 range A3-F5; D4 is fine but let's give A3 for a richer texture\n%         Actually S2 harmonizes a third below: D4 third below = B3; or sixth below = F3\n%         Use F# (third of D) for S2 \u2014 written F in K:D at treble: F3\n%         but F3 is at the very bottom of S2 range; use A3 (fifth of D)\n% A1: F3   third of D chord from below \u2014 A1 range F3-D5; F below middle C\n% A2: D3   root below \u2014 A2 range D3-B4; D3 is bottom of range\n% T1: A3   (written A4, sounds A3) fifth of D\n% T2: F3   (written F4, sounds F3) third of D\n% Bar: D,3  root of I in baritone register (D,= D2 in bass)\n% B1: D,,3  low D \u2014 bass root, strong cadence\n%\n[V:1] D3 |\n[V:2] A3 |\n[V:3] F3 |\n[V:4] D3 |\n[V:5] A3 |\n[V:6] F3 |\n[V:7] D,3 |\n[V:8] D,,3 |\n%\n% ============================================================\n% REFRAIN, PHRASE 1  (pickup + bars 9-12)\n% Texture: Antiphonal \u2014 SSAA answers TTBB in pairs of bars\n% Harmonic centres: I V | I | ii-V | vi (=A)\n% ============================================================\n%\n% Pickup \u2014 3 eighth notes\n%\n[V:1] A/ A/ A/ |\n[V:2] F/ F/ F/ |\n[V:3] D/ D/ D/ |\n[V:4] A,/ A,/ A,/ |\n[V:5] D/ D/ D/ |\n[V:6] A/ A/ A/ |\n[V:7] D,/ D,/ D,/ |\n[V:8] D,/ D,/ D,/ |\n%\n% Bar 9  (9/8)\n% S1: d.  A.  B/ B/ B/   Melody soars to d (D5)\n% S2: A.  F.  G/ G/ G/   third below S1\n% A1: F.  D.  D/ D/ D/   sustain chord tones\n% A2: D.  D.  B,/ B,/ B,/  root then down\n% T1: d.  A.  B/ B/ B/   (written; sounds D3-B2) \u2014 same contour as S1, octave below\n% T2: A.  F.  G/ G/ G/   (written; sounds A2-G2) third below T1\n% Bar: D,. D,. G,/ G,/ G,/  strong I \u2192 V bass\n% B1: D,. D,. G,/ G,/ G,/  parallel bass line\n%   \u2014 Bar and B1 unison: allowed at bar 9 for grounding; they diverge soon\n%\n[V:1] d3/2 A3/2 B/ B/ B/ |\n[V:2] A3/2 F3/2 G/ G/ G/ |\n[V:3] F3/2 D3/2 D/ D/ D/ |\n[V:4] D3/2 D3/2 B,/ B,/ B,/ |\n[V:5] d3/2 A3/2 B/ B/ B/ |\n[V:6] A3/2 F3/2 G/ G/ G/ |\n[V:7] D,3/2 D,3/2 G,/ G,/ G,/ |\n[V:8] D,3/2 D,3/2 G,/ G,/ G,/ |\n%\n% Bar 10  (9/8)\n% S1: A.  | A A A      Melody rests on A\n% S2: F.  | F F F      third below\n% A1: D.  | D E F      passing motion\n% A2: D.  | D D D      sustain\n% T1: A.  | A A A      (written; sounds A2) mirrors S1\n% T2: F.  | F F F      (written; sounds F2)\n% Bar: D,. | D, D, D,\n% B1: D,. | D, D, D,\n%\n[V:1] A3 A/ A/ A/ |\n[V:2] F3 F/ F/ F/ |\n[V:3] D3 D/ E/ F/ |\n[V:4] D3 D/ D/ D/ |\n[V:5] A3 A/ A/ A/ |\n[V:6] F3 F/ F/ F/ |\n[V:7] D,3 D,/ D,/ D,/ |\n[V:8] D,3 D,/ D,/ D,/ |\n%\n% Bar 11  (9/8)\n% S1: B.  d.  c/ c/ B/   Rises to climax d (D5)\n% S2: G.  A.  A/ A/ G/   third below \u2014 G# in original (^G) \u2192 replace with G (diatonic)\n% A1: G.  F.  E/ E/ E/   contrary motion to S1, descending\n% A2: E.  D.  E/ E/ D/   below A1, contrary\n% T1: B.  d.  c/ c/ B/   (written; sounds B2-B2) mirrors S1 an octave lower\n% T2: G.  A.  A/ A/ G/   (written; sounds G2-G2) third below T1\n% Bar: G,. F,. E,/ E,/ E,/  descending bass line\n% B1: G,. F,. E,/ E,/ E,/  parallel bass\n%\n[V:1] B3/2 d3/2 c/ c/ B/ |\n[V:2] G3/2 A3/2 A/ A/ G/ |\n[V:3] G3/2 F3/2 E/ E/ E/ |\n[V:4] E3/2 D3/2 E/ E/ D/ |\n[V:5] B3/2 d3/2 c/ c/ B/ |\n[V:6] G3/2 A3/2 A/ A/ G/ |\n[V:7] G,3/2 F,3/2 E,/ E,/ E,/ |\n[V:8] G,3/2 F,3/2 E,/ E,/ E,/ |\n%\n% Bar 12  (9/8) \u2014 cadence on vi/V (A major \u2014 dominant colour)\n% S1: c3   (C#5 \u2014 top of comfortable range; climax moment)\n% S2: E3   third below C# = A... use A (fifth of A chord)\n%          Or: S2 a sixth below: E (fifth of A major).\n%          Use E3 for nice open fifth with S1.\n% A1: A3   root of A major chord\n% A2: E3   fifth of A\n% T1: A3   (written A4, sounds A3) root of A\n% T2: E3   (written E4, sounds E3) fifth of A\n% Bar: A,,3  baritone low A\n% B1: A,,3  bass low A \u2014 both on root for strong V preparation\n%\n[V:1] c3 |\n[V:2] E3 |\n[V:3] A3 |\n[V:4] E3 |\n[V:5] A3 |\n[V:6] E3 |\n[V:7] A,,3 |\n[V:8] A,,3 |\n%\n% ============================================================\n% REFRAIN, PHRASE 2  (pickup + bars 13-16)\n% Texture: Full 8 voices \u2014 grand climax then stretto cadence\n% Harmonic centres: I V | I | IV I V | I\n% ============================================================\n%\n% Pickup \u2014 3 eighth notes (c d e = C#5 D5 E5 in S1 \u2014 high climax approach)\n%\n[V:1] c/ d/ e/ |\n[V:2] =G/ G/ G/ |\n[V:3] E/ E/ F/ |\n[V:4] A,/ B,/ C/ |\n[V:5] e/ f/ g/ |\n[V:6] c/ c/ c/ |\n[V:7] A,/ B,/ C/ |\n[V:8] A,/ A,/ A,/ |\n%\n% Bar 13  (9/8)\n% S1: d.  A.  B/ A/ B/    Melody: same contour as bar 9/bar 1\n% S2: G.  F.  G/ F/ G/    (=G is natural G \u2014 diatonic, G cautionary in K:D; =G used in original S1V2)\n%                          Use plain G (diatonic); no accidental needed\n% A1: B.  D.  D/ D/ E/    contrary to S2, stepwise\n% A2: G,.  A,.  G,/ F,/ G,/  lower alto, diatonic\n% T1: f.  d.  e/ d/ e/    (written f5 d5 e5; sounds F3 D3 E3) \u2014 high tenor range, climax OK\n% T2: d.  A.  B/ A/ B/    (written d4-B3; sounds D3-B2) mirrors S1\n% Bar: D,. D,. D,/ D,/ D,/   strong bass\n% B1: D,. D,. D,/ D,/ D,/\n%\n[V:1] d3/2 A3/2 B/ A/ B/ |\n[V:2] G3/2 F3/2 G/ F/ G/ |\n[V:3] B3/2 D3/2 D/ D/ E/ |\n[V:4] G,3/2 A,3/2 G,/ F,/ G,/ |\n[V:5] f3/2 d3/2 e/ d/ e/ |\n[V:6] d3/2 A3/2 B/ A/ B/ |\n[V:7] D,3/2 D,3/2 D,/ D,/ D,/ |\n[V:8] D,3/2 D,3/2 D,/ D,/ D,/ |\n%\n% Bar 14  (9/8)\n% S1: A.  | D E F       Rising arpeggio \u2014 same as bar 6 variation\n% S2: F.  | D D D\n% A1: D.  | B, C D      stepwise ascent\n% A2: D.  | A, B, A,    contrary descent\n% T1: A.  | A B c       (written; sounds A2-C3) rising\n% T2: F.  | F G A       (written; sounds F2-A2) parallel third below T1\n% Bar: F,. | F, G, A,   rising bass line\n% B1: D,. | D, D, D,    sustained root\n%\n[V:1] A3 D/ E/ F/ |\n[V:2] F3 D/ D/ D/ |\n[V:3] D3 B,/ C/ D/ |\n[V:4] D3 A,/ B,/ A,/ |\n[V:5] A3 A/ B/ c/ |\n[V:6] F3 F/ G/ A/ |\n[V:7] F,3 F,/ G,/ A,/ |\n[V:8] D,3 D,/ D,/ D,/ |\n%\n% Bar 15  (9/8)\n% S1: G.  E.  D3/4 E// C/   Final cadence: IV \u2192 I6 \u2192 V approach\n%                             D3/4 = 3/4 quarter = dotted eighth, E// = sixteenth\n% S2: E.  B,.  D3/4 C// A,/  (original inner soprano line \u2014 all diatonic in K:D)\n% A1: B,. G,.  A,3/4 B,// G,/  stepwise descent\n% A2: G,. E,.  F,3/4 E,// D,/  contrary ascent then step\n% T1: d.  B.  A3/4 B// G/   (written; sounds D3-G2) \u2014 stretto with S1\n% T2: B.  G.  F3/4 G// E/   (written; sounds B2-E2) third below T1\n% Bar: G,,. E,,. F,,3/4 G,,// E,,/  (bass)\n% B1: G,,. G,,. A,,3/4 A,,// A,,/  (bass)\n%\n[V:1] G3/2 E3/2 D3/4 E// C/ |\n[V:2] E3/2 B,3/2 D3/4 C// A,/ |\n[V:3] B,3/2 G,3/2 A,3/4 B,// G,/ |\n[V:4] G,3/2 E,3/2 F,3/4 E,// D,/ |\n[V:5] d3/2 B3/2 A3/4 B// G/ |\n[V:6] B3/2 G3/2 F3/4 G// E/ |\n[V:7] G,,3/2 E,,3/2 F,,3/4 G,,// E,,/ |\n[V:8] G,,3/2 G,,3/2 A,,3/4 A,,// A,,/ |\n%\n% Bar 16  (9/8) \u2014 final cadence on I (D major), full 8 voices\n% GRAND CADENCE: spread from D2 to D5, root-position I chord\n% S1: D3    D5 \u2014 top of comfortable range (D is 5th bar approach, D4 here seems low)\n%           actually D4 (middle D) for S1 final \u2014 not a climax ending;\n%           the piece ends at the sub-climax level since refrain bar 12 was the peak\n%           Use d (D5) for the final S1 \u2014 very high but appropriate for final cadence\n%           D5 is within S1 range (C4-A5)\n% S2: A3    A4 \u2014 fifth of I\n% A1: F3    F#4 (written F in K:D) \u2014 third of I\n% A2: D3    D4 \u2014 root of I\n% T1: A3    (written A4, sounds A3) \u2014 fifth of I\n% T2: F3    (written F4, sounds F#3) \u2014 third of I\n% Bar: D,3   D3 \u2014 root of I in baritone\n% B1: D,,3   D2 \u2014 very low, grounding root (in range C2-A3 \u2713)\n%\n[V:1] d3 |]\n[V:2] A3 |]\n[V:3] F3 |]\n[V:4] D3 |]\n[V:5] A3 |]\n[V:6] F3 |]\n[V:7] D,3 |]\n[V:8] D,,3 |]\n";
