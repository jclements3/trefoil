<h1>Christ Arose — SSAATTBB</h1>
<div id="music"></div>
<script src="../../abc2stripchart/app/src/main/assets/abc2svg/abc2svg-1.js"></script>
<script>
var abc_src = "X: 1\nT: Christ Arose\nC: Words: Robert Lowry, 1874. Music: Robert Lowry, 1874.\nC: SSAATTBB arrangement for double choir and lever harp.\nC: Lever harp: C major. Raise Eb, Bb, Ab levers (3 of 7 from Eb storage).\nS: Source: Open Hymnal Project, 2007 Revision.\nM: 4/4\nL: 1/4\nQ: 1/4=100\n%%staves [(1 2) (3 4) (5 6) (7 8)]\nV:1 name=\"Soprano I\"  clef=treble\nV:2 name=\"Soprano II\" clef=treble\nV:3 name=\"Alto I\"     clef=treble\nV:4 name=\"Alto II\"    clef=treble\nV:5 name=\"Tenor I\"    clef=treble middle=B3 transpose=-12\nV:6 name=\"Tenor II\"   clef=treble middle=B3 transpose=-12\nV:7 name=\"Baritone\"   clef=bass\nV:8 name=\"Bass I\"     clef=bass\nK: C\n%\n% ============================================================\n% VERSE \u2014 bars 1\u20138  \"Low in the grave He lay / Jesus my Saviour\"\n%\n% Texture plan:\n%   Bars 1\u20132:  SSAA choir + Bass (5 voices; TTBB silent except B1 pedal)\n%   Bars 3\u20134:  Add Baritone and Tenor I (7 voices)\n%   Bars 5\u20138:  All 8 voices\n% ============================================================\n%\n% ---- BAR 1 ----\n% S1: original soprano; S2: 3rd below; A1: alto; A2: rest\n% B1 pedal underpins from the start\n[V:1]  G2 G A |\n[V:2]  E2 E F |\n[V:3]  C2 C C |\n[V:4]  z4      |\n[V:5]  z4      |\n[V:6]  z4      |\n[V:7]  z4      |\n[V:8]  C,2 C, C, |\n%\n% ---- BAR 2 ----\n[V:1]  A G G2 |\n[V:2]  F E E2 |\n[V:3]  C C C2 |\n[V:4]  z4      |\n[V:5]  z4      |\n[V:6]  z4      |\n[V:7]  z4      |\n[V:8]  C, C, C,2 |\n%\n% ---- BAR 3 \u2014 Baritone and Tenor I enter ----\n% Original tenor: B,2 B, B, (sounding B2-B2-B2)\n% T1 written an octave up (transpose=-12): B2 B2 B2 \u2192 write B B B\n[V:1]  G2 F A |\n[V:2]  D2 D F |\n[V:3]  B,2 B, D |\n[V:4]  z4       |\n[V:5]  B2 B B   |\n[V:6]  z4       |\n[V:7]  G,2 G, G, |\n[V:8]  G,,2 G,, G,, |\n%\n% ---- BAR 4 ----\n% Original tenor: C2 C2 (sounding C3) \u2192 write c (C4 written, C3 sounding)\n[V:1]  A2 G2 |\n[V:2]  F2 E2 |\n[V:3]  D2 C2 |\n[V:4]  z4     |\n[V:5]  c2 c2  |\n[V:6]  z4     |\n[V:7]  E,2 E,2 |\n[V:8]  C,2 C,2 |\n%\n% ---- BAR 5 \u2014 all 8 voices; \"Waiting the coming day\" ----\n% S1: A B c; S2: F G A (3rd below); A1: C D E; A2: F G A (6th below S1, 3rd below A1)\n% T1 sounding C3 E3 G3 \u2192 write c e g (C4 E4 G4 written, C3 E3 G3 sounding)\n% T2 sounding A2 B2 C3 \u2192 write a b c' ... too high. Use A, B, c (A3 B3 C4 written, A2 B2 C3 snd)\n% Bar sounding F2 G2 A2 (3rd above B1) \u2192 bass clef F, G, A,\n% B1 sounding F2 G2 A2 \u2192 same as Bar \u2014 needs to be distinct.\n% B1 follows original bass F,; Bar goes to A, (3rd above).\n[V:1]  A2 B c |\n[V:2]  F2 G A |\n[V:3]  C2 D E |\n[V:4]  A,2 B, C |\n[V:5]  c2 d e  |\n[V:6]  A,2 B, c |\n[V:7]  A,2 A, A, |\n[V:8]  F,2 F, F, |\n%\n% ---- BAR 6 ----\n% S1: c G G; S2: E E E (3rd below); A1: E C C; A2: C A, A,\n% T1 sounding E3 C3 C3 \u2192 write e c c (E4 C4 C4 written)\n% T2 sounding C3 G2 G2 \u2192 write c G G (C4 G4 G4 written \u2014 G4 is high for T2; use lower G, G, G, = G3 snd)\n% Wait: G, in 8vb treble = G3 written = G2 sounding. That's the bottom of T2. Use G G = G4 written = G3 snd.\n[V:1]  c G G2 |\n[V:2]  G E E2 |\n[V:3]  E C C2 |\n[V:4]  C A, A,2 |\n[V:5]  e c c2   |\n[V:6]  G G G2   |\n[V:7]  G, G, G,2 |\n[V:8]  E, C, C,2 |\n%\n% ---- BAR 7 \u2014 S1 has ^F (raised leading tone); all others diatonic F natural ----\n% Original S2V1 tenor: C2 B, A, (sounding C3 B2 A2) \u2192 write c B A (C4 B4 A4 written, C3 B3 A3 snd)\n% That's too high for tenor; inner voice. Use c B, A, (C4 B3 A3 written, C3 B2 A2 snd) \u2713\n[V:1]  A2 G ^F |\n[V:2]  E2 D C  |\n[V:3]  C2 B, A, |\n[V:4]  A,2 G, F, |\n[V:5]  c2 B A   |\n[V:6]  A2 G F   |\n[V:7]  C,2 D, D, |\n[V:8]  C,2 D, D, |\n%\n% ---- BAR 8 \u2014 half cadence on G; phrasing breath before refrain ----\n% Original tenor: G,4 (sounding G2) \u2192 write G, (G3 written, G2 snd)\n% T2 a third below T1: E2 \u2192 write E, (E3 written, E2 snd)\n[V:1]  G4 |\n[V:2]  B,4 |\n[V:3]  G,4 |\n[V:4]  D,4 |\n[V:5]  B,4  |\n[V:6]  G,4  |\n[V:7]  G,,4  |\n[V:8]  G,,4 |\n%\n% ============================================================\n% REFRAIN \u2014 \"Up from the grave He arose!\"\n% Full 8-voice homophony; march character with dotted rhythms\n% Bars 9\u201311: first statement; bars 12\u201315: \"He arose!\"; bars 16\u201320: climax/close\n% ============================================================\n%\n% Refrain harmony plan for march figure (C E G / C E G pattern):\n%  SSAA: S1=C4-E4-G4, S2=A3-C4-E4, A1=G3-C4-E4 neighbor, A2=E3-G3-C4\n%  TTBB: T1 sounds C3-E3-G3 (write c-e-g), T2 sounds A2-C3-E3 (write A,-c-e)\n%        Bar sounds C2-E2-G2 (bass clef C,-E,-G,), B1 sounds C2 pedal (C,)\n%\n% ---- BAR 9 \"Up from the grave He arose\" ----\n[V:1]  C C3/4C// E G3/4G// |\n[V:2]  A, A,3/4A,// C E3/4E// |\n[V:3]  G, G,3/4G,// C E3/4E// |\n[V:4]  E, E,3/4E,// G, C3/4C// |\n[V:5]  c c3/4c// e g3/4g// |\n[V:6]  A, A,3/4A,// c e3/4e// |\n[V:7]  C, C,3/4C,// E, G,3/4G,// |\n[V:8]  C, C,3/4C,// C, C,3/4C,// |\n%\n% ---- BAR 10 \"with a mighty triumph o'er His foes\" ----\n% S1: c3 c3/4d//; S2: E3 E3/4F//; A1: G3 G3/4A//; A2: E3 E3/4E//\n% T1 original: G,3 G,3/4A,// (sounding G2) \u2192 write G, (kept)\n%   But rewritten to match new T1 concept: sounding G3 \u2192 write g\n% T2: sounding E3 \u2192 write e (but that's treble high); use A,3 A,3/4B,// (snd A2 \u2192 write A,... hmm)\n%   Actually in 8vb treble: write A, = A3 written = A2 sounding. For sounding E3 write E = E4 sounding E3. \u2713\n[V:1]  c3 c3/4d// |\n[V:2]  E3 E3/4F// |\n[V:3]  G3 G3/4A// |\n[V:4]  E3 E3/4E// |\n[V:5]  e3 e3/4f// |\n[V:6]  E3 E3/4F// |\n[V:7]  G, G,3/4G,// C, C,3/4C,// |\n[V:8]  C, C,3/4C,// C, C,3/4C,// |\n%\n% ---- BAR 11 \"He arose a victor from the dark domain\" ----\n% S1: e c d3/4c// B3/4A//; S2: G G A3/4G// F3/4E//\n% A1: E G F3/4E// D3/4C//; A2: C E D3/4C// B,3/4A,//\n% T1 sounding E3 C3 D3 C3 B2 A2 \u2192 write E c D c B, A,\n%   Check: e=E4 snd E3\u2713, c=C4 snd C3\u2713, D=D4 snd D3\u2713, B,=B3 snd B2\u2713, A,=A3 snd A2\u2713 \u2713\n% T2 sounding C3 E3 F3 E3 D3 C3 \u2192 write C e F E D C\n%   Check: C=C4 snd C3\u2713, e=E4 snd E3\u2713 \u2014 but T2 max comfortable is C3 sounding (write c).\n%   E4 written \u2192 E3 sounding is fine for T2 (max E4 sounding). \u2713\n[V:1]  e c d3/4c// B3/4A// |\n[V:2]  G G A3/4G// F3/4E// |\n[V:3]  E G F3/4E// D3/4C// |\n[V:4]  C E D3/4C// B,3/4A,// |\n[V:5]  e c d3/4c// B,3/4A,// |\n[V:6]  C E F3/4E// D3/4C// |\n[V:7]  C, E, F,3/4F,// F,3/4F,// |\n[V:8]  C, E, F,3/4F,// F,3/4F,// |\n%\n% ---- BAR 12 \u2014 \"and He lives forever\" ----\n% S1: G3 B3/4c//; S2: E3 D3/4E//\n% A1: C C3/4C// G G,3/4G,// (original tenor figure); A2: C, C,3/4C,// G, G,,3/4G,,// (too low for A2!)\n%   A2 minimum D3 in concert (A2 = alto II). D, in treble = D3. Fix A2 to stay above D3:\n%   A2: G, G,3/4G,// E, E,3/4E,// (G3 E3 range \u2014 fine)\n% T1 original: C C3/4C// G G,3/4G,// (sounding C3 G2) \u2192 write c C/ g G, (but G,= G3 wr \u2192 G2 snd \u2713)\n%   Actually original S2V1 bar 12: C C3/4 C// C G,3/4 G,// (sounding C3 C3 G2)\n%   T1 written (8vb transpose): c c3/4c// c G,3/4G,// \u2192 sounding C3 C3 G2 \u2014 hmm G2 is T1 minimum? T1 min B2. G2 below minimum.\n%   Fix T1: c c3/4c// c B,3/4B,// (snd C3 B2) \u2713 or c c3/4c// c g3/4g// (snd C3 G3) \u2713\n% T2: a 3rd below T1 = A2-A2-E3 \u2192 write A, A,3/4A,// A, e3/4e//\n[V:1]  G3 B3/4c// |\n[V:2]  E3 D3/4E// |\n[V:3]  C3 C3/4D// |\n[V:4]  G,3 G,3/4A,// |\n[V:5]  c c3/4c// c g3/4g// |\n[V:6]  A, A,3/4A,// A, c3/4c// |\n[V:7]  C, C,3/4C,// C, E,3/4E,// |\n[V:8]  C, C,3/4C,// C, G,,3/4G,,// |\n%\n% ---- BAR 13 \"He arose!\" ----\n% S1: d d d3/4c// d3/4e//; S2: F F F3/4E// F3/4G//\n% A1: B, B, A3/4G// A3/4B// (passing motion, diatonic); A2: G, G, F,3/4E,// F,3/4G,//\n% Original tenor S2V1: G, G, G,3/4G,// G,3/4G,// (sounding G2)\n%   T1 (8vb): write g g g3/4g// g3/4g// (snd G3) \u2014 more interesting; original had G2, I'll use G3 for fullness\n%   T2: a 3rd below T1 = E3 \u2192 write e e e3/4e// e3/4e// (snd E3)\n% Bar: G, G, G,3/4G,// G,3/4G,// (original); B1: G,, G,, G,,3/4G,,// G,,3/4G,,//\n[V:1]  d d d3/4c// d3/4e// |\n[V:2]  F F F3/4E// F3/4G// |\n[V:3]  B, B, A3/4G// A3/4B// |\n[V:4]  G, G, F,3/4E,// F,3/4G,// |\n[V:5]  g g g3/4g// g3/4g// |\n[V:6]  e e e3/4e// e3/4e// |\n[V:7]  G, G, G,3/4G,// G,3/4G,// |\n[V:8]  G,, G,, G,,3/4G,,// G,,3/4G,,// |\n%\n% ---- BAR 14 \"He arose!\" ----\n% S1: c A G G3/4G//; S2: E F E E3/4E//\n% A1: G E C C3/4C//; A2: E C A, A,3/4A,//\n% T1 original: C C C C3/4C// (sounding C3) \u2192 write c c c c3/4c//\n% T2: A, A, G, G,3/4G,// (snd A2 G2) \u2192 write A, A, G, G,3/4G,// (A3 G3 wr, A2 G2 snd \u2713)\n% Bar: original A, F, C, C,3/4C,//; B1: A, F, C, C,3/4C,// \u2014 same; differ them\n%   Bar: C, F, C, C,3/4C,// (stays on C-F-C area, 3rd above B1)\n[V:1]  c A G G3/4G// |\n[V:2]  E F E E3/4E// |\n[V:3]  G E C C3/4C// |\n[V:4]  E C A, A,3/4A,// |\n[V:5]  c c c c3/4c// |\n[V:6]  A, A, G, G,3/4G,// |\n[V:7]  A, F, C, C,3/4C,// |\n[V:8]  A, F, C, C,3/4C,// |\n%\n% ---- BAR 15 \"Hallelujah! Christ arose!\"\n% Original S1V2 had ^F here: F F ^F3/4^F// ^F3/4A//\n% All non-S1 voices: replace ^F with F natural (diatonic substitute)\n% S1: A A A3/4d// d3/4c//; S2: F F F3/4F// F3/4A// (original, now F natural throughout)\n% A1: D D D3/4D// D3/4F//; A2: F, F, D,3/4D,// D,3/4F,// (A2 minimum D3: D, = D3 fine)\n% Original tenor S2V1: C C C3/4A,// A,3/4D// (sounding C3 A2 D3)\n%   T1: write c c c3/4A,// A,3/4D// (snd C3 A2 D3) \u2713\n% T2: F, F, D,3/4D,// D,3/4F,// (snd F2 D2 F2 \u2014 T2 min G2; F2 < G2: problem)\n%   Fix T2: A, A, F,3/4F,// F,3/4A,// (snd A2 F2 \u2014 F2 still < G2 min for T2)\n%   T2 min G2: use G, G, G,3/4G,// G,3/4G,// (snd G2 throughout) \u2014 stays on G pedal; fine\n% Bar: F, F, D,3/4D,// D,3/4D,//; B1: F, F, D,3/4D,// D,3/4D,//\n%   Differ them: Bar a 3rd above B1 = use A, A, F,3/4F,// F,3/4F,//\n[V:1]  A A A3/4d// d3/4c// |\n[V:2]  F F F3/4F// F3/4A// |\n[V:3]  D D D3/4D// D3/4F// |\n[V:4]  F, F, D,3/4D,// D,3/4F,// |\n[V:5]  c c c3/4A,// A,3/4D// |\n[V:6]  G, G, G,3/4G,// G,3/4G,// |\n[V:7]  A, A, F,3/4F,// F,3/4F,// |\n[V:8]  F, F, D,3/4D,// D,3/4D,// |\n%\n% ---- BAR 16 \"Up from the grave He arose\" (climax statement) ----\n% S1: B c d G3/4G//; S2: G/F/ E F G3/4G//\n% A1: D C D E3/4E//; A2: B, A, B, C3/4C//\n% T1 sounding D3 C3 D3 E3 \u2192 write D c D E (D4 C4 D4 E4 wr, D3 C3 D3 E3 snd) \u2713\n% T2 sounding B2 A2 B2 C3 \u2192 write B, A, B, c (B3 A3 B3 C4 wr, B2 A2 B2 C3 snd) \u2713\n% Bar: original D C B, z; B1: G, A, G, z\n%   Swap so Bar is above B1: Bar = G, A, G, z; B1 = G, A, G, z \u2014 same\n%   Bar = D, C, B,, z (B,, = B1 \u2014 below Baritone range E2); fix: Bar = G, A, G, z; B1 = G,, A,, G,, z\n[V:1]  B c d G3/4G// |\n[V:2]  G/F/ E F G3/4G// |\n[V:3]  D C D E3/4E// |\n[V:4]  B, A, B, C3/4C// |\n[V:5]  D c D E3/4E// |\n[V:6]  B, A, B, c3/4c// |\n[V:7]  G, A, G, z |\n[V:8]  G,, A,, G,, z |\n%\n% ---- BAR 17 \"with a mighty triumph\" ----\n% SSAA leads; TTBB enters on beat 2 (antiphonal call-and-response)\n% S1: e3 d3/4c//; S2: G3 F3/4E//; A1: C3 B3/4A//; A2: C3 A3/4G//\n% T1-B1: z C3/4C// C z (original tenor/bass)\n%   T1: sounding z C3 C3 z \u2192 write z c3/4c// c z \u2713\n%   T2: sounding z A2 A2 z \u2192 write z A,3/4A,// A, z \u2713\n%   Bar: z C, C, z (snd z C3 C3 z); B1: z C, C, z \u2014 same; differ: Bar z E, E, z\n[V:1]  e3 d3/4c// |\n[V:2]  G3 F3/4E// |\n[V:3]  C3 B3/4A// |\n[V:4]  C3 A3/4G// |\n[V:5]  z c3/4c// c z |\n[V:6]  z A,3/4A,// A, z |\n[V:7]  z E,3/4E,// E, z |\n[V:8]  z C,3/4C,// C, z |\n%\n% ---- BAR 18 \"Victor from the dark domain\" ----\n% S1: f3 !sintro!e3/4d//; S2: A3 G3/4F//; A1: C3 C3/4B,//; A2: A,3 G,3/4F,//\n% T1 original S2V1: z C3/4C// C C3/4A,// (snd z C3 C3 A2) \u2192 write z c3/4c// c A,3/4A,//\n% T2: z A,3/4A,// A, F,3/4F,// (snd z A2 A2 F2 \u2014 F2 below T2 min G2; fix F to G)\n%   T2: z A,3/4A,// A, G,3/4G,// (snd z A2 A2 G2) \u2713\n% Bar original: z F,3/4F,// F, F,3/4F,//; B1 original: z F,,3/4F,,// F,, F,,3/4F,,//\n[V:1]  f3 !sintro!e3/4d// |\n[V:2]  A3 G3/4F// |\n[V:3]  C3 C3/4B,// |\n[V:4]  A,3 G,3/4F,// |\n[V:5]  z c3/4c// c A,3/4A,// |\n[V:6]  z A,3/4A,// A, G,3/4G,// |\n[V:7]  z F,3/4F,// F, F,3/4F,// |\n[V:8]  z F,,3/4F,,// F,, F,,3/4F,,// |\n%\n% ---- BAR 19 \"He lives forever with His saints to reign\" \u2014 stretto, all 8 voices ----\n% S1: c G e d; S2: E E G F; A1: C C C B,; A2: G, G, G, G, (pedal G3)\n% T1 original: G, C C B, (snd G2 C3 C3 B2) \u2192 write G, c c B, (G3 wr G2 snd; c=C4 wr C3 snd; B,=B3 wr B2 snd) \u2713\n% T2: E, G, G, G, (snd E2 G2 G2 G2) \u2192 write E, G, G, G, \u2713\n% Bar original: G, C, C, B,; B1: G,, G,, G,, G,,\n%   Check Bar: G, = G3, C, = C3, B, = B3 \u2014 all within Baritone range (E2-C4) \u2713\n%   But B,, = B1 \u2014 that's B1 concert (30Hz), way too low. Should be G,, = G2 \u2713\n[V:1]  c G e d |\n[V:2]  E E G F |\n[V:3]  C C C B, |\n[V:4]  G, G, G, G, |\n[V:5]  d c c B, |\n[V:6]  G, G, G, G, |\n[V:7]  G, C, C, G, |\n[V:8]  G,, G,, G,, G,, |\n%\n% ---- BAR 20 \u2014 final cadence, wide-spaced root-position C major ----\n% S1 on c (C5), B1 on C,, (C2) \u2014 maximum 3-octave spread\n% Inner voices fill in E and G across registers\n[V:1]  c4 !eintro!|]\n[V:2]  E4 |]\n[V:3]  C4 |]\n[V:4]  G,4 |]\n[V:5]  e4   |]\n[V:6]  C4   |]\n[V:7]  G,4   |]\n[V:8]  C,,4 |]\n";
var user = {
  img_out: function(str) { document.getElementById("music").innerHTML += str; },
  errmsg: function(msg) { console.warn("abc2svg:", msg); },
  read_file: function() { return ""; }
};
var abc = new abc2svg.Abc(user);
abc.tosvg("score", abc_src);
</script>
