var abc_src = "X: 1\nT: Christ Returneth\nC: Words: H. L. Turner, 1878. Music: James McGranahan, 1891.\nC: SSAATTBB arrangement. From Open Hymnal Project SATB. Public domain.\nM: none\nL: 1/4\nQ: 1/4=120\nK: D\n%%staves {(V:1 V:2) (V:3 V:4)} | {(V:5 V:6) (V:7 V:8)}\nV:1 name=\"Soprano I\"  clef=treble\nV:2 name=\"Soprano II\" clef=treble\nV:3 name=\"Alto I\"     clef=treble\nV:4 name=\"Alto II\"    clef=treble\nV:5 name=\"Tenor I\"    clef=treble middle=B3 transpose=-12\nV:6 name=\"Tenor II\"   clef=treble middle=B3 transpose=-12\nV:7 name=\"Baritone\"   clef=bass\nV:8 name=\"Bass I\"     clef=bass\n%\n% OCTAVE REFERENCE (concert pitch):\n%   ABC letter (no comma/apostrophe) = 4th octave: C=C4, D=D4 ... B=B4\n%   One comma lower: C,=C3, D,=D3 ... B,=B3\n%   Two commas:      C,,=C2 etc.\n%   One apostrophe:  c=C5, d=D5 ... (or use lowercase for 5th octave)\n%   In ABC: uppercase = octave 4, lowercase = octave 5\n%\n%   TENOR VOICES (transpose=-12): written pitch sounds one octave lower.\n%   To sound concert X, write X one octave higher.\n%     Written B  (B4)  = sounds B3   Written d  (D5)  = sounds D4\n%     Written A  (A4)  = sounds A3   Written e  (E5)  = sounds E4\n%     Written G  (G4)  = sounds G3   Written f  (F5)  = sounds F4\n%     Written F  (F4)  = sounds F3   Written g  (G5)  = sounds G4\n%     Written E  (E4)  = sounds E3\n%     Written D  (D4)  = sounds D3   (lowest practical for T1 range B2)\n%     Written C  (C4)  = sounds C3\n%\n%   BARITONE (bass clef, concert pitch):\n%     E,,=E2  A,,=A2  C,=C3  D,=D3  F,=F3  A,=A3  C=C4\n%\n%   BASS I (bass clef, concert pitch):\n%     D,,=D2  A,,=A2  B,,=B2  D,=D3  A,=A3\n%\n% =====================================================================\n% SECTION A  (Verse \u2014 first strain)\n% =====================================================================\n%\n% \u2014 Pickup and bars 1-4 (bars counted from first full measure) \u2014\n% TEXTURE: S1+S2+A1+A2 only (TTBB tacet) \u2014 reduced opening\n%\n% Original Sop:  D4 | F4 E4 D4 | A4-A4 B4\u00be A4\u00bc | F4 E4 D4 | F4 E4 (rest) E4\n% S1 = Sop exactly\n% S2 = thirds below Sop, diatonic: D4\u2192B3, F4\u2192D4, E4\u2192C4(=C#4 in D maj key \u2192 use C#? No \u2014 C in D major = C#)\n%   Wait: D major scale = D E F# G A B C# D. So \"C\" in K:D = C#4, \"D\" = D4, etc.\n%   The original S1V2 (alto) had: D4 | D4 D4 D4 | D4-D4 D4\u00be D4\u00bc | D4 D4 D4 | D4 C#4 (rest) C4\n%   Note: !accent!C in original alto = C4 natural? No \u2014 in K:D, C without accidental = C#4.\n%   The original uses explicit accidentals for naturals. \"C\" in the key of D = C# unless marked =C.\n%   So original S1V2 has C# on that accented beat. Fine \u2014 that's diatonic.\n%   The ^G (G#) in bar 7 of the second line is the only non-diatonic inner voice note.\n%\n% S2: third below S1 in D major (diatonic thirds):\n%   D4 \u2192 B3 (third below); F#4 \u2192 D4; E4 \u2192 C#4; A4 \u2192 F#4; B4 \u2192 G4; G4 \u2192 E4; C#5 \u2192 A4; d5\u2192B4\n%\n% A1: follows original alto (S1V2), which is diatonic except bar 7 (^G)\n% A2: third below A1, diatonic\n%\n[V:1] [Q:1/4=120] D | F E D | A2 B3/4 A/4 | F E D | !accent!F !accent!E z E |\n[V:2]              B, | D D B, | F2 G3/4 F/4 | D D B, | !accent!D !accent!C z C |\n[V:3]              A, | A, G, F, | D2 D3/4 D/4 | A, G, F, | !accent!A, !accent!A, z A, |\n[V:4]              F, | F, E, D, | A,2 B,3/4 A,/4 | F, E, D, | !accent!F, !accent!E, z E, |\n[V:5]              z | z z z | z2 z3/4 z/4 | z z z | z z z z |\n[V:6]              z | z z z | z2 z3/4 z/4 | z z z | z z z z |\n[V:7]              z | z z z | z2 z3/4 z/4 | z z z | z z z z |\n[V:8]              z | z z z | z2 z3/4 z/4 | z z z | z z z z |\n%\n% \u2014 Bars 5-10 (second phrase, first strain) \u2014 TTBB enters forthrightly \u2014\n% Original: Sop F4 F4 A4 | d5 e5 d5 | c5 d5 B4 | B4 A4(rest)A4 | A4 B4 c5 | d5-d5 c5\u00be d5\u00bc\n%           Alt D4 D4 E4 | F4 G4 F4 | E4 ^G4 G4 | A4 A4(rest)G4 | F4 G4 G4 | F4-F4 E4\u00be F4\u00bc\n%           Ten A3 A3 A3 | B3 A3 A3 | A3 B3 D4 | D4 C#4(rest)C#4 | D4 D4 A3 | A3-A3 A3\u00be A3\u00bc\n%           Bas D3 D3 C3 | B2 C3 D3 | E3 E3 E3 | A2 A2(rest)A2 | A3 G3 E3 | D3-D3 E3\u00be D3\u00bc\n%\n% Bar 7 alto: E4 ^G4(=G#4) G4 \u2014 G# is non-diatonic in D major\n%   Harmonic context: E3 E3 E3 in tenor + A2 A2 A2 in bass = E minor chord (ii of D)\n%   G# makes it E major = secondary dominant V/vi (tonicizing B minor)\n%   Rule: V/vi \u2192 III or v (diatonic substitution)\n%   Replace G# with G natural: E4 G4 G4 \u2192 implies Em chord (ii minor) \u2014 diatonic, fine\n%   Voice leading: E4\u2192G4 is a minor third up, then G4 stays \u2192 good\n%\n% T1 (written one octave higher than concert): A3 sounds \u2192 write A; B3\u2192B; D4\u2192d; C#4\u2192C (=C# in K:D)\n% T2 a third below T1: F3\u2192write F; G3\u2192write G; E3\u2192write E; A3\u2192write A; B3\u2192write B\n% Baritone (bass clef concert): a 3rd above Bass I\n% Bass I follows original S2V2 closely\n%\n[V:1] F F A | d3/2 e/ d | c d B | !accent!B !accent!A z A | A B c | d2 c3/4 d/4 |\n[V:2] D D E | B3/2 c/ B | A B G | !accent!G !accent!F z F | F G A | B2 A3/4 B/4 |\n[V:3] A, A, C | F3/2 G/ F | E G G | !accent!E !accent!D z D | D E E | F2 E3/4 F/4 |\n[V:4] F, F, A, | D3/2 E/ D | C E E | !accent!C !accent!C z C | C D C | D2 C3/4 D/4 |\n[V:5] A A A | B3/2 A/ A | A B d | !accent!d !accent!C z C | d d A | A2 A3/4 A/4 |\n[V:6] F F F | G3/2 F/ F | F G B | !accent!B !accent!A z A | A B G | F2 G3/4 F/4 |\n[V:7] F, D, E, | D,3/2 E,/ F, | E, E, E, | !accent!A,, !accent!A,, z A,, | A, G, E, | D,2 E,3/4 D,/4 |\n[V:8] D, D, C, | B,,3/2 C,/ D, | E, E, E, | !accent!A,, !accent!A,, z A,, | A, G, E, | D,2 E,3/4 D,/4 |\n%\n% \u2014 Bars 11-15: First section cadence (||) \u2014\n% Original: Sop e5\u00bed5\u00bce5 | f5 d5 d5\u00be-d5\u00bc | d5\u00bec5\u00bcB4 | (A4 d5)c5 | d5-d5-d5\n%           Alt G4\u00beF4\u00bcG4 | A4 F4 A4\u00be-A4\u00bc | B4\u00beA4\u00bcG4 | F4-F4 G4 | F4-F4-F4\n%           Ten C4\u00beD4\u00bcC4 | D4 D4 D4\u00be-D4\u00bc | D4\u00beD4\u00bcD4 | (D4 A3) A3 | A3-A3-A3\n%           Bas A2\u00beA2\u00bcA2 | D3 D3 F3\u00be-F3\u00bc | G3\u00beG3\u00bcG3 | A3-A3 A2 | D3-D3-D3\n%\n% Cadence at bar 15: S1=D5 (d), S2=A4 (A), A1=F4 (F), A2=D4 (D), T1=A3(wr:A), T2=F3(wr:F), Bar=F3, B1=D3(D,)\n% Suspension setup: A2 suspends F4\u2192E4 in bar 14-15; T2 suspends A3\u2192G3(wr:A\u2192G) \u2014 diatonic\n%\n[V:1] e3/2 d/ e | f d d3/4.- d/4 | d3/2 c/ B | (A d) c | d3 ||\n[V:2] c3/2 B/ c | d B B3/4.- B/4 | B3/2 A/ G | (F A) G | A3 ||\n[V:3] G3/2 F/ G | A F F3/4.- F/4 | G3/2 F/ E | (D F) E | F3 ||\n[V:4] E3/2 D/ E | F D D3/4.- D/4 | E3/2 D/ C | (A, D) C | D3 ||\n[V:5] C3/2 d/ C | d d d3/4.- d/4 | d3/2 C/ B | (d A) A | A3 ||\n[V:6] A3/2 B/ A | B A B3/4.- B,/4 | B3/2 A/ G | (A F) E | F3 ||\n[V:7] A,,3/2 B,,/ C, | D, D, F,,3/4.- F,,/4 | G,,3/2 G,,/ G,, | A,,2 A,,, | D,,3 ||\n[V:8] A,,3/2 A,,/ A,, | D, D, F,,3/4.- F,,/4 | G,,3/2 G,,/ G,, | A,,2 A,,, | D,,3 ||\n%\n% =====================================================================\n% SECTION B  (Chorus \u2014 \"It may be at morn\")\n% =====================================================================\n%\n% \u2014 Bars 16-21: Full 8-voice homophony, forte \u2014\n% Original: Sop A4-A4 F4 | F4 G4 A4 | B4-B4 B4 | d5-d5 d5\u00bed5\u00bc | d5 c5 B4 | A4-A4 c5\u00bec5\u00bc\n%           Alt F4-F4 D4 | D4 C4 D4  | D4-D4 D4 | G4-G4 G4\u00beG4\u00bc | B4 A4 G4 | F4-F4 E4\u00beE4\u00bc\n%           Ten D4-D4 A3 | A3 A3 A3  | D4-D4 D4 | B3-B3 B3\u00beB3\u00bc | B3 C4 D4 | D4-D4 A3\u00beA3\u00bc\n%           Bas D3-D3 D3 | D3 E3 F3  | G3-G3 G3 | G3-G3 G3\u00beG3\u00bc | G3 G3 G3 | D3-D3 A3\u00beA3\u00bc\n%\n% S2: diatonic thirds below S1\n% A1: follows original alto\n% A2: thirds below A1\n% T1 (written 8va higher): D4\u2192wr:d, A3\u2192wr:A, B3\u2192wr:B, C4\u2192wr:c, D4\u2192wr:d\n% T2: thirds below T1 (diatonic): B3\u2192wr:B becomes G3\u2192wr:G; D4\u2192wr:d becomes B3\u2192wr:B\n% Bar: thirds above Bass I (diatonic)\n% B1: follows original bass\n%\n[V:1] A2 F | F G A | B2 B | d2 d3/4 d/4 | d c B | A2 c3/4 c/4 |\n[V:2] F2 D | D E F | G2 G | B2 B3/4 B/4 | B A G | F2 A3/4 A/4 |\n[V:3] D2 A, | A, B, D | D2 D | G2 G3/4 G/4 | B A G | F2 E3/4 E/4 |\n[V:4] A,2 F, | F, G, F, | B,2 B, | E2 E3/4 E/4 | G F E | D2 C3/4 C/4 |\n[V:5] d2 A | A A A | d2 d | B2 B3/4 B/4 | B c d | d2 A3/4 A/4 |\n[V:6] A2 F | F G F | B,2 B | G2 G3/4 G/4 | G A B | A2 F3/4 F/4 |\n[V:7] F,2 F, | D, E, F, | G,2 G, | G,2 G,3/4 G,/4 | G, G, G, | F,2 A,3/4 A,/4 |\n[V:8] D,2 D, | D, E, F, | G,2 G, | G,2 G,3/4 G,/4 | G, G, G, | D,2 A,,3/4 A,,/4 |\n%\n% \u2014 Bars 22-27: Chorus continuation and final cadence \u2014\n% Original: Sop d5 d5 c5\u00bec5\u00bc | d5 d5 e5\u00bee5\u00bc | f5 d5 c5 | d5-d5 F4\u00beF4\u00bc | A4 G4 E4 | D4-D4\n%           Alt F4 F4 G4\u00beG4\u00bc | F4 F4 A4\u00beA4\u00bc  | A4 F4 G4 | F4-F4 D4\u00beD4\u00bc | D4 E4 C4 | D4-D4\n%           Ten A3 A3 A3\u00beA3\u00bc | A3 A3 C4\u00beC4\u00bc  | D4 A3 A3 | A3-A3 A3\u00beA3\u00bc | F3 A3 G3 | F3-F3\n%           Bas D3 D3 A2\u00beA2\u00bc | D3 D3 A3\u00beA3\u00bc  | D3 D3 A2 | D3-D3 D3\u00beD3\u00bc | A2 A2 A2 | D3-D3\n%\n% Bars 22-23: Antiphonal \u2014 SSAA sings bars 22-23, TTBB echoes same rhythm\n% Bar 24 (f5): S1 climax at F5 (written f) = top of comfortable range\n%   B1 = A2 (A,,) = very low, full spread achieved\n% Bars 25-26: stretto \u2014 SSAA enters on F4, TTBB on F3, converging on D\n% Final bar: S1=D4(D), S2=A3(A), A1=F3(F,)...\n%   Wait: A1 is alto, treble clef, range F3-D5. F3=F, in ABC. D4=D.\n%   A2 range D3-B4: D3=D,. T1 sounds D3\u2192writes d(D5 wr = D4 snd). T2 sounds A2\u2192writes A(A4wr=A3snd)?\n%   No: T2 sounds A2 \u2192 write A (A4) with transpose=-12 \u2192 sounds A3. That's not A2.\n%   For T2 to sound A2: write A, (A3) \u2192 sounds A2. T2 range floor G2 \u2192 write G,(G3)\u2192sounds G2. OK.\n%   But G2 is quite low. Let's have B1 = D3 (D,) for the final, Bar = F3 (F,).\n%\n[V:1] d d c3/4 c/4 | d d e3/4 e/4 | f d c | d2 !sintro!F3/4 F/4 | A G E | D2 !eintro!|]\n[V:2] B B A3/4 A/4 | B B c3/4 c/4 | d B A | A2 D3/4 D/4 | F E C | D2 |]\n[V:3] F F E3/4 E/4 | F F G3/4 G/4 | A F E | F2 A,3/4 A,/4 | D B, A, | F,2 |]\n[V:4] D D C3/4 C/4 | D D E3/4 E/4 | F D C | D2 F,3/4 F,/4 | A, G, E, | D,2 |]\n[V:5] A A A3/4 A/4 | A A c3/4 c/4 | d A A | A2 A3/4 A/4 | F A G | F2 |]\n[V:6] F F E3/4 E/4 | F F G3/4 G/4 | A F E | F2 F3/4 F/4 | D E C | D2 |]\n[V:7] F, F, E,3/4 E,/4 | F, F, A,3/4 A,/4 | D, A,, A,, | D,2 D,3/4 D,/4 | A,, A,, A,, | D,2 |]\n[V:8] D, D, A,,3/4 A,,/4 | D, D, A,,3/4 A,,/4 | D, D, A,,, | D,2 D,,3/4 D,,/4 | A,,, A,,, A,,, | D,,2 |]\n";
