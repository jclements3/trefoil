, C, | B,, E, D, D, | G,,2 |]\n%\n% Voice-leading notes:\n%  Bar 12 second half completes bar 12 (beats 3-4):\n%    S1=E5 E5, S2=C5 C5, A1=E4 A4 (replacing orig G#4 -> A4 diatonic)\n%    A2=C4 A3, T1=B3 E4(snd), T2=G3 C4(snd), Bar=E3 G3, B1=G2 E3\n%    Note: B1 orig had ^G, (G#2) -> G,, (G2) diatonic neighbor below\n%  Bar 13: Am (beats 1-2), D major (beats 3-4)\n%    S2=A4 F#4 B4 B4; A1=E4 D4 F#4 F#4 (Am and D chord tones)\n%    T1 written e c A3/2 d/ (snd E4 C4 A3 D4 -- follows original tenor)\n%    T2 written A G F3/2 F/ (snd A3 G3 F#3 F#3)\n%    Bar=C4(dq) C4(8th) A3 F#3; B1=A3(dq) A3(8th) F#3 D3\n%    [Bar uses C4 -- top of Bar range -- during buildup phrase; resolves down]\n%  Bar 14: CLIMAX\n%    Beat 3 (all 8): S1=E5 S2=C5 A1=G4 A2=E4 T1=C4 T2=G3 Bar=E3 B1=C3\n%    -> C major root-position chord, maximum 3-octave spread (C3 to E5)\n%    S1 reaches e (E5) -- within range (comfortable top G5, E5 well inside)\n%    B1 descends to C, (C3) -- within range (B1 top A3, C3 is inside range)\n%  Bar 15: Stretto -- T1 written d B G F (snd D4 B3 G3 F#3) mirrors S1 (d G B A)\n%    Both descend through G-major harmony a major 10th apart\n%    S2=B4 E4 G4 F#4; A1=G4 E4 D4 C4 (descending stepwise)\n%    A2=E4 C4 B3 A3; T2=B3 G3 E3 D3(snd)\n%    Bar=D3 G3 F#3 F#3; B1=B2 E3 D3 D3 (original bass)\n%  Bar 16: Final G major cadence\n%    S1=G4, S2=E4, A1=B3(B,), A2=G3(G,)\n%    T1 written d2 (snd D4); T2 written B2 (snd B3)\n%    Bar=G3(G,); B1=G2(G,,)\n%    Sounding chord: G2-G3-B3-D4-B3-D4-E4-G4 (G major with 6th in S2)\n";
