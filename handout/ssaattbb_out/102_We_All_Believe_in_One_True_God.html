 B, A, B, F, G,2 F,2 |\n[V:5] E2 F2 C C C G, F,2 G,2 |\n[V:6] C2 D2 A, A, A, E, D,2 E,2 |\n[V:7] E,2 (D,3/2 E,/) F, C, A, C, D,2 C,2 |\n[V:8] C,2 (D,3/2 E,/) F, C, A, C, D,2 C,2 |\n%\n% \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n% BAR 12 (10 beats) \u2014 Penultimate phrase.\n% S1: z G (F3/2 E/) (D ^C) (D F) D2  (^C# kept in S1)\n% S2: z E (D3/2 C/) (B, A,) (B, D) B,2  (^C \u2192 B diatonic)\n% A1: z C (B,3/2 A,/) (G, F,) (G, B,) G,2\n% A2: z A, (G,3/2 F,/) (E, D,) (E, G,) E,2\n% T1 written: z A, (G,3/2 F,/) (E, D,) (E, A,) G,2 = concert z A2 G2 F2 E2 D2 E2 A2 G2 \u2713\n%   (original S2V1 _B,\u2192A, diatonic)\n% T2 written: z F, (E,3/2 D,/) (C, B,) (C, E,) C,2 = concert z F2 E2 D2 C2 B2 C2 E2 C2 \u2713\n%   Note: B, written = B2 sounding (8vb) \u2713 for T2 (G2\u2013E4)\n% Bar: z G, (A,3/2 C/) (D A,) (F, D,) G,2 = z G2 A2 C3 D3 A2 F2 D2 G2 \u2713 (10 beats)\n%   (original S2V2 raised octave, diatonic)\n% B1: z G, (A,3/2 C,/) (D, A,) (F, D,) G,2 = z G2 A2 C2 D2 A2 F2 D2 G2 \u2713 (10 beats)\n% \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n[V:1] z G (F3/2 E/) (D ^C) (D F) D2 |\n[V:2] z E (D3/2 C/) (B, A,) (B, D) B,2 |\n[V:3] z C (B,3/2 A,/) (G, F,) (G, B,) G,2 |\n[V:4] z A, (G,3/2 F,/) (E, D,) (E, G,) E,2 |\n[V:5] z A, (G,3/2 F,/) (E, D,) (E, A,) G,2 |\n[V:6] z F, (E,3/2 D,/) (C, B,) (C, E,) C,2 |\n[V:7] z G, (A,3/2 C/) (D A,) (F, D,) G,2 |\n[V:8] z G, (A,3/2 C,/) (D, A,) (F, D,
