var abc_src = "X:22\nT:O Lord, How Shall I Meet Thee\nC:Words: Paul Gerhardt, 1653. Translator unknown.\nC:Music: 'Wie Soll ich Dich Empfangen' Johann Cr\u00fcger, 1653.\nC:Setting: \"Evangelical Lutheran Hymn-Book\", 1931.\nC:SSAATTBB arrangement: 2026.\nC:copyright: public domain.\nM:4/4\nL:1/4\nQ:1/4=140\nK:Eb\n%%staves [(1 2) (3 4) (5 6) (7 8)]\nV:1 name=\"Soprano I\"  clef=treble\nV:2 name=\"Soprano II\" clef=treble\nV:3 name=\"Alto I\"     clef=treble\nV:4 name=\"Alto II\"    clef=treble\nV:5 name=\"Tenor I\"    clef=treble middle=B3 transpose=-12\nV:6 name=\"Tenor II\"   clef=treble middle=B3 transpose=-12\nV:7 name=\"Baritone\"   clef=bass\nV:8 name=\"Bass I\"     clef=bass\n%\n% Tenor written pitches sound one octave lower (transpose=-12).\n% Written G, = sounds G2 (T2 minimum); written B = sounds Bb3; written E = sounds Eb3.\n% Bass clef: E, = Eb2, B, = Bb2, G, = G2, C = C3, E = Eb3.\n%\n% ================================================================\n% PHRASE A \u2014 first time: SSAA only (4-voice opening, reduced texture)\n% ================================================================\n%\n% Pickup bar (2 beats), I = Eb major\n[V:1] [Q:1/4=140] E2 |\n[V:2]              B,2 |\n[V:3]              G,2 |\n[V:4]              E,2 |\n[V:5]              z2 |\n[V:6]              z2 |\n[V:7]              z2 |\n[V:8]              z2 |\n%\n% Bar 1  Eb/G | Ab | Bb | Bb\n[V:1] G A B B |\n[V:2] E E D E |\n[V:3] B, C F, G, |\n[V:4] G, A, B, G, |\n[V:5] z4 |\n[V:6] z4 |\n[V:7] z4 |\n[V:8] z4 |\n%\n% Bar 2  Ab | Fm | Eb | Ab\n[V:1] A2 G A |\n[V:2] (C D) E E |\n[V:3] A,2 C C |\n[V:4] F,2 G, F, |\n[V:5] z4 |\n[V:6] z4 |\n[V:7] z4 |\n[V:8] z4 |\n%\n% Bar 3  Eb/G | Eb | Bb/F | Bb/F\n[V:1] G E F F |\n[V:2] E B, C D |\n[V:3] B, B, A, F, |\n[V:4] G, G, F, D, |\n[V:5] z4 |\n[V:6] z4 |\n[V:7] z4 |\n[V:8] z4 |\n%\n% Phrase-end, 2 beats  I = Eb\n[V:1] E2 |\n[V:2] B,2 |\n[V:3] G,2 |\n[V:4] E,2 |\n[V:5] z2 |\n[V:6] z2 |\n[V:7] z2 |\n[V:8] z2 |\n%\n% ================================================================\n% PHRASE A \u2014 repeat: full 8 voices, homophonic\n% ================================================================\n%\n% Pickup bar (2 beats), I = Eb major\n[V:1] E2 |\n[V:2] B,2 |\n[V:3] G,2 |\n[V:4] E,2 |\n[V:5] G2 |\n[V:6] E2 |\n[V:7] G,2 |\n[V:8] E,2 |\n%\n% Bar 5  Eb/G | Ab | Bb | Bb\n% T1 written: E F G F (sounds Eb3 F3 G3 F3) \u2014 inner tenor line\n% T2 written: C D E D (sounds C3 D3 Eb3 D3) \u2014 stepwise tenor\n% Bar: G, A, B, G,  (G2 Ab2 Bb2 G2)\n% B1: E, F, G, E,  (Eb2 F2 G2 Eb2)\n[V:1] G A B B |\n[V:2] E E D E |\n[V:3] B, C F, G, |\n[V:4] G, A, B, G, |\n[V:5] E F G F |\n[V:6] C D E D |\n[V:7] G, A, B, G, |\n[V:8] E, F, G, E, |\n%\n% Bar 6  Ab | Fm | Eb | Ab\n% T1 written: A G F A (sounds Ab3 G3 F3 Ab3)\n% T2 written: F E D F (sounds F3 Eb3 D3 F3)\n% Bar: A, G, E, A,  (Ab2 G2 Eb2 Ab2)\n% B1: F, E, C, F,  (F2 Eb2 C2 F2)\n[V:1] A2 G A |\n[V:2] (C D) E E |\n[V:3] A,2 C C |\n[V:4] F,2 G, F, |\n[V:5] A G F A |\n[V:6] F E D F |\n[V:7] A, G, E, A, |\n[V:8] F, E, C, F, |\n%\n% Bar 7  Eb/G | Eb | Bb/F | Bb/F\n% T1 written: G E F F (sounds G3 Eb3 F3 F3)\n% T2 written: E B, C D (sounds Eb3 Bb2 C3 D3)\n% Bar: B, G, F, F,  (Bb2 G2 F2 F2)\n% B1: G, E, F, F,  (G2 Eb2 F2 F2) \u2014 parallel with Bar on beats 3-4 (unison 5th apart\u2014ok)\n%   Better B1: G, E, D, B,,  \u2192 B,, = Bb1 too low. Use: G, E, F, D,  (G2 Eb2 F2 D2)\n%   D2 in B1 range (C2-A3) \u2713\n[V:1] G E F F |\n[V:2] E B, C D |\n[V:3] B, B, A, F, |\n[V:4] G, G, F, D, |\n[V:5] G E F F |\n[V:6] E B, C D |\n[V:7] B, G, F, F, |\n[V:8] G, E, F, D, |\n%\n% Phrase-end, 2 beats  I = Eb\n[V:1] E2 |\n[V:2] B,2 |\n[V:3] G,2 |\n[V:4] E,2 |\n[V:5] G2 |\n[V:6] E2 |\n[V:7] G,2 |\n[V:8] E,2 |\n%\n% ================================================================\n% PHRASE B \u2014 melody climbs higher; SSAA vs TTBB antiphonal texture\n% Pickup (2 beats), I = Eb, S1 rises to Bb4\n% ================================================================\n%\n% Pickup bar (2 beats)\n[V:1] B2 |\n[V:2] G2 |\n[V:3] E2 |\n[V:4] C2 |\n[V:5] B2 |\n[V:6] G2 |\n[V:7] E2 |\n[V:8] E,2 |\n%\n% Bar 9  Cm | Bb/D | Eb | Bb/D\n% S1: c d e d  (C5 D5 Eb5 D5)\n% S2: G A B B  (G4 Ab4 Bb4 Bb4) \u2014 SSAA choir active\n% A1: E F G F  (Eb4 F4 G4 F4)\n% A2: C D E D  (C4 D4 Eb4 D4)\n% T1 written: G A B B (sounds G3 Ab3 Bb3 Bb3)\n% T2 written: E F G G (sounds Eb3 F3 G3 G3)\n% Bar: A, B, B, B,  (Ab2 Bb2 Bb2 Bb2)\n% B1: A,, B,, E, B,,  \u2192 fix: A, B, G, B,\n[V:1] c d e d |\n[V:2] G A B B |\n[V:3] E F G F |\n[V:4] C D E D |\n[V:5] G A B B |\n[V:6] E F G G |\n[V:7] A, B, B, B, |\n[V:8] A, G, E, G, |\n%\n% Bar 10  Cm | Cm | Bb | Eb\n% S1: c2 B G\n% S2: G2 F E\n% A1: E2 D B,\n% A2: C2 B, G,\n% T1 written: G2 F E (sounds G3 G3 F3 Eb3)\n% T2 written: E2 D B, (sounds Eb3 Eb3 D3 Bb2)\n% Bar: A,2 G, E,\n% B1: A,2 B, E,\n[V:1] c2 B G |\n[V:2] G2 F E |\n[V:3] E2 D B, |\n[V:4] C2 B, G, |\n[V:5] G2 F E |\n[V:6] E2 D B, |\n[V:7] A,2 G, E, |\n[V:8] A,2 B, E, |\n%\n% Bar 11  Fm | Bb | Ab | Eb/G\n% S1: c B A G\n% S2: G F E E  (Ab4 move: E=Eb4 diatonic OK)\n% A1: E D C B,\n% A2: C B, A, G,\n% T1 written: E D C B (sounds Eb3 D3 C3 Bb2... Bb2 OK for T1 minimum B2)\n%   Actually T1 min is B2; Bb2 is fine.\n% T2 written: C B, A, G (sounds C3 Bb2 Ab2 G2 \u2014 G2 is T2 minimum, fine)\n% Bar: A, G, F, E,\n% B1: A, B, C E,  (Ab2 Bb2 C3 Eb2 \u2014 good range)\n[V:1] c B A G |\n[V:2] G F E E |\n[V:3] E D C B, |\n[V:4] C B, A, G, |\n[V:5] E D C B, |\n[V:6] C B, A, G, |\n[V:7] A, G, F, E, |\n[V:8] A, B, C E, |\n%\n% Phrase-end, 2 beats  V = Bb\n[V:1] F2 |\n[V:2] D2 |\n[V:3] B,2 |\n[V:4] F,2 |\n[V:5] D2 |\n[V:6] B,2 |\n[V:7] F,2 |\n[V:8] B,2 |\n%\n% ================================================================\n% PHRASE C \u2014 full 8 voices, climax and stretto cadence\n% Pickup (2 beats), I = Eb\n% ================================================================\n%\n% Pickup bar (2 beats)\n[V:1] !sintro!G2 |\n[V:2] E2 |\n[V:3] B,2 |\n[V:4] G,2 |\n[V:5] G2 |\n[V:6] E2 |\n[V:7] G,2 |\n[V:8] E,2 |\n%\n% Bar 13  Eb | Fm | Eb/G | Bb\n% S1: E F G B  (Eb4 F4 G4 Bb4)\n% S2: C D E G  (C4 D4 Eb4 G4)\n% A1: G, A, B, E  (G3 Ab3 Bb3 Eb4)\n% A2: E, F, G, B,  (Eb3 F3 G3 Bb3)\n% T1 written: G A B E (sounds G3 Ab3 Bb3 Eb3)  \u2014 wait E written = Eb4 \u2192 sounds Eb3. OK.\n%   Actually: G written=G4 8vb=G3\u2713, A=Ab4\u2192Ab3\u2713, B=Bb4\u2192Bb3\u2713, E=Eb4\u2192Eb3\u2713\n% T2 written: E F G B, (Eb4\u2192Eb3, F4\u2192F3, G4\u2192G3, Bb3\u2192Bb2)\n% Bar: C, D, E, G,  (C2 D2 Eb2... wait C, = C2 in bass; E, = Eb2)\n%   Bar range min Eb2 = E,. C, = C2 which is below Bar minimum E2 (Eb2).\n%   So use E, D, E, G,  or just adjust: C, would be C2 which is too low for Bar.\n%   Bar minimum is E2 (Eb2). Use: E, F, G, B,  (Eb2 F2 G2 Bb2) \u2014 works!\n% B1: C, B,, E, G,,  \u2192 C, = C2 fine, B,, = Bb1 too low!\n%   Fix B1: use C, B, E, G,  (C2 Bb2 Eb2... wait B, = Bb2, G, = G2)\n%   Better: E, F, G, B,  but then Bar and B1 parallel octaves...\n%   B1: E, D, E, G,  would double Bar too much.\n%   Let's use B1: C, D, E, G,  \u2014 C2 D2 Eb2 G2 \u2014 all within B1 range C2-A3 \u2713\n%   And Bar: E, F, G, B,  (Eb2 F2 G2 Bb2) \u2014 Bar range E2-C4 \u2713\n%   No parallel issues? Bar Eb2-F2-G2-Bb2, B1 C2-D2-Eb2-G2 \u2014 contrary motion mostly.\n[V:1] E F G B |\n[V:2] C D E G |\n[V:3] G, A, B, E |\n[V:4] E, F, G, B, |\n[V:5] G A B E |\n[V:6] E F G G |\n[V:7] E, F, G, B, |\n[V:8] C, D, E, G, |\n%\n% Bar 14  Ab | Ab | Eb/G | Bb  \u2014 climax approach, S1 reaches Bb4\n% S1: A2 G B  (Ab4 Ab4 G4 Bb4)\n% S2: F2 E G  (F4 F4 Eb4 G4)\n% A1: C2 B, E  (C4 C4 Bb3 Eb4)\n% A2: A,2 G, B,  (Ab3 Ab3 G3 Bb3)\n% T1 written: C2 B E (C4\u2192C3, B4\u2192Bb3, E4\u2192Eb3)\n% T2 written: A,2 G B, (Ab3\u2192Ab2, G4\u2192G3... wait A, written = Ab3 \u2192 sounds Ab2. G written = G4 \u2192 sounds G3. B, written = Bb3 \u2192 sounds Bb2)\n%   T2: Ab2, Ab2, G3, Bb2 \u2014 big leap G3 to Bb2. Better: A,2 G, B, (sounds Ab2 Ab2 G2 Bb2)\n% Bar: F,2 E, G,  (F2 F2 Eb2 G2)\n% B1: F,2 E, G,  \u2014 same as Bar, parallel octaves problem. Use:\n%   B1: F,2 B, G,  (F2 F2 Bb2 G2) \u2014 better contrary motion in beat 3\n%   Actually: B1 should be bass-register. Use: F,2 E, G,  with Bar differently.\n%   Bar: A,2 G, B,  (Ab2 Ab2 G2 Bb2) \u2014 keeps Bar above B1\n%   B1: F,2 E, G,  (F2 F2 Eb2 G2)\n[V:1] A2 G B |\n[V:2] F2 E G |\n[V:3] C2 B, E |\n[V:4] A,2 G, B, |\n[V:5] C2 B E |\n[V:6] F2 E B, |\n[V:7] A,2 G, B, |\n[V:8] F,2 E, G, |\n%\n% Bar 15  Ab | Eb/G | Bb7 | Bb7  \u2014 suspension builds to cadence\n% S1: A G F F  (Ab4 G4 F4 F4)\n% S2: F E D D  (F4 Eb4 D4 D4)\n% A1: C B, B, A,  (C4 Bb3 Bb3 Ab3) \u2014 4-3 suspension over Bb7\n% A2: A, G, F, F,  (Ab3 G3 F3 F3)\n% T1 written: C B B A (C4\u2192C3, B4\u2192Bb3, B4\u2192Bb3, A4\u2192Ab3)  \u2014 4-3 suspension\n% T2 written: A, G, F, F, (Ab3\u2192Ab2, G3\u2192G2... wait G, written = G3 \u2192 G2)\n%   T2 min = G2; G, written = G3 \u2192 sounds G2 \u2713. F, written = F3 \u2192 sounds F2 \u2014 BELOW T2 min G2!\n%   Fix T2 bar 15: use A, G, G, G (Ab3\u2192Ab2, G3\u2192G2, G3\u2192G2, G3\u2192G2)? But then 3 repeated notes.\n%   Or: A, G, B, B, (Ab2, G2, Bb2, Bb2) \u2014 more musical. Written: A, G, B, B,\n% Bar: F, E, D, D,  (F2 Eb2 D2 D2) \u2014 D2: is D2 in Bar range? Bar min=Eb2. D2 is below!\n%   Fix Bar: F, E, F, F,  (F2 Eb2 F2 F2) or F, E, B, B,  (F2 Eb2 Bb2 Bb2)\n%   Better: A, G, F, F,  (Ab2 G2 F2 F2) \u2014 all within Bar range Eb2-C4 \u2713\n% B1: F, E, B,, B,,  \u2014 B,, = Bb1, too low! Fix: F, E, B, B,  (F2 Eb2 Bb2 Bb2) \u2713\n[V:1] A G F F |\n[V:2] F E D D |\n[V:3] C B, B, A, |\n[V:4] A, G, F, F, |\n[V:5] A B B A |\n[V:6] A, G, B, B, |\n[V:7] A, G, B, B, |\n[V:8] F, E, F, F, |\n%\n% Final bar, 2 beats + fermata, I = Eb  (stretto: all voices unison Eb)\n% S1: Eb4; S2: Bb3; A1: G3; A2: Eb3; T1: Bb3(written B); T2: G3(written G); Bar: Eb3(E); B1: Eb2(E,)\n% For a rich final chord rather than unison: spread Eb major chord\n% S1: E (Eb4); S2: B, (Bb3); A1: G, (G3); A2: E, (Eb3)\n% T1 written: G (G4 \u2192 sounds G3); T2 written: E (Eb4 \u2192 sounds Eb3)\n% Bar: G, (G2); B1: E, (Eb2)\n% Check: SSAA = Eb4 Bb3 G3 Eb3 \u2014 nice Eb major chord in close position \u2713\n% TTBB: G3 Eb3 G2 Eb2 \u2014 Eb chord \u2713\n% Final note: let's give full chord Eb G Bb Eb in each pair\n[V:1] !fermata!E2 !eintro!|]\n[V:2] B,2 |]\n[V:3] G,2 |]\n[V:4] E,2 |]\n[V:5] G2 |]\n[V:6] E2 |]\n[V:7] G,2 |]\n[V:8] E,2 |]\n";
