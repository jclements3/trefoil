var abc_src = "X:1\nT:At The Lamb's High Feast\nC:Words: Latin, circa 6th Century. Translated by Robert Campbell, 1849.\nC:Music: 'Sonne der Gerechtigkeit' Czech, Kirchengeseng, 1566. Setting: Brian J. Dumont, 31 Dec 2009.\nC:SSAATTBB arr. for 8-voice ensemble with lever harp.\nC:copyright: Words and Music, public domain. Setting copyright 2009 Brian J. Dumont.\nC:This setting may be freely reproduced or published for Christian worship, provided it is not altered,\nC:and this notice is on each copy. All other rights reserved.\nC:This score is a part of the Open Hymnal Project, 2010 Revision.\nM:4/4\nL:1/4\nQ:1/4=110\n%%staves {(V1 V2) (V3 V4) (V5 V6) (V7 V8)}\nK:C\n%\nV:1 name=\"Soprano I\"   clef=treble\nV:2 name=\"Soprano II\"  clef=treble\nV:3 name=\"Alto I\"      clef=treble\nV:4 name=\"Alto II\"     clef=treble\nV:5 name=\"Tenor I\"     clef=treble middle=B3 transpose=-12\nV:6 name=\"Tenor II\"    clef=treble middle=B3 transpose=-12\nV:7 name=\"Baritone\"    clef=bass\nV:8 name=\"Bass I\"      clef=bass\n%\n% ============================================================\n% BAR 1 \u2014 2-beat pickup. Texture: SSAA only (4 voices).\n% Harmony: I (C major). Open quietly at reduced texture.\n% ============================================================\n% Pitches: S1=C4 C4, S2=A3 A3, A1=E4 E4, A2=G3 G3\n% SSAA: 4 distinct pitches (C4 A3 E4 G3). S/A no unison. \u2713\n%\n[V:1] [Q:1/4=110] C C |\n[V:2]              A, A, |\n[V:3]              E E |\n[V:4]              G, G, |\n[V:5]              z2 |\n[V:6]              z2 |\n[V:7]              z2 |\n[V:8]              z2 |\n%\n% ============================================================\n% BAR 2 \u2014 4 beats. Texture: SSAA + T1/T2 enter (6 voices).\n% Harmony: G (beat 1) | C (beat 2) | F-Am area (beats 3-4)\n% S1 keeps original melody exactly.\n% S2: third below S1 (diatonic thirds throughout).\n% A1: moving line implying alto harmony, stepwise.\n% A2: contrary motion to A1, lower.\n% T1/T2: tenor enters on G, moves to D (original tenor).\n% Bar/B1: silent (still entering in bar 3).\n% ============================================================\n% S1: G4 C5 B4 A4G4A4 A4\n% S2: E4 A4 G4 F4E4F4 F4  (thirds below: G->E, C->A, B->G, A->F, G->E, F->D...\n%     but A4 is top of S2 comfort; use A4 on beat 2 for emphasis)\n% A1: B3 E4 D4 C4B3C4 C4  (stepwise descent mirrors soprano shape)\n% A2: G3 C4 B3 A3G3A3 A3  (third below A1 throughout)\n% T1 (written, concert -12): G4 G4 D4 D4 = concert G3 G3 D3 D3\n%    Original tenor bar 2: G3 G3 D3(half) \u2014 write G G D2\n% T2 (written): E4 E4 B3 B3 = concert E3 E3 B2 B2 \u2014 large drop; use C4 for B\n%    T2 written: E E C2 (concert E3 E3 C3 half, smoother line)\n%\n[V:1] G c B/A//G//A/ A/ |\n[V:2] E A G/F//E//F/ F/ |\n[V:3] B, E D/C//B,//C/ C/ |\n[V:4] G, C B,/A,//G,//A,/ A,/ |\n[V:5] G G D2 |\n[V:6] E E C2 |\n[V:7] z4 |\n[V:8] z4 |\n%\n% ============================================================\n% BAR 3 \u2014 4 beats. ALL 8 VOICES enter (Bar + B1 join).\n% Harmony: C (beats 1-2) | F (beat 3) | C (beat 4)\n% S1: original melody G4 G4 A4 A4\n% S2: E4 E4 F4 F4 (thirds below)\n% A1: C4 C4 C4 D4 (sustained chord tone with step at end)\n% A2: A3 A3 A3 B3 (third below A1; passing note at beat 4)\n% T1 (written): C4 D4E4 F4 F4 = concert C3 D3E3 F3 F3\n% T2 (written): A3 C4 D4 D4 = concert A2 C3 D3 D3\n% Bar: E3 E3 F3 F3 (third above B1)\n% B1: C3 C3 C3 C3 (original bass)\n% ============================================================\n[V:1] G2 A A |\n[V:2] E2 F F |\n[V:3] C2 C D |\n[V:4] A, A, A, B, |\n[V:5] C D/E/ F2 |\n[V:6] A, C D2 |\n[V:7] E,2 F, F, |\n[V:8] C,2 C, C, |\n%\n% ============================================================\n% BAR 4 \u2014 4 beats. Full 8 voices.\n% Harmony: Em (beat 1) | F (beat 2) | C/G | G-Dm (beats 3-4)\n% S1: B4 A4 G4A4G4 F4   (=F = F-nat in C = diatonic, kept as written)\n% S2: G4 F4 E4F4E4 D4   (thirds below; no accidentals)\n% A1: E4 D4 C4D4C4 A3   (stepwise, diatonic)\n% A2: C4 A3 G3A3G3 F3   (third below A1; F3 in range of A2 \u2713)\n%    \u2014 check A2 F3: A2 range D3-B4, F3 \u2713\n% T1 (written): A4 F4 G4dotted G4/8 = concert A3 F3 G3. G3\n% T2 (written): F4 D4 E4dotted E4/8 = concert F3 D3 E3. E3\n% Bar: D3 C3 C3dotted C3/8  (third above B1)\n% B1: B2 C3 E3dotted E3/8  (original bass)\n% ============================================================\n[V:1] B A G/A/G/ =F/ |\n[V:2] G F E/F/E/ D/ |\n[V:3] E D C/D/C/ A,/ |\n[V:4] C A, G,/A,/G,/ F,/ |\n[V:5] A F G3/2 G/ |\n[V:6] F D E3/2 E/ |\n[V:7] D, C, C,3/2 C,/ |\n[V:8] B,, C, E,3/2 E,/ |\n%\n% ============================================================\n% BAR 5 \u2014 4 beats. Full 8 voices.\n% First half (beats 1-2): Am. Second half (beats 3-4): C/E moving to Am\n% S1: E4(half) E4/8 D4/8 E4/8 F4/8   (original)\n% S2: C4(half) C4/8 B3/8 C4/8 D4/8   (thirds below)\n% A1: A3(half) A3/8 G3/8 A3/8 B3/8   (thirds below S2, independent alto line)\n% A2: F3(half) F3/8 E3/8 F3/8 G3/8   (stepwise beneath A1, diatonic; F3 in range \u2713)\n% T1 (written): C4 D4/E4/ E4 G4     = concert C3 D3E3 E3 G3\n% T2 (written): A3 B3/C4/ C4 E4     = concert A2 B2C3 C3 E3\n% Bar: B2(half) C3 E3               (third above G2 bass = B2; then C3 E3)\n% B1: G2(half) C3 E3                (original bass)\n% ============================================================\n[V:1] E2 E/ D/ E/ F/ |\n[V:2] C2 C/ B,/ C/ D/ |\n[V:3] A,2 A,/ G,/ A,/ B,/ |\n[V:4] F,2 F,/ E,/ F,/ G,/ |\n[V:5] C D/E/ E G |\n[V:6] A, B,/C/ C E |\n[V:7] B,,2 C, E, |\n[V:8] G,,2 C, E, |\n%\n% ============================================================\n% BAR 6 \u2014 4 beats. Full 8 voices. Antiphonal texture.\n% SSAA answers TTBB in short exchanges.\n% Harmony: C (beats 1-2) | G-F (beat 3) | Am (beat 4)\n% S1: G4/8 G4/8 C4 E4/8 D4/8 E4/8 C4/8   (original)\n% S2: E4/8 E4/8 A3 C4/8 B3/8 C4/8 A3/8   (thirds below; A3 at bottom of S2 range \u2713)\n% A1: C4/8 C4/8 E4 A3/8 G3/8 A3/8 E3/8   (inner; E3 = A1 range min F3, fix to F3)\n%   Fix A1 beat 4 8th: use F3 (F,) not E3; ...A,/ G,/ A,/ F,/\n%   A1: C/C/ E A,/G,/A,/F,/   \u2014 wait F3 is below A1 range min F3. F3 is exactly the minimum. OK.\n% A2: A3/8 A3/8 C4 F3/8 E3/8 F3/8 D3/8   \u2014 D3 is A2 range minimum D3. OK.\n%   A2: A,/A,/ C F,/E,/F,/D,/\n% T1 (written): G/G/ E G/G/ G = concert G3/G3/ E3 G3/G3/ G3\n% T2 (written): E/E/ C E/E/ E = concert E3/E3/ C3 E3/E3/ E3\n% Bar: G3/8 B3/8 E3 G3/8 F3/8 G3 = G,/B,/ E, G,/F,/ G,\n% B1: E3/8 G3/8 C3 E3/8 D3/8 E3 = E,/G,/ C, E,/D,/ E,\n% ============================================================\n[V:1] G/ G/ C E/ D/ E/ C/ |\n[V:2] E/ E/ A C/ B,/ C/ A,/ |\n[V:3] C/ C/ E A,/ G,/ A,/ F,/ |\n[V:4] A,/ A,/ C F,/ E,/ F,/ D,/ |\n[V:5] G/ G/ E G/ G/ G |\n[V:6] E/ E/ C E/ E/ E |\n[V:7] G,/ B,/ E, G,/ F,/ G, |\n[V:8] E,/ G,/ C, E,/ D,/ E, |\n%\n% ============================================================\n% BAR 7 \u2014 4 beats. Full 8 voices. Climax + stretto approach.\n% Harmony: G | C-F | Am (passing) | C final approach\n% S1: B3/8 C4/8 D4/8 F4/8 E4 D4   (original; F4 = comfortable peak for S1)\n% S2: G3/8 A3/8 B3/8 D4/8 C4 B3   (thirds below; G3=S2 bottom, use A3 for G3 beat)\n%   \u2014 S2 G3 would be below A3 minimum. Fix beat 1 S2: use A3 instead (2nd below B3 not 3rd)\n%   S2: A,/B,/B,/D/ C B,   (A3 B3 B3 D4 C4 B3)\n%   Check S2 does not cross above S1: S1=B3 C4 D4 F4 E4 D4, S2=A3 B3 B3 D4 C4 B3 \u2014 at beat 4 S2=D4, S1=F4 \u2713; no crossing \u2713\n%   Check S2 unison with S1: S2=B3 (beat 2-3), S1=C4 D4 \u2014 no unison issue.\n%\n% A1: D4/8 E4/8 G4/8 A4/8 G4 F4   (independent melodic line, strong stepwise motion)\n% A2: B3/8 C4/8 E4/8 F4/8 E4 D4   \u2014 check A2 vs A1: A1=D4E4G4A4G4F4, A2=B3C4E4F4E4D4\n%   At beat 3 (8th): A1=G4, A2=E4 \u2713. Beat 4 (8th): A1=A4, A2=F4 \u2713. Half: A1=G4,A2=E4 \u2713.\n%   A2 never crosses A1 \u2713.\n%   But A2=S1 at beat 1: S1=B3, A2=B3 \u2014 S and A unison NOT allowed. Fix A2 beat 1: use C4.\n%   A2 revised: C/C/E/F/ E D   \u2014 beat 1 = C4/8, beat 1+ = C4/8 (A2 stays C4 while S1 starts B3)\n%     No crossing S1: S1 has B3 on beat 1, A2 has C4 \u2014 A2 ABOVE S1? S1=B3, A2=C4: A2 > S1?\n%     In choral terms, A2 (alto) should be below S1 (soprano). If A2=C4 and S1=B3, A2>S1 \u2014 voice crossing between S and A pairs. This is allowed per rule 3 (\"crossing between pairs is permitted where musically effective\") but risky. Let use A2 = B3 (near-unison with S1) which IS disallowed. Use A2=A3:\n%   A2: A,/B,/D/E/ D C  (A3 B3 D4 E4 D4 C4)\n%   Check: A2 vs A1: A1=D4E4G4A4G4F4, A2=A3B3D4E4D4C4. At 8th-beat positions:\n%     A1 D4 vs A2 A3 \u2713; A1 E4 vs A2 B3 \u2713; A1 G4 vs A2 D4 \u2713; A1 A4 vs A2 E4 \u2713;\n%     A1 G4 vs A2 D4 \u2713; A1 F4 vs A2 C4 \u2713. No crossing \u2713.\n%   Check S and A unison: S1=B3C4D4F4E4D4, A1=D4E4G4A4G4F4, A2=A3B3D4E4D4C4\n%     S1=D4 (8th), A2=D4 (8th) \u2014 at beat 2 S1=C4, A2=B3; beat 3 S1=D4, A2=D4 \u2014 S1=A2=D4! Unison!\n%     Fix: A2 beat 3 (8th) = C4 instead. A2: A,/B,/C/E/ D C\n%     Recheck: A1=G4 vs A2=C4 \u2713; A1=A4 vs A2=E4 \u2713; A1=G4 vs A2=D4 \u2713; A1=F4 vs A2=C4 \u2713. \u2713\n%     S1=D4 (beat 3 8th), A2=C4 \u2014 no unison \u2713. S1=F4 (beat 4 8th), A2=E4 \u2014 no unison \u2713.\n%\n% T1 (written): D/E/ G/A/ G F = concert D3E3 G3A3 G3 F3\n% T2 (written): B,/C/ E/F/ E D = concert B2C3 E3F3 E3 D3\n%   Check T voices: T1=D4E4G4A4G4F4 written, T2=B3C4E4F4E4D4 written\n%   T2 vs T1: T1 D4 T2 B3 \u2713; E4 vs C4 \u2713; G4 vs E4 \u2713; A4 vs F4 \u2713; G4 vs E4 \u2713; F4 vs D4 \u2713. No crossing \u2713.\n%   T1 vs A2 (cross-choir): A2=A3B3C4E4D4C4 concert; T1=D3E3G3A3G3F3 concert. Fine (T below A).\n%\n% Bar: D3/8 E3/8 F3/8 A3/8 E3dotted F3/8\n% B1: B2/8 C3/8 D3/8 F3/8 C3dotted D3/8 (original bass)\n% ============================================================\n[V:1] B,/ C/ D/ F/ E D |\n[V:2] A,/ B,/ B,/ D/ C B, |\n[V:3] D/ E/ G/ A/ G F |\n[V:4] A,/ B,/ C/ E/ D C |\n[V:5] D/ E/ G/ A/ G F |\n[V:6] B,/ C/ E/ F/ E D |\n[V:7] D,/ E,/ F,/ A,/ E,3/2 F,/ |\n[V:8] B,,/ C,/ D,/ F,/ C,3/2 D,/ |\n%\n% ============================================================\n% BAR 8 \u2014 2-beat final. Full C major cadence.\n% All voices land on chord tones of C major.\n% S1=C4, S2=E4, A1=G4\u2192too high? No: A1 range F3-D5, G4 fine.\n%   Actually for final bar, use close position:\n%   S1=C4, S2=E4, A1=G4, A2=E4 \u2014 A1=A2=G4? No.\n%   Let S1=C4, S2=E4, A1=G3, A2=E3\n%   A1=G3: range F3-D5 \u2713. A2=E3: range D3-B4 \u2713.\n%   SSAA distinct: C4, E4, G3, E3 \u2014 A1=A2? No: G3\u2260E3 \u2713. S2=A1? E4\u2260G3 \u2713. 3+ pitches \u2713.\n%   T1(written)=G4 concert G3, T2(written)=E4 concert E3\n%   Bar=E3, B1=C3\n%   TTBB: concert T1=G3, T2=E3, Bar=E3, B1=C3. T2=Bar=E3 unison \u2014 allowed at cadence (same pair? No: T2 and Bar are cross-choir. Cross-choir unisons permitted. \u2713)\n% ============================================================\n[V:1] C2 |]\n[V:2] E2 |]\n[V:3] G,2 |]\n[V:4] E,2 |]\n[V:5] G2 |]\n[V:6] E2 |]\n[V:7] E,2 |]\n[V:8] C,2 |]\n";
