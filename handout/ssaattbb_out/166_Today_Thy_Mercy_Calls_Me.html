B, A, A, |\n[V:4] A, G, F, E, |\n[V:5] e  b  d' c' |\n[V:6] c  e  b  a |\n[V:7] C, B,, A,, A,, |\n[V:8] F, C, D, A,, |\n%\n% --- Bar 14:  B2 B c (S1) ---\n% Original alto ^D \u2192 D (diatonic); T1/T2 carry chromatic-free descent\n% B1 follows original bass (G, F,) E, A,,; Bar harmonizes above\n[V:1] B2  B  c |\n[V:2] G2  G  E |\n[V:3] E2  E  A, |\n[V:4] B,2 D  E |\n[V:5] (b a) g  a |\n[V:6] (g f) e  e |\n[V:7] (B, A,) G, A, |\n[V:8] (G, F,) E, A,, |\n%\n% --- Bar 15:  d B A G (S1 \u2014 stepwise descent, penultimate) ---\n% Harmony: IV V I V; T1 pushes to f'=F#4 for climax color\n[V:1] d  B  A  G |\n[V:2] F  G  E  E |\n[V:3] A, E  C  B, |\n[V:4] D  B, A, G, |\n[V:5] f' e' c' b |\n[V:6] d' b  a  g |\n[V:7] D, E, F, E, |\n[V:8] D, D, E, E, |\n%\n% --- Bar 16:  A3 (final PAC; all voices sustain A major) ---\n% S1=A4, S2=E4, A1=C#4, A2=A3 | T1=C#4(snd), T2=A3(snd), Bar=C#3, B1=A2\n% 4+4 distribution in both choirs\n[V:1] A3 !eintro!|]\n[V:2] E3 |]\n[V:3] C3 |]\n[V:4] A,3 |]\n[V:5] c'3 |]\n[V:6] a3 |]\n[V:7] C,3 |]\n[V:8] A,,3 |]\n";
