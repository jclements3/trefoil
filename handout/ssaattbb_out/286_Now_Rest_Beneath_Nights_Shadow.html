var abc_src = "X: 286\nT: Now Rest Beneath Night's Shadow\nT: (also known as Now All the Woods Are Sleeping)\nC: Words: Paul Gerhardt, 1648. Translation composite before 1941.\nC: Music: 'Innsbruck' Heinrich Isaac, 1490. Setting: J. S. Bach, 1734.\nC: copyright: public domain. Open Hymnal Project, 2010 Revision.\nC: SSAATTBB arrangement for 8-voice ensemble and lever harp.\nM: 4/4\nL: 1/4\nQ: 1/4=84\nK: G\n%%staves {(V1 V2) (V3 V4) (V5 V6) (V7 V8)}\nV:1 name=\"Soprano I\"   clef=treble\nV:2 name=\"Soprano II\"  clef=treble\nV:3 name=\"Alto I\"      clef=treble\nV:4 name=\"Alto II\"     clef=treble\nV:5 name=\"Tenor I\"     clef=treble middle=B3 transpose=-12\nV:6 name=\"Tenor II\"    clef=treble middle=B3 transpose=-12\nV:7 name=\"Baritone\"    clef=bass\nV:8 name=\"Bass I\"      clef=bass\n%\n% ============================================================\n% SECTION 1  (1-beat pickup + bars 1\u20134, last bar = 3 beats)\n%\n% Texture: TTBB voices alone on pickup beat; SSAA enter bar 1.\n% This creates an antiphonal opening: low choir announces,\n% upper choir responds with the melody.\n%\n% G major. Diatonic scale: G A B C D E F#.\n% All inner voices (S2 A1 A2 T1 T2 Bar B1) diatonic only.\n% S1 may use accidentals \u2014 none required in this section.\n%\n% Pitch reference (concert): B4=B, c'=C5, d'=D5, A4=A\n% T1/T2 written 8vb treble: written B = sounds B3, written c = sounds C4\n% Bar/B1 bass clef: G,=G3, G,,=G2, G,,,=G1; D,=D3, D,,=D2\n%\n% Bar 1: G A B/c/ d   (S1 soprano line; L=1/4 so B/c/=2 eighths = 1 beat)\n% Harmony beat by beat: G | Am | Bm | G\n%\n% Bar 2: c2 !fermata!B B/c/   = C5(2 beats)+ferm+B4+B4/C5 eighths = 4 beats\n% Harmony: C sus | G | G | G\n%\n% Bar 3: d d A B  (4 quarter notes)\n% Harmony: G | G | D | G\n%\n% Bar 4 (3 beats): G2 !fermata!F\n% Harmony: G sus | G | D (leading to next section)\n% ============================================================\n%\n% S1 follows original soprano exactly.\n[V:1] [Q:1/4=84] B | G A B/c/ d | c2 !fermata!B B/c/ | d d A B | G2 !fermata!F |\n%\n% S2 harmonizes S1 in diatonic thirds below, moving to sixths at phrase endings.\n% Bar 1: E F G A (thirds below S1: G-E, A-F#\u2192use F for smoother line, B-G, d-B\u2192A)\n%   Actually: S1=G A Bc d \u2192 thirds below: E F# G/A/ B \u2192 use E F G/A/ B (F# written F in key)\n%   S2 bar1: E F G A (F = F# in key sig) \u2713 all diatonic\n% Bar 2: A G G G (S1=c c B Bc \u2192 thirds below: A A G G) \u2014 note slur removed for clarity\n% Bar 3: B B F G (S1=d d A B \u2192 thirds below: B B F# G \u2192 F# written F in key)\n% Bar 4: E D D (S1=G G F \u2192 thirds: E E D; original S1V2 had (D ^C) D \u2192 replace with (E D) D)\n[V:2]  G | E F G A | (A G) G G | B B F G | (E D) D |\n%\n% A1: independent diatonic inner voice. Stepwise, contrary motion to S1 where possible.\n% Bar1: C D E E (ascending inner, below S2)\n% Bar2: E D D D (sustained after motion, smooth)\n% Bar3: G F E D (descending contrary to S1)\n% Bar4: D C B, (stepwise descent; 3 beats)\n[V:3]  D | C D E E | (E D) D D | G F E D | D C B, |\n%\n% A2: diatonic, contrary to A1 where possible. Stays below A1 always.\n% Bar1: G, A, B, C (ascending in thirds below A1 roughly \u2014 G3 A3 B3 C4)\n%   A1=C D E E; A2=G, A, B, C \u2192 A2 is a fifth/sixth below. This opens nicely.\n% Bar2: C B, B, A, (descent)\n% Bar3: D D C B, (gentle descent in contrary motion to A1's descent... actually A1 descends,\n%         A2 should ascend for contrary: B, C D E \u2192 but must stay below A1)\n%   A1 bar3: G F E D. For contrary: A2 could go B, B, C D. That's below A1. \u2713\n% Bar4: G, F, G, (3 beats; approach from below to root)\n[V:4]  B, | G, A, B, C | (C B,) B, A, | B, B, C D | G, F, G, |\n%\n% T1 written in 8vb treble (sounds an octave lower than written).\n% Written pitch = concert pitch + octave.\n% Target concert: D3-G4 range for comfortable tenor.\n% Written: D4-G5 (comfortable T1 range).\n%\n% T1 follows original tenor harmony (S2V1) recomposed as melodic line.\n% Original S2V1 pickup: D4 \u2192 written D5... actually let me use written octave consistently:\n%   Concert B3 = written B4, Concert D4 = written D5 \u2014 getting high.\n%   Better: Concert D3 = written D4, Concert G3 = written G4.\n%   So \"written D\" in the 8vb treble voice = concert D3, \"written B\" = concert B3.\n%   Using ABC in 8vb treble staff: D = concert D3, B = concert B3, c = concert C4, g = concert G4.\n%\n% Pickup: D (concert D3, comfortable opening)\n% Bar1: D E F G (ascending D3-G3, smooth and independent of SSAA)\n% Bar2: G G F E (descent; T1=G3 under bar2's C5 in S1 \u2014 fine spacing)\n% Bar3: B A F G (B3 A3 F#3 G3 \u2014 follows original tenor D D D F# shape, diatonic)\n%   Original S2V1 bar3: D D D F, \u2192 concert D4 D4 D4 F#3... for T1 line: B A F G (B3 A3 F#3 G3)\n% Bar4: D E D (3 beats; D3 E3 D3 \u2014 gentle motion at fermata)\n%   Original S2V1 bar4: (G,/F,/ G,) A, \u2192 G3 F#3 G3 A3; for T1: D E D (3 beats)\n[V:5]  D | D E F G | (G G) F E | B A F G | D E D |\n%\n% T2 harmonizes a third below T1 (written), diatonic.\n% Pickup: B, (concert B2, written B3 in 8vb treble \u2192 but B, in ABC = B3 written...\n%   In ABC standard: B = B4, B, = B3. In 8vb treble clef the written B4 sounds B3.\n%   So written \"B\" (no comma) in [V:5/6] = sounds B3. Written \"B,\" = sounds B2. \u2713\n%   T2 pickup: G (written G4 sounds G3, a third below T1's written D(sounds D3))\n%   Wait: T1 pickup written D sounds D3; T2 a third below concert = B2 = written B, in 8vb.\n%   Use B, for T2 pickup (concert B2, written B3 in 8vb = ABC \"B,\")\n%\n% Bar1: B, C D E (third below T1: D\u2192B, E\u2192C, F#\u2192D, G\u2192E \u2014 written, diatonic) \u2713\n% Bar2: E E D C (third below T1: G\u2192E, G\u2192E, F#\u2192D, E\u2192C)\n% Bar3: G F D E (third below: B\u2192G, A\u2192F#, F#\u2192D, G\u2192E)\n% Bar4: B, C B, (3 beats; third below T1: D\u2192B, E\u2192C, D\u2192B)\n[V:6]  B, | B, C D E | (E E) D C | G F D E | B, C B, |\n%\n% Baritone: harmonizes a sixth above B1, following chord tones. Bass clef.\n% Concert range E2\u2013C4. ABC bass clef: D,=D3, D,,=D2, C,,=C2.\n% Pickup: D, (D3, a fifth above B1's G,,=G2)\n% Bar1: follows smooth line above B1 original bass (C/B/ A G3/2 F/)\n%   B1 bar1: C,/B,,/ A,, G,,3/2 F,,/ (C3 B2 A2 G2.dotted F#2)\n%   Bar: E, C, D, D, (E3 C3 D3 D3 \u2014 chord tones above bass)\n%   Or: G, F, E, D, (G3 descending, parallels B1 shape a sixth up \u2192 check parallel octaves with S2)\n%   Use: E, D, C, D, (E3 D3 C3 D3 \u2014 free inner motion, no parallel issues)\n% Bar2: E, D, D, D, (E3 D3 D3 D3 \u2014 held inner voice under fermata)\n%   Original S2V1: (G, D) D E \u2192 G3 D3 D3 E3; Bar: E, D, D, E, matches well.\n% Bar3: F, G, A, B, (ascending, contrary to B1's chromatic passings; all diatonic \u2713)\n%   B1 bar3: B,,/A,,/ B,,/C,/ D,/C,/ B,, = B2...\n%   Bar: F, G, A, B, (F#3 G3 A3 B3 \u2014 strong bass motion upward)\n% Bar4: B, G, A, (3 beats; B3 G3 A3 \u2014 tonic arpeggio at fermata)\n%   Original S2V1 bar4: (G,/F,/ G,) A, \u2192 adapt Bar: B, G, A,\n[V:7]  D, | E, D, C, D, | (E, D,) D, E, | F, G, A, B, | B, G, A, |\n%\n% B1 follows original bass closely. Bass clef.\n% Concert range C2\u2013A3. ABC: G,,=G2, G,,,=G1, D,,=D2, C,,=C2.\n% Pickup: G,, (G2)\n% Bar1: C,/B,,/ A,, G,,3/2 F,,/ (as original: C3 B2 eighth + A2 + G2 dotted + F#2 eighth)\n% Bar2: (E,, F,,) G,, E,, (as original: E2-F#2 slur + G2 + E2)\n% Bar3: B,,/A,,/ B,,/C,/ D,/C,/ B,, (as original: B2-A2-B2-C3-D3-C3-B2 in eighths)\n% Bar4: E,,2 D,, (as original: E2 half + D2; 3 beats)\n[V:8]  G,, | C,/B,,/ A,, G,,3/2 F,,/ | (E,, F,,) G,, E,, | B,,/A,,/ B,,/C,/ D,/C,/ B,, | E,,2 D,, |\n%\n% ============================================================\n% SECTION 2  (1-beat pickup + bars 5\u20138, last bar = 3 beats)\n%\n% Texture: Full 8-voice block homophony. All voices move together\n% (syllabic, hymn-style). Maximum weight and corporate sound.\n%\n% Bar 5: G A B B   (S1)\n% Harmony: G | Am | Bm | Bm\n%\n% Bar 6: !fermata!A3 B   = A dotted-half + B quarter = 4 beats\n% Harmony: D  (long)  | G\n%\n% Bar 7: G A B/c/ d   (same shape as bar 1)\n% Harmony: G | Am | Bm | G\n%\n% Bar 8 (3 beats): c2 !fermata!B\n% Harmony: C | G fermata\n% ============================================================\n%\n% Pickup: S1=D4. Original S1V2 pickup=A,3... that's A3. Section 2 pickups:\n%   S1=D4, S2=A3(=A,), A1=F#4(=F), A2=D4(=D), T1=F#(written,=F#3sounding),\n%   T2=D(written,=D3sounding), Bar=C,(C3), B1=C,,(C2)\n%   Note: original S2V1 pickup = F,/E,/ (two eighths); simplify to F, (quarter)\n[V:1]  D | G A B B | !fermata!A3 B | G A B/c/ d | c2 !fermata!B |\n%\n% S2 bar5: E F G G (thirds below S1: G\u2192E, A\u2192F#, B\u2192G, B\u2192G; F# written F \u2713)\n% S2 bar6: F3 G (F#4 dotted-half + G4 quarter; third below A4, G4 \u2014 diatonic \u2713)\n% S2 bar7: E D D E (S1=G A Bc d; varied harmonization this time \u2014 S2 moves more independently)\n% S2 bar8: A G G (3 beats; S1=c c B; thirds below: A A G; all diatonic \u2713)\n% Pickup A, = A3 \u2713 (below S2's range bottom A3, just at limit)\n[V:2]  A, | E F G G | !fermata!F3 G | E D D E | (A G) G |\n%\n% A1 bar5: B, C D D (ascending inner beneath S2, chord tones G-Am-Bm)\n% A1 bar6: D3 E (D4 dotted-half + E4; D chord = D F# A; D4 \u2713)\n% A1 bar7: D E F F (ascending, same shape as bar1 A1 \u2014 unifying motif)\n% A1 bar8: A G G (3 beats; A4 G4 G4 \u2014 stepwise inner voice)\n% Pickup F = F#4 \u2713\n[V:3]  F | B, C D D | D3 E | D E F F | A G G |\n%\n% A2 bar5: G, A, B, B, (third below A1 roughly; G3 A3 B3 B3)\n% A2 bar6: A,3 B, (A3 dotted-half + B3; third below A1's D4; \u2713 diatonic)\n% A2 bar7: B, C D D (ascending \u2014 A2 follows A1 more closely here for blend)\n%   Actually A2 should be below A1: A1=D E F F, A2 stay below: B, C D D \u2713 (B3 C4 D4 D4, A1=D4 E4 F#4 F#4)\n% A2 bar8: F E E (3 beats; F#4 E4 E4 \u2014 thirds below A1's A4 G4 G4 \u2192 F#4 E4 E4 \u2713; F written=F# \u2713)\n% Pickup D = D4 \u2713\n[V:4]  D | G, A, B, B, | A,3 B, | B, C D D | F E E |\n%\n% T1 bar5: D E F G (D3\u2192G3 ascending, mirrors bar1 \u2014 unifying motif)\n%   Original S2V1: D, E,/F,/ G, G, \u2192 D3 E3-F#3(8ths) G3 G3; T1: D E F G written \u2713\n% T1 bar6: c3 B (C4 dotted-half + B3 \u2014 top of comfortable T1 range; bar6 is climax of sec.2)\n%   D chord: D F# A C \u2014 C4 (7th) is a good inner voice here.\n%   Original S2V1 bar6: F,3 B, \u2192 F#3 dotted-half + B3; T1: c3 B (climax) \u2713\n% T1 bar7: B c d E (B3 C4 D4 E3... wait \u2014 need to stay within range and avoid voice cross)\n%   T1 bar7: let's use B c d e (B3 C4 D4 E4 \u2014 ascending; written in 8vb: B c d e \u2713)\n%   Check against A2 bar7=B, C D D (B3 C4 D4 D4 concert) \u2014 T1 and A2 share pitches\n%   A2-T1 cross-choir unison is explicitly permitted. \u2713\n% T1 bar8: e d d (3 beats; E4 D4 D4 concert \u2014 written e d d in 8vb; climactic bar)\n%   Original S2V1 bar8: A,/B,/C/D/ E \u2192 A3-B3-C4-D4-E4; T1: e d d \u2713 (stepwise descent after climb)\n% Pickup F (written) = F#3 concert \u2713\n[V:5]  F | D E F G | !fermata!c3 B | B c d e | e d d |\n%\n% T2 bar5: B, C D D (third below T1: D\u2192B, E\u2192C, F#\u2192D, G\u2192E... third below G is E; use B,C D E)\n%   Thirds below: D\u2192B, E\u2192C, F\u2192D, G\u2192E \u2192 B, C D E \u2713 (written, diatonic)\n%   But D D in T1 bar5 \u2192 T2: B, B, \u2014 avoid T2 repeating a note while T1 moves\n%   Use B, C D E (third below each T1 note: D B\u2192 wait D-B is a third, E-C is a third, F#-D is a third, G-E is a third \u2713)\n% T2 bar6: A,3 G, (A3 G3 dotted-half... third below T1's c=C4: A3; then below B3: G3 \u2713)\n% T2 bar7: G A B c (third below T1 B c d e: G A B c \u2713 written; all diatonic \u2713)\n% T2 bar8: c B B (3 beats; third below T1's e d d: c B... wait third below E=C, D=B \u2713)\n% Pickup D (written) = D3 concert \u2713\n[V:6]  D | B, C D E | !fermata!A,3 G, | G A B c | c B B |\n%\n% Bar bar5: G, A, G, G, (G3 A3 G3 G3 \u2014 smooth inner bass)\n%   Original S2V1 bar5: D, E,/F,/ G, G, \u2192 adapted for Bar: G, A, G, G, (sixth above B1's B,, A,,...)\n%   Actually check: B1 bar5 = B,, A,, G,,/A,,/ B,,/C,/ \u2014 Let Bar be a 6th above:\n%   B,,=B2 \u2192 sixth above = G3=G,; A,,=A2 \u2192 F#3=F,; etc. Use G, F, E, D, for smoother line.\n% Bar bar5: G, F, E, D, (G3 F#3 E3 D3 \u2014 descending inner bass line; diatonic \u2713)\n% Bar bar6: F,3 G, (F#3 dotted-half + G3 \u2014 original S2V1 bar6 was F,3 B, \u2192 use F,3 G,)\n%   Original S2V2 bar6: D,3 ^D, \u2192 replace ^D, with diatonic D, (D3 quarter \u2192 but we have G, for the 4th beat)\n%   Bar bar6: F,3 G, \u2713\n% Bar bar7: E, D, G, E, (E3 D3 G3 E3 \u2014 inner bass motion; sixth above B1's E,, F,, G,, G,,)\n%   Sixth above B1 bar7=E,,\u2192C3=C,; F,,\u2192D3=D,; G,,\u2192E3=E,; G,,\u2192E3;\n%   Use: C, D, E, E, for clearer sixths. Or: E, D, G, E, for more melodic interest.\n%   Use: C, D, E, E, \u2713 (diatonic, stays above B1)\n% Bar bar8: A, G, E, (3 beats; A3 G3 E3 \u2014 cadential inner bass)\n%   Sixth above B1 bar8=(A,, A,,,) E,, \u2192 A2 A1 E2 \u2192 sixth above: F#3 F#2 C3...\n%   That's too jumpy. Use: A, G, E, (diatonic, smooth descent \u2713)\n% Pickup C, = C3 \u2713\n[V:7]  C, | G, F, E, D, | !fermata!F,3 G, | C, D, E, E, | A, G, E, |\n%\n% B1 follows original bass for section 2.\n% Pickup C,, = C2 \u2713 (original S2V2 pickup = C, = C3... wait: in original,\n%   S2V2 is bass clef with C, = C3 by ABC convention; our B1 should go lower.\n%   Original bass pickup: C, = C3 \u2192 B1: C,, = C2 (one octave lower for depth) \u2713\n% Bar5: B,,/A,,/ B,,/C,/ \u2192 wait original S2V2 bar5: B,, A,, G,,/A,,/ B,,/C,/\n%   This is B2 A2 G2(8)A2(8) B2(8)C3(8) = 4 beats \u2713\n%   B1 bar5: B,,, A,,, G,,,/A,,,/ B,,,/C,,/ \u2192 one octave below... G1 is very low!\n%   Keep at original octave: B,, A,, G,,/A,,/ B,,/C,/ (B2 A2 G2 A2 B2 C3) \u2713\n% Bar6: D,,3 ^D,,\u2192replace with D,,3 E,,  (original was D,3 ^D, \u2192 D#3 replaced with E3=E,, in our notation)\n%   Use D,,3 E,, \u2713 (D2 dott
