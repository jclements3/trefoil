rors r1-4 with slight variation\n% r13-15: entering on E, climbing to G\n[V:3] |: E E E | E2 E | (E C) B, | E3 |\n        B, B, C | C2 B, | (C A,) B, | G,3 |\n        D E E | E2 E | (E C) B, | E3 |\n        z E G | F3 | G3 :|\n%\n% ---- V4 (A2): contrary motion to A1, lower alto ----\n% r1: C C C | C2 C | (C A,) G, | C3\n% r5: G, G, A, | A,2 G, | (F, G,) A, | B,3\n% r9-12: mirrors\n% r13-15: C E | D3 | E3\n[V:4] |: C C C | C2 C | (C A,) G, | C3 |\n        G, G, A, | A,2 G, | (A, G,) F, | G,3 |\n        B, C C | A,2 C | (C A,) G, | C3 |\n        z C E | D3 | E3 :|\n%\n% ---- V5 (T1): written 8vb; concert pitch = written - octave ----\n% r1-4: E E E | E2 E | (D F) E | D3   concert: E3E3E3 | E3E3E3 | D3F#3E3 | D#3\n% r5-8: antiphonal answer \u2014 TTBB lead here\n%   B, B, B, | C2 B, | (C B,) A, | B,3  concert: B2B2B2 | C#3C#3B2 | C#3B2A2 | B2\n% r9-12: mirrors r1-4\n% r13-15: B, B,3 B,3\n[V:5] |: E E E | E2 E | (D F) E | D3 |\n        B, B, B, | C2 B, | (C B,) A, | B,3 |\n        D E E | E2 E | (D F) E | D3 |\n        z E B, | B,3 | B,3 :|\n%\n% ---- V6 (T2): written 8vb; contrary motion to T1 ----\n% r1-4: C C C | C2 C | (B, D) C | B,3   concert: C#3 | B2 D#3 C#3 | B2\n% r5-8: G, G, G, | A,2 G, | (G, F,) E, | G,3  concert: G#2 | A2 G#2 | G#2F#2E2 | G#2\n% r9-12: mirrors\n% r13-15: G, G,3 G,3\n[V:6] |: C C C | C2 C | (B, D) C | B,3 |\n        G, G, G, | A,2 G, | (G, F,) E, | G,3 |\n        B, C C | C2 C | (B, D) C | B,3 |\n        z C G, | G,3 | G,3 :|\n%\n% ---- V7 (Baritone, bass clef): independent line above B1, range E2-A3 comfortable ----\n% r1-4: B, B, G, | B,2 G, | (B, A,) E, | G,3\n%   concert: B3 B3 G#3 | B3 B3 G#3 | B3 A3 E3 | G#3\n% r5-8: B, G, G, | A, B, A, | (B, A,) G, | G,3\n%   concert: B3 G#3 G#3 | A3 B3 A3 | B3 A3 G#3 | G#3\n% r9-12: mirrors r1-4\n% r13-15: z B, G, | D,3 | G,3  \u2014 cadence to G#3\n[V:7] |: B, B, G, | B,2 G, | (B, A,) E, | G,3 |\n        B, G, G, | A, B, A, | (B, A,) G, | G,3 |\n        B, B, G, | B,2 G, | (B, A,) E, | G,3 |\n        z B, G, | D,3 | G,3 :|\n%\n% ---- V8 (B1): follows original bass, diatonic ----\n[V:8] |: E, E, E, | A,2 E, | (G, F,) C, | B,,3 |\n        E, E, E, | C,2 G, | (C, F,) C, | B,,3 |\n        E, E, E, | A,2 E, | (G, F,) C, | B,,3 |\n        z G, E, | B,,3 | E,3 :|\n%\n% =============================================================\n% DA CAPO INTRO \u2014 all 8 voices present, climactic restatement\n%\n% Climax: bar 5 of intro (B B e) \u2014 S1 reaches E5, B1 on E3 (G#3 beat 2)\n% Full spread at bar 5: S1=E5 top, B1=E3, ensemble spans >2 octaves\n% T1 and T2 now active from pickup, filling out the texture\n% =============================================================\n%\n[V:1] z G G | A3 | G B B | c3    | B B e | d3   | e2 z |]\n[V:2] z E E | F3 | E G G | A3    | G G c | B3   | B2 z |]\n[V:3] z C C | E3 | B, E E | E3   | E E G | F3   | G2 z |]\n[V:4] z A, A, | A,3 | G, B, B, | C3 | C C E | D3 | E2 z |]\n[V:5] z E E | A3  | E G G | A3   | G G B | B3   | B2 z |]\n[V:6] z C C | E3  | C E E | E3   | E E G | G3   | G2 z |]\n[V:7] z G, B, | C,3 | B, G, G, | A,3 | G, B, G, | F,3 | G,2 z |]\n[V:8] z E, E, | A,,3 | E, E, E, | A,,3 | E, G, E, | B,,3 | E,2 z |]\n";
