<script>
var abc_src = "X: 1\nT: Were You There?\nC: Words: African-American Spiritual, before 1899.\nC: Music: Were You There, African-American Spiritual, before 1899. Setting: attr. Charles Winfred Douglas, 1940.\nC: SSAATTBB arrangement.\nC: copyright: public domain. This score is a part of the Open Hymnal Project, 2013 Revision.\nM: none\nL: 1/4\nQ: 1/4=72\n%%staves {(V1 V2) (V3 V4) (V5 V6) (V7 V8)}\nV:1 name=\"Soprano I\"  clef=treble\nV:2 name=\"Soprano II\" clef=treble\nV:3 name=\"Alto I\"     clef=treble\nV:4 name=\"Alto II\"    clef=treble\nV:5 name=\"Tenor I\"    clef=treble middle=B3 transpose=-12\nV:6 name=\"Tenor II\"   clef=treble middle=B3 transpose=-12\nV:7 name=\"Baritone\"   clef=bass\nV:8 name=\"Bass I\"     clef=bass\nK: E\n%\n% Pitch reference (K:E, vocal treble convention: written uppercase = C4-B4 octave):\n%   Treble V1-V4: B, = B3, C = C#4, D = D#4, E = E4, F = F#4, G = G#4, A = A4, B = B4\n%                 c = C#5, d = D#5, e = E5\n%                 G, = G#3, F, = F#3, E, = E3, D, = D#3\n%   Tenor V5-V6 (middle=B3, transpose=-12): visual pitch sounds one octave lower.\n%                 E = E3 visual, sounds E2. G = G#3 visual, sounds G#2. B = B3 visual, sounds B2.\n%                 e = E4 visual, sounds E3. g = G#4 visual, sounds G#3. b = B4 visual, sounds B3.\n%                 e' = E5 visual, sounds E4. g' = G#5 visual, sounds G#4.\n%   Bass  V7-V8: C, = C2, E, = E2, G, = G#2, B, = B2, C = C3, E = E3, G = G#3, B = B3\n%\n% T1 comfort range (B2-G4 concert): written B to g' in V5\n% T2 comfort range (G2-E4 concert): written G to e' in V6\n% Visual rule: V5 written notes must appear visually ABOVE V6 written notes on the shared staff.\n%\n% \u2500\u2500\u2500 Section A: \"Were you there when they crucified my Lord?\" \u2500\u2500\u2500\n%\n% m.1 Pickup (2 beats). S1 leads; inner voices enter quietly.\n% Concert: S1=B3-E4, S2=B3-B3, A1=G#3-B3, A2=E3-G#3,\n%          T1=E3-E3(written e-e), T2=C#3-B2(written c-B), Bar=E2-G#2, B1=E2-B2\n[V:1] B, E |\n[V:2] B, B, |\n[V:3] G, B, |\n[V:4] E, G, |\n[V:5] e e |\n[V:6] c B |\n[V:7] E, G, |\n[V:8] E, B, |\n%\n% m.2 E major tonic. Full 8 voices. Homophony.\n% Concert: S1=G#4-G#4-G#4, S2=E4-E4-E4, A1=B3-B3-B3, A2=G#3-G#3-G#3,\n%          T1=B2-B2-B2(written B-B-B), T2=G#2-G#2-G#2(written G-G-G), Bar=G#2-G#2-G#2, B1=E2-E2-E2\n[V:1] G2 G G |\n[V:2] E2 E E |\n[V:3] B,2 B, B, |\n[V:4] G,2 G, G, |\n[V:5] B2 B B |\n[V:6] G2 G G |\n[V:7] G,2 G, G, |\n[V:8] E,2 E, E, |\n%\n% m.3 Moving toward B major (dominant). F#4-E4-G#4-F#4 in S1.\n% Concert: S2=D#4-C#4-D#4-D#4, A1=B3-B3-B3-A3, A2=G#3-G#3-G#3-F#3,\n%          T1=D#3-C#3-D#3-D#3(written d-c-d-d), T2=B2-B2-B2-A2(written B-B-B-A),\n%          Bar=B2-B2-B2-B2, B1=B2-C#3-B2-B2\n[V:1] F E G3/2 F/ |\n[V:2] D C D3/2 D/ |\n[V:3] B, B, B,3/2 A,/ |\n[V:4] G, G, G,3/2 F,/ |\n[V:5] d c d3/2 d/ |\n[V:6] B B B3/2 A/ |\n[V:7] B, B, B,3/2 B,/ |\n[V:8] B, C B,3/2 B,/ |\n%\n% m.4 Fermata. E major tonic. 4 beats. Full texture.\n% Concert: S1=E4-E4-G#4, S2=B3-B3-E4, A1=G#3-G#3-B3, A2=E3-E3-G#3,\n%          T1=B2-B2-E3(written B-B-e), T2=G#2-G#2-B2(written G-G-B), Bar=E2-E2-E2, B1=E2-E2-E2\n[V:1] !fermata!E2 E G |\n[V:2] !fermata!B,2 B, E |\n[V:3] !fermata!G,2 G, B, |\n[V:4] !fermata!E,2 E, G, |\n[V:5] !fermata!B2 B e |\n[V:6] !fermata!G2 G B |\n[V:7] !fermata!E,2 E, E, |\n[V:8] !fermata!E,2 E, E, |\n%\n% m.5 B major dominant. 4 beats. Inner voices arpeggiate upward.\n% Concert: S1=B4-B4-B4, S2=D#4-E4-F#4, A1=B3-D#4-E4, A2=G#3-B3-D#4,\n%          T1=D#3-E3-F#3(written d-e-f), T2=B2-B2-D#3(written B-B-d), Bar=B2-D#3-E3, B1=B2-B2-B2\n[V:1] B2 B B |\n[V:2] D2 E F |\n[V:3] B,2 D E |\n[V:4] G,2 B, D |\n[V:5] d2 e f |\n[V:6] B2 B d |\n[V:7] B,2 D E |\n[V:8] B,2 B, B, |\n%\n% m.6 C#5-B4-B4-G#4 soprano. A major / E major. 4 beats.\n% S2: E4-F#4-G#4-E4 (third below S1). A1: C#4-D#4-E4-C#4 (third below S2; distinct from S2).\n% A2: A3-B3-C#4-A3 (third below A1; avoids S/A unison).\n% T1 concert: E3-F#3-G#3-E3 (written e-f-g-e). T2 concert: C#3-D#3-E3-C#3 (written c-d-e-c).\n% Bar: A2-B2-B2-B2. B1: A2-B2-B2-B2.\n[V:1] c B B3/2 G/ |\n[V:2] E F G3/2 E/ |\n[V:3] C D E3/2 C/ |\n[V:4] A, B, C3/2 A,/ |\n[V:5] e f g3/2 e/ |\n[V:6] c d e3/2 c/ |\n[V:7] A, B, B,3/2 B,/ |\n[V:8] A, B, B,3/2 B,/ |\n%\n% m.7 F#4 whole note. B major / E major sustained. Reduced texture (mf).\n% Concert: S1=F#4, S2=D#4, A1=B3, A2=G#3,\n%          T1=F#3(written f), T2=D#3(written d), Bar=B2, B1=B2\n[V:1] F4 |\n[V:2] D4 |\n[V:3] B,4 |\n[V:4] G,4 |\n[V:5] f4 |\n[V:6] d4 |\n[V:7] B,4 |\n[V:8] B,4 |\n%\n% m.8 Climax build! S1 slur begins (continues into m.9). Tutti, forte.\n% S1: B4 half, E5 dotted-qtr, C#5 eighth.\n% S2: G#4, D#4, E4, A4. A1: E4, B4, B4(dotted), F#4. A2: D#4, G#4, G#4(dotted), E4.\n% T1 concert: D#3, A2... A2 < T1 min B2. Fix T1 beat2: B2(written B).\n%   T1: D#3, B2, B3, F#3 \u2192 written d, B, b, f.\n%   Chk visual: d(D#4)>B(B3)\u2713; b(B4)>f(F#4)? b=B4>f=F#4 \u2713.\n% T2 concert: B2, F#3... written B, f. But then T2 f=F#4 visual > T1 B=B3 visual (beat2).\n%   Fix: T2 beat2 use lower: concert F#2(below T2 min G2)... not possible.\n%   Use T2 concert: B2, D#3, E3, C#3 \u2192 written B, d, e, c.\n%   Visual: T1 d(D#4)>T2 B(B3)\u2713; T1 B(B3)=T2 d(D#4)? T1=B3, T2=d(D#4). T2>T1 visually \u2014 crossing!\n%   Revise: T1 beat2 raise to e(E3 concert, written e=E4 visual). T2 beat2 = B(B2 concert, written B=B3 visual). e>B visually \u2713.\n%   T1: D#3,E3,B3,F#3 \u2192 written d,e,b,f. T2: B2,B2,D#3,C#3 \u2192 written B,B,d,c.\n%   Visual: d>B\u2713, e>B\u2713, b(B4)>d(D#4)\u2713, f(F#4)>c(C#4)\u2713. All T1 visual above T2 \u2713.\n% Bar concert: G#2, D#3, E3, C#3. B1 concert: E2, B2, G#2, A2.\n[V:1] (B2 e3/2 c/ |\n[V:2] (G D E A |\n[V:3] (E B B3/2 F/ |\n[V:4] (D G G3/2 E/ |\n[V:5] (d e b3/2 f/ |\n[V:6] (B B d3/2 c/ |\n[V:7] (G, D E3/2 C/ |\n[V:8] (E, B, G,3/2 A,/ |\n%\n% m.9 Resolution. S1 B4 whole (slur closes). All voices descend stepwise.\n% Concert: S1=B4, S2=G#4-F#4-E4-E4, A1=E4-D#4-C#4-C#4, A2=D#4-C#4-B3-B3,\n%          T1=E3-D#3-C#3-C#3(written e-d-c-c), T2=B2-A2-G#2-G#2(written B-A-G-G),\n%          Bar=B2-A2-G#2-G#2, B1=E2-D#2-C#2-C#2\n% Visual check T1>T2: e(E4)>B(B3)\u2713, d(D#4)>A(A3)\u2713, c(C#4)>G(G#3)\u2713, c>G\u2713.\n[V:1] B4) |\n[V:2] G F E2) |\n[V:3] E D C2) |\n[V:4] D C B,2) |\n[V:5] e d c2) |\n[V:6] B A G2) |\n[V:7] B, A, G,2) |\n[V:8] E, D, C,2) |\n%\n% \u2500\u2500\u2500 Section B: \"Oh! Sometimes it causes me to tremble\u2026\" \u2500\u2500\u2500\n% Antiphonal: SSAA strong, TTBB echo; then reverse.\n%\n% m.10 C#5-B4-B4-G#4. A major area (IV in E). 4 beats.\n% Concert: S1=C#5-B4-B4-G#4, S2=E4-E4-E4-D#4, A1=C#4-B3-B3-B3, A2=A3-G#3-G#3-G#3,\n%          T1=A2-G#2-G#2-B2(written A-G-G-B), T2=E2... E2 below T2 min G2; use G2 instead.\n%          T2=G2-G2-G2-G2(written G-G-G-G, sustained). Actually add some motion: G2-E3-E3-G2.\n%          T2 written G-e-e-G. Visual T1>T2: A(A3)>G(G#3)\u2713, G(G#3) vs e(E4)... G<e visually!\n%          Fix T1 beat2: raise to e(E3 concert, written e=E4). T2 beat2 stays e(E3 written = E4 visual). T1=T2 on E4 visual = unison! Not allowed between T1 and T2 consecutively.\n%          Simplify: T1=A-G-G-B(written), T2=E-E-E-G(written, E3 visual < A3 visual \u2713).\n%          E(E3 visual) sounds E2 concert. T2 min G2; E2 < G2. Still out of range.\n%          T2 lowest ok written note = G (G3 visual = G#2 concert = G2+semitone... G2 concert = G3 visual for T2).\n%          So T2 written: G-G-G-G all (G#2 concert, G3 visual). T1 written: A-G-G-B.\n%          Visual: A(A3)>G(G3)\u2713, G(G3)=G(G3) UNISON \u2014 not consecutive with a different beat, just simultaneous; T1=T2=G3 visual on beats 2-3 = unison. Per rules T1+T2 may share unisons occasionally. OK.\n%          Actually I should avoid consecutive unisons (beat2 and beat3 both unison = consecutive). Fix T1 beat3: use b(B2 concert, written B=B3 visual > G3 visual \u2713).\n%          T1 written: A-G-B-B. T2 written: G-G-G-G. Visual: A>G\u2713, G=G(unison beat2), B>G\u2713, B>G\u2713. One unison (beat2), then apart. Acceptable.\n% Bar=A2-E2-E2-B2. B1=A2-E2-E2-E2.\n[V:1] c B2 G |\n[V:2] E E2 D |\n[V:3] C B,2 B, |\n[V:4] A, G,2 G, |\n[V:5] e G B2 |\n[V:6] G G2 G |\n[V:7] A, E,2 B, |\n[V:8] A, E,2 E, |\n%\n% m.11 G#4-F#4-E4-E4 soprano. Stepwise descent. All diatonic.\n% DIATONIC FIX: original S2V2 bass had ^B,, (B# = C natural) and /=B,,/ (B natural).\n%   Both non-diatonic in E major. V8 (Bass I) replacement: B,-C,-B,-B, (all diatonic).\n% Concert: S2=D#4-D#4-D#4-C#4, A1=B3-A3-G#3-G#3, A2=G#3-F#3-E3-E3,\n%          T1=B2-A2-G#2-G#2(written B-A-G-G), T2=G#2-G#2-G#2-G#2(written G-G-G-G),\n%          Bar=B2-B2-C#3-C#3, B1=B2-B2-C#2-C#2\n% Visual T1>T2: B(B3)>G(G#3)\u2713, A(A3)>G(G#3)\u2713, G(G#3)=G(G#3) unison beat3&4.\n%   Avoid consecutive unisons: T1 beat4 = B(B2 concert, written B=B3 visual). T2 stays G.\n%   T1 written: B-A-G-B. Visual: B>G\u2713, A>G\u2713, G=G(unison beat3), B>G\u2713. One unison \u2713.\n[V:1] G3/2 F/ E E |\n[V:2] D3/2 D/ D C |\n[V:3] B,3/2 A,/ G, G, |\n[V:4] G,3/2 F,/ E, E, |\n[V:5] B3/2 A/ G B |\n[V:6] G3/2 G/ G G |\n[V:7] B,3/2 B,/ C, C, |\n[V:8] B,3/2 B,/ C, C, |\n%\n% m.12 F#4-E4 half (3-beat bar). A minor cadence area.\n% DIATONIC FIX: original S1V2 had C =C2 (C natural, non-diatonic).\n%   V2 (S2) replacement: D-B, (D#4-B3, both diatonic in E major).\n% Concert: S1=F#4-E4-E4, S2=D#4-B3-B3, A1=A3-A3-A3(sustained), A2=F#3-E3-E3,\n%          T1=F#3-E3-E3(written f-e-e), T2=D#3-C#3-C#3(written d-c-c),\n%          Bar=A2-A2-A2, B1=A2-A2-A2\n% Visual T1>T2: f(F#4)>d(D#4)\u2713, e(E4)>c(C#4)\u2713.\n[V:1] F !fermata!E2 |\n[V:2] D B,2 |\n[V:3] A, !fermata!A,2 |\n[V:4] F, !fermata!E,2 |\n[V:5] f !fermata!e2 |\n[V:6] d !fermata!c2 |\n[V:7] A, !fermata!A,2 |\n[V:8] A, !fermata!A,2 |\n%\n% m.13 E4-E4 half (3-beat bar). E major re-established.\n% DIATONIC FIX: original S1V2 had =C (C natural, non-diatonic).\n%   V2 (S2) replacement: C-B, (C#4-B3, diatonic).\n% Concert: S1=E4-E4-E4, S2=C#4-B3-B3, A1=B3-B3-B3, A2=G#3-G#3-G#3,\n%          T1=B2-B2-B2(written B-B-B), T2=G#2-G#2-G#2(written G-G-G),\n%          Bar=E2-E2-E2, B1=E2-E2-E2\n[V:1] E !fermata!E2 |\n[V:2] C B,2 |\n[V:3] B, !fermata!B,2 |\n[V:4] G, !fermata!G,2 |\n[V:5] B !fermata!B2 |\n[V:6] G !fermata!G2 |\n[V:7] E, !fermata!E,2 |\n[V:8] E, !fermata!E,2 |\n%\n% m.14 B3 quarter + B3 dotted half (4 beats total). Dominant pedal before final verse.\n% S2 range min = A3. Original alto had F#3 (below S2 range) \u2014 replaced with A3 sustained.\n% Concert: S1=B3-B3, S2=A3-A3, A1=F#3-D#3, A2=D#3-B2... B2=B, is below A2 min D3.\n%   A2 min D3 (D,). B2=B, < D3. Fix A2: stay on D#3 (D,) throughout.\n% T1 concert: F#3-D#3(written f-d3). T2 concert: D#3-B2(written d-B3).\n%   Visual: f(F#4)>d(D#4)\u2713, d(D#4)>B(B3)\u2713.\n% Bar=B2-B2, B1=B2-B2.\n[V:1] B, B,3 |\n[V:2] A, A,3 |\n[V:3] F, D,3 |\n[V:4] D, D,3 |\n[V:5] f d3 |\n[V:6] d B3 |\n[V:7] B, B,3 |\n[V:8] B, B,3 |\n%\n% \u2500\u2500\u2500 Section A' (sintro-eintro repeat) \u2500\u2500\u2500\n%\n% m.15 Pickup (2 beats). E4-A4. Tutti re-entry, building energy.\n% Concert: S1=E4-A4, S2=C#4-E4, A1=G#3-C#4, A2=E3-A3,\n%          T1=E3-E3(written e-e), T2=C#3-C#3(written c-c),\n%          Bar=E2-A2, B1=E2-A2\n[V:1] E A |\n[V:2] C E |\n[V:3] G, C |\n[V:4] E, A, |\n[V:5] e e |\n[V:6] c c |\n[V:7] E, A, |\n[V:8] E, A, |\n%\n% m.16 G#4 half + G#4-G#4. E major. Sintro mark.\n% Concert: S1=G#4-G#4-G#4, S2=(B3-E4)-E4-D#4, A1=E4-B3-B3, A2=B3-G#3-G#3,\n%          T1=(B2-E3)-E3-D#3(written (B-e)-e-d), T2=(G#2-B2)-B2-G#2(written (G-B)-B-G),\n%          Bar=E2-B2-B2, B1=E2-E2-E2\n% Visual T1>T2: (B>G\u2713, e>B\u2713), e>B\u2713, d>G\u2713.\n[V:1] G2 !sintro!G G |\n[V:2] (B, E) E D |\n[V:3] E2 B, B, |\n[V:4] B,2 G, G, |\n[V:5] (B e) e d |\n[V:6] (G B) B G |\n[V:7] E,2 B, B, |\n[V:8] E,2 E, E, |\n%\n% m.17 F#4-E4-G#4-F#4. Same shape as m.3. Dominant preparation.\n% Concert: S2=D#4-E4-D#4-D#4, A1=B3-B3-B3-A3, A2=G#3-G#3-G#3-F#3,\n%          T1=D#3-E3-D#3-D#3(written d-e-d-d), T2=B2-B2-B2-A2(written B-B-B-A),\n%          Bar=B2-C#3-B2-B2, B1=B2-C#3-B2-B2\n% Visual T1>T2: d>B\u2713, e>B\u2713, d>B\u2713, d>A\u2713.\n[V:1] F E G3/2 F/ |\n[V:2] D E D3/2 D/ |\n[V:3] B, B, B,3/2 A,/ |\n[V:4] G, G, G,3/2 F,/ |\n[V:5] d e d3/2 d/ |\n[V:6] B B B3/2 A/ |\n[V:7] B, C B,3/2 B,/ |\n[V:8] B, C B,3/2 B,/ |\n%\n% m.18 E4 whole note. Final cadence. Eintro mark. Full E major chord, wide spacing.\n% Concert: S1=E4, S2=B3, A1=G#3, A2=E3,\n%          T1=B2(written B), T2=G#2(written G), Bar=E2, B1=E2\n[V:1] E4 !eintro!|]\n[V:2] B,4 |]\n[V:3] G,4 |]\n[V:4] E,4 |]\n[V:5] B4 |]\n[V:6] G4 |]\n[V:7] E,4 |]\n[V:8] E,4 |]\n";
var user = {

</script>
