|\n[V:4]             z | z4       | z4     | z4          | z3 |\n[V:5]             G | F G A G  | (A G) G G | A A A G | A3 |\n[V:6]             E | D E F E  | (F E) E E | F F F E | F3 |\n[V:7]             C | A, B, C D | (D C) C B, | C C C B, | C3 |\n[V:8]             C, | F, E, A,/B,/ C, | (F, G,) C, B, | A,/B,/ C,/D, E, E, | A,3 |\n%% -----------------------------------------------------------\n%% PHRASE A \u2014 second statement (full 8 voices)\n%% SSAA choir enters f. S2 a diatonic third below S1.\n%% A1: independent descending-then-ascending diatonic line.\n%% A2: contrary motion to A1, stepwise in thirds below A1.\n%% Dynamic: mf\u2013f.\n%% -----------------------------------------------------------\n%%\n%% Sounding pitches for new voices:\n%%  S2: C4 | F4 E4 D4 C4 | B3(h) C4 G4 | A4 A4 G4/F4 G4 | F4(dh)\n%%    Written treble: C | F E D C | B,2 C G | A A G/F/ G | F3\n%%    Check: S2 always below S1? C4<E4 \u2713, F4<A4 \u2713, E4<G4 \u2713, D4<F4 \u2713, C4<E4 \u2713\n%%    B3(h)<D4(h) \u2713, C4<E4 \u2713, G4<B4 \u2713, A4<C5 \u2713, G4/F4<B4/A4 \u2713, G4<B4 \u2713, F4<A4 \u2713 \u2713\n%%\n%%  A1: C4 | F4 E4 D4 E4 | F4(h) E4 E4 | E4 F4 E4 D4 | E4(dh)\n%%    Written treble: C | F E D E | F2 E E | E F E D | E3\n%%    Range F3-D5: all C4-F4 \u2713\n%%    Check A1 below S2: C4=C4 UNISON on pickup! S1/S2 and A1 must not unison (S and A pairs).\n%%    \"S voices and A voices may NOT share a unison with each other.\"\n%%    Fix: A1 pickup = G3 (G, in treble). G3<C4 \u2713.\n%%    A1 revised pickup: G,\n%%\n%%  A2: A3 | A3 B3 C4 B3 | B3(h) A3 A3 | A3 B3 A3 G3 | A3(dh)\n%%    Written treble: A, | A, B, C B, | B,2 A, A, | A, B, A, G, | A,3\n%%    Range D3-B4: all G3-C4 \u2713 (G3=G, above D3=D, \u2713)\n%%    Check A2 below A1: A3<F4 \u2713, A3<E4? No: A3 is not below E4; A3<E4 means A3 is lower than E4 \u2014 yes, A3(A,)<E4(E) \u2713; B3<D4 \u2713, C4<E4... wait A2=C4 but A1=D4? No: A1 bar1 = F E D E and A2 bar1 = A, B, C B,, meaning A1 beat3=D4, A2 beat3=C4: D4>C4 ortable final chord.\n%%   Keep both as written: T1=C3, T2=A2 for final bar. No suspension needed in tenors.\n%%\n%% Bar (bass clef, E2-C4):\n%%   Sounding: C3 | G2 A2 B2 A2 | F2(h) G2 C3 | F2 G2 A2 F2 | C3(dh)\n%%   Written bass: C | G, A, B, A, | F,2 G, C | F, G, A, F, | C3\n%%   Range: F2=F, above E2=E, \u2713; C3=C \u2713 all within range \u2713\n%%\n%% B1 (bass clef, C2-A3):\n%%   Sounding: A2 | G2 F2 E2 D2 | C2(h) D2 G2 | E2 F2 G2 E2 | A2(dh)\n%%   Written bass: A, | G, F, E, D, | C,2 D, G, | E, F, G, E, | A,3\n%%   Range: all C2-G2 \u2713\n%%\n%%   Bar vs B1 check:\n%%   Pickup: C3(C) > A2(A,) \u2713\n%%   Bar bar13: G,A,B,A, vs B1: G,F,E,D, = G2>G2 beat1 UNISON!\n%%   Fix Bar beat1 bar13: use A,(A2)\u2192but then Bar=A2 < B1=G2? No: A2>G2 \u2713.\n%%   Hmm: Bar beat1=G,=G2, B1 beat1=G,=G2: unison. Baritone/B1 unison OK occasionally.\n%%   Beat 1 (strong), purpose = harmonic anchor on Am chord \u2713. Both move by step after: Bar G2\u2192A2 \u2713, B1 G2\u2192F2 \u2713.\n%%   Bar beat2: A,(A2) > F,(F2) \u2713; beat3: B,(B2) > E,(E2) \u2713; beat4: A,(A2) > D,(D2) \u2713\n%%   Bar bar14: F,2(F2 h) > C,2(C2 h) \u2713; G,(G2) > D,(D2) \u2713; C(C3) > G,(G2) \u2713\n%%   Bar bar15: F,(F2) vs E,(E2): F2>E2 \u2713; G,(G2) vs F,(F2): G2>F2 \u2713; A,(A2) vs G,(G2): A2>G2 \u2713; F,(F2) vs E,(E2): F2>E2 \u2713\n%%   Bar bar16: C3(C) > A2(A,) \u2713 \u2713\n%%\n[V:1]  =c | B/c/ d c B | A2 B E | F E D G | E3 |]\n[V:2]  A  | G/A/ B A G | F2 G C | D C B, E | C3 |]\n[V:3]  E  | D E F E   | C2 D G, | B, A, G, C | A,3 |]\n[V:4]  C  | B, C D C  | A,2 B, E, | G, F, E, A, | F,3 |]\n[V:5]  E  | D E F E   | C2 D E | D C B, B, | C3 |]\n[V:6]  C  | B, C D C  | A,2 B, C | B, A, G, A, | A,3 |]\n[V:7]  C  | G, A, B, A, | F,2 G, C | F, G, A, F, | C3 |]\n[V:8]  A, | G, F, E, D, | C,2 D, G, | E, F, G, E, | A,3 |]\n";
