var abc_src = "X:172\nT:Blind Bartimaeus\nT:(SSAATTBB arrangement)\nC:Words: Henry Wadsworth Longfellow, alt, 1842.\nC:Music: 'Fillmore' Jeremiah Ingalls (1764-1828). Setting: \"The Methodist Hymnal\", 1905.\nC:SSAATTBB arrangement by Claude Sonnet 4.6, 2026.\nC:copyright: public domain. This score is a part of the Open Hymnal Project, 2012 Revision.\nM:3/4\nL:1/4\nQ:1/4=100\n%%staves {(V:1 V:2) (V:3 V:4) (V:5 V:6) (V:7 V:8)}\nV:1 name=\"Soprano I\"  clef=treble\nV:2 name=\"Soprano II\" clef=treble\nV:3 name=\"Alto I\"     clef=treble\nV:4 name=\"Alto II\"    clef=treble\nV:5 name=\"Tenor I\"    clef=treble middle=B3 transpose=-12\nV:6 name=\"Tenor II\"   clef=treble middle=B3 transpose=-12\nV:7 name=\"Baritone\"   clef=bass\nV:8 name=\"Bass I\"     clef=bass\nK:F\n%\n% -----------------------------------------------------------------------\n% PICKUP + BARS 1\u20136\n% Texture: S1 S2 A1 T1 Bar B1 (6 voices; A2 and T2 enter at bar 4)\n% Harmony:  Pickup=I  Bar1=I  Bar2=V  Bar3=V  Bar4=V  Bar5=I  Bar6=I\n% -----------------------------------------------------------------------\n%\n% S1 (soprano, original melody, F major \u2014 all diatonic, no accidentals needed)\n[V:1] F | (A3/2 G/) F | G2 A | G2 F | G2 A | c2 c | (c d) c |\n%\n% S2 (diatonic 3rd below S1: F\u2192D, A\u2192F, G\u2192E, D\u2192Bb, A\u2192F, C\u2192A, D\u2192Bb)\n[V:2] D | (F3/2 E/) D | E2 F | E2 D | E2 F | A2 A | (A B) A |\n%\n% A1 (melodic alto line, diatonic, F3\u2013D5 range; enters bar 1)\n% Bar1: C4 Bb3 A3 (inner voice descent, F major)\n% Bar2: G3 A3 G3 (V chord \u2014 C E G, A1 takes G)\n% Bar3: E4 E4 D4 (V motion, resolution)\n% Bar4: E4 E4 F4 (V to I motion)\n% Bar5: C5 C5 Bb4 (I \u2014 C5 is A1 max, used for climax)\n% Bar6: C5 Bb4 A4 (I, descending)\n[V:3] z | C2 B, | B,2 A, | B,2 C | C2 C | c2 B | c2 A |\n%\n% A2 (contrary motion to A1, diatonic, D3\u2013Bb4; rests bars 1\u20133, enters bar 4)\n% Bar4: A3 G3 F3 (filling out I/V harmony below A1)\n% Bar5: F4 F4 G4 (I chord inner voice)\n% Bar6: F4 E4 F4\n[V:4] z | z3 | z3 | z3 | A,2 G, | F2 G | F2 F |\n%\n% T1 (tenor, 8vb treble, concert B2\u2013G4; written note sounds 8vb lower)\n% Written notes: concert pitch + 12st = one octave up\n% Pickup C4\u2192write c; Bar1: C4 Bb3 A3 \u2192 c B A\n% Bar2: G3 G3 A3 \u2192 G G A\n% Bar3: G3 G3 F3 \u2192 G G F\n% Bar4: G3 G3 A3 \u2192 G G A\n% Bar5: C4 C4 C4 \u2192 c c c  (climax, top of comfortable range)\n% Bar6: C4 Bb3 C4 \u2192 c B c\n[V:5] c | (c3/2 B/) A | G2 A | G2 F | G2 A | c2 c | (c B) c |\n%\n% T2 (tenor 2, 8vb treble, concert G2\u2013E4; written one octave up)\n% Rests bars 1\u20133; enters bar 4\n% Bar4: E3 E3 F3 \u2192 E E F (written, sounds E3 E3 F3)\n% Bar5: A3 A3 A3 \u2192 A A A (concert, 3rd of F chord)\n% Bar6: A3 G3 A3 \u2192 A G A\n[V:6] z | z3 | z3 | z3 | E2 F | A2 A | (A G) A |\n%\n% Baritone (bass clef, concert E2\u2013C4)\n% Harmonizes 3rd above B1 or moves independently\n% Pickup: A3 (3rd above F3)\n% Bar1: A3 G3 F3 (I, inner voice descent)\n% Bar2: E3 E3 E3 (V \u2014 C major, Bar takes 3rd = E)\n% Bar3: E3 G3 E3 (V)\n% Bar4: E3 E3 A3 (V to I)\n% Bar5: A3 A3 A3 (I)\n% Bar6: A3 Bb3 A3\n[V:7] A, | A,2 F, | E,2 E, | E,2 E, | E,2 A, | A,2 A, | A, B, A, |\n%\n% B1 (bass, original bass line transposed to range C2\u2013A3)\n% Original: F, F,2 F, | C,2 C, | C,2 D, | C,2 F, | F,2 F, | F,2 F,\n[V:8] F, | F,2 F, | C,2 C, | C,2 D, | C,2 F, | F,2 F, | F,2 F, |\n%\n% -----------------------------------------------------------------------\n% BARS 7\u201312\n% Full 8 voices throughout\n% Harmony: Bar7=I  Bar8=I  Bar9=IV(Bb)  Bar10=IV  Bar11=I  Bar12=I(pickup)\n% -----------------------------------------------------------------------\n%\n% S1 (original melody)\n[V:1]  A2 G | F2 c | d2 d | (d3/2 e/) f | c2 c | A2\n%\n% S2 (diatonic 3rd below S1)\n% A4\u2192F4, G4\u2192E4, F4\u2192D4, C5\u2192A4, D5\u2192Bb4, E5\u2192C5, F5\u2192D5, C5\u2192A4, A4\u2192F4\n[V:2]  F2 E | D2 A | B2 B | (B3/2 c/) d | A2 A | F2\n%\n% A1 (melodic inner voice, diatonic)\n% Bar7 rary motion to S1)\n% Bar20: C4 C4 D4 \u2192 c c d\n% Bar21: F4 F4 F4 \u2192 f f f (climax, 5th of I)\n% Bar22: F4 E4 F4 \u2192 f e f\n% Bar23: E4 D4 C4 \u2192 e d c (descending line leading to cadence)\n% Bar24: A3 A3 \u2192 A A\n[V:5]  e | d2 c | c2 d | f2 f | (f e) f | e2 d | c2 |]\n%\n% T2 (8vb treble; Pickup: C4\u2192c; concert G2\u2013E4)\n% Bar19: Bb3 A3 G3 \u2192 B A G\n% Bar20: A3 A3 Bb3 \u2192 A A B\n% Bar21: C4 C4 C4 \u2192 c c c (climax, root of I)\n% Bar22: C4 Bb3 A3 \u2192 c B A\n% Bar23: C4 Bb3 G3 \u2192 c B G\n% Bar24: F3 F3 \u2192 F F\n[V:6]  c | B2 A | A2 B | c2 c | (c B) A | c2 B | A2 |]\n%\n% Baritone (E2\u2013C4; Pickup: A3 = A,)\n% Bar19: E3 F3 D3 \u2192 E, F, D,\n% Bar20: E3 E3 F3 \u2192 E, E, F,\n% Bar21: A3 A3 A3 \u2192 A, A, A, (climax inner voice on 3rd of I)\n% Bar22: A3 Bb3 A3 \u2192 A, B, A,\n% Bar23: A3 G3 A3 \u2192 A, G, A,\n% Bar24: F3 F3 \u2192 F, F,\n[V:7]  A, | E,2 F, | E,2 F, | A,2 A, | A, B, A, | A,2 A, | F,2 |]\n%\n% B1 (original bass)\n[V:8]  C, | C,2 D, | C,2 F, | F,2 F, | F,2 F, | C,2 C, | F,2 |]\n";
