ion in A1 (D4\u2013C4 over G chord) resolving at bar 18.\n%   Bar 16 echoes the opening motif (stretto effect) in all outer voices.\n% ============================================================\n%\n% S1: original soprano descent, climax on B4 bar 15.\n[V:1] B A G2 | z B A D | G A (B A) | G4 |]\n%\n% S2: diatonic 3rd below S1.\n%   B\u2192G, A\u2192F#, G\u2192E(2); z, B\u2192G, A\u2192F#, D\u2192B3; G\u2192E, A\u2192F#, B\u2192G, A\u2192F#; G\u2192E(4).\n[V:2] G F E2 | z G F B, | E F (G F) | E4 |]\n%\n% A1: 4\u20133 suspension figure D4\u2192C4 resolving on bar 17 beat 2;\n%   descends to B3 at final cadence.\n[V:3] E D C2 | z E D C | B, C (D C) | B,4 |]\n%\n% A2: supporting harmony below A1; range G3\u2013B3; diatonic.\n[V:4] B, A, G,2 | z B, A, G, | G, A, B,2 | G,4 |]\n%\n% T1: concert G3,F#3,E3(2) | z,G3,F#3,D3 | E3,F#3,(G3,F#3) | G3(4).\n%     Written: G F E2 | z G F D | E F (G F) | G4.\n[V:5] G F E2 | z G F D | E F (G F) | G4 |]\n%\n% T2: concert E3,D3,B2(2) | z,E3,D3,B2 | B2,C3,D3(2) | B2(4).\n%     Written: E D B,2 | z E D B, | B, C D2 | B,4.\n[V:6] E D B,2 | z E D B, | B, C D2 | B,4 |]\n%\n% Baritone: 3rd above B1; approaching cadence.\n%   B1: G2,D2,G2(2) | z,G2,D2,B2 | C2,A2,G2,D2 | G2(4).\n%   Bar: B2,F#2,B2(2) | z,B2,F#2,D3 | E2,C3,B2,F#2 | B2(4).\n[V:7] B,, F,, B,,2 | z B,, F,, D, | E,, C, B,, F,, | B,,4 |]\n%\n% Bass I: original SATB bass; closes on G2.\n[V:8] G,, D,, G,,2 | z G,, D,, B,, | C,, A,, G,, D,, | G,,4 |]\n";
