<script>
var abc_src = "X: 1\nT: Dear Christians, One and All Rejoice\nC: Words: Martin Luther, 1523. Translated by Richard Massie, 1854, alt.\nC: Music: 'Es ist Gewisslich an der Zeit' from Klug's Geistliche Lieder, Wittenberg, 1533.\nC: Setting: Michael Praetorius, 1610; arr. SSAATTBB.\nC: copyright: public domain. Open Hymnal Project, 2009 Revision.\nM: 4/4\nL: 1/4\nQ: 1/4=110\nK: G\n%%staves {(V1 V2) (V3 V4) (V5 V6) (V7 V8)}\nV:1 name=\"Soprano I\"  clef=treble\nV:2 name=\"Soprano II\" clef=treble\nV:3 name=\"Alto I\"     clef=treble\nV:4 name=\"Alto II\"    clef=treble\nV:5 name=\"Tenor I\"    clef=treble middle=B3 transpose=-12\nV:6 name=\"Tenor II\"   clef=treble middle=B3 transpose=-12\nV:7 name=\"Baritone\"   clef=bass\nV:8 name=\"Bass I\"     clef=bass\n%\n% ============================================================\n% PHRASE A (bars 1-5) \u2014 SSAA leads, TTBB provides foundation\n% ============================================================\n%\n% BAR 1 (pickup, 3 beats: beats 2-3-4)\n% S1=G4 G4 B4 | S2=E4 E4 G4 | A1=B3 C4 B3 | A2=G3 G3 B3\n% T1=B2 C3 B2 | T2=G2 G2 B2 | Bar=G3 E3 G3 | B1=G2 E2 G2\n[V:1] z G G B |\n[V:2] x E E G |\n[V:3] x B, C B, |\n[V:4] x G, G, B, |\n[V:5] z B, C B, |\n[V:6] x G, G, B, |\n[V:7] x G, E, G, |\n[V:8] x G, E, G, |\n%\n% BAR 2 (G - D/F# - Am - D)\n% S1=A4 G4 A4 A4 | S2=F#4 E4 F#4 F#4 | A1=D4 B3 C4 D4 | A2=A3 G3 A3 A3\n% T1=D3 B2 A2 A2 | T2=B2 G2 G2 G2 | Bar=F#3 G3 E3 F#3 | B1=D2 E2 C2 D2\n[V:1] A G A A |\n[V:2] F E F F |\n[V:3] D B, C D |\n[V:4] A, G, A, A, |\n[V:5] D B, A, A, |\n[V:6] B, G, G, G, |\n[V:7] F, G, E, F, |\n[V:8] D, E, C, D, |\n%\n% BAR 3 (G - Em)\n% S1=B4 B4 G4 G4 | S2=G4 G4 E4 E4 | A1=D4 D4 E4 E4 | A2=B3 B3 C4 C4\n% T1=G2 G2 B2 B2 | T2=G2 G2 G2 G2 | Bar=B2 B2 G2 G2 | B1=G2 G2 E2 E2\n% T2 stays on G2 rather than descending below range\n[V:1] B2 G2 |\n[V:2] G2 E2 |\n[V:3] D2 E2 |\n[V:4] B,2 C2 |\n[V:5] G,2 B,2 |\n[V:6] G,2 G,2 |\n[V:7] B,2 G,2 |\n[V:8] G,2 E,2 |\n%\n% BAR 4 (G - C/E - D/F# - G)\n% S1=B4 C5 D5 B4 | S2=G4 A4 B4 G4 | A1=D4 E4 F#4 D4 | A2=B3 C4 D4 B3\n% T1=B2 G2 A2 G2 | T2=G2 G2 G2 G2 | Bar=B2 G2 A2 B2 | B1=G2 E2 F#2 G2\n[V:1] B c d B |\n[V:2] G A B G |\n[V:3] D E F D |\n[V:4] B, C D B, |\n[V:5] B, G, A, G, |\n[V:6] G, G, G, G, |\n[V:7] B, G, A, B, |\n[V:8] G, E, F, G, |\n%\n% BAR 5 (D7 - G)\n% S1=A4 A4 G4 G4 | S2=F#4 F#4 E4 E4 | A1=D4 D4 C4 C4 | A2=A3 A3 G3 G3\n% T1=G2..B2 (orig ornament) | T2=G2..G2 (stays on G2-B2)\n% Bar=F#3 F#3 G3 G3 | B1=D2 D2 G2 G2\n% Note: Bar was D,2 G,2 before = D2 D2 G2 G2 \u2014 D2 below Bar min E2. Fix to F,2 G,2\n[V:1] A2 G2 |\n[V:2] F2 E2 |\n[V:3] D2 C2 |\n[V:4] A,2 G,2 |\n[V:5] (G,/F,//E,// F,) (G,/A,/ B,) |\n[V:6] (G,/G,//G,// G,) (G,/A,/ B,) |\n[V:7] F,2 G,2 |\n[V:8] D,2 G,2 |\n%\n% ============================================================\n% PHRASE A REPEAT (bars 6-10) \u2014 full 8-voice texture\n% ============================================================\n%\n% BAR 6 (pickup repeat)\n[V:1] z G G B |\n[V:2] x E E G |\n[V:3] x B, C B, |\n[V:4] x G, A, G, |\n[V:5] z B, C B, |\n[V:6] x G, A, B, |\n[V:7] x G, E, G, |\n[V:8] x G, E, G, |\n%\n% BAR 7 (inner voices vary)\n% T2=B2 G2 G2 D3(written B, G, G, D) \u2014 D3 written = concert D2? No.\n% Written D4 in 8vb treble = concert D3. So T2: B, G, G, D = concert B2 G2 G2 D3. Fine.\n% Wait: in 8vb treble with middle=B3, the written \"D\" above the staff = D4 written = concert D3.\n% Written \"D,\" (below middle line) = D3 written = concert D2 \u2014 too low.\n% So T2 must stay G, and above to avoid going below concert G2.\n% T2: B, G, G, G, \u2014 constant G2 is dull. Better: B, G, A, A, (G2 A2 A2) \u2014 A2 is fine.\n[V:1] A G A A |\n[V:2] F E F F |\n[V:3] D C D D |\n[V:4] B, A, B, B, |\n[V:5] D B, A, A, |\n[V:6] B, G, A, A, |\n[V:7] F, G, E, F, |\n[V:8] D, E, C, D, |\n%\n% BAR 8\n[V:1] B2 G2 |\n[V:2] G2 E2 |\n[V:3] D2 E2 |\n[V:4] B,2 C2 |\n[V:5] G,2 B,2 |\n[V:6] G,2 G,2 |\n[V:7] B,2 G,2 |\n[V:8] G,2 E,2 |\n%\n% BAR 9 (A1 passing F# for melodic interest)\n[V:1] B c d B |\n[V:2] G A B G |\n[V:3] D E F E |\n[V:4] B, C D B, |\n[V:5] B, G, A, G, |\n[V:6] G, G, G, G, |\n[V:7] B, G, A, B, |\n[V:8] G, E, F, G, |\n%\n% BAR 10\n[V:1] A2 G2 |\n[V:2] F2 E2 |\n[V:3] D2 C2 |\n[V:4] A,2 G,2 |\n[V:5] (G,/F,//E,// F,) (G,/A,/ B,) |\n[V:6] (G,/G,//G,// G,) (G,/A,/ B,) |\n[V:7] F,2 G,2 |\n[V:8] D,2 G,2 |\n%\n% ============================================================\n% PHRASE B (bars 11-14) \u2014 antiphonal SSAA vs TTBB\n% ============================================================\n%\n% BAR 11 (pickup)\n% S1=B4 B4 A4 | S2=G4 G4 F#4 | A1=D4 D4 D4 | A2=B3 B3 A3\n% T1=B2 B2 C3 | T2=G2 G2 A2 | Bar=G3 E3 A3 | B1=G2 E2 A2\n[V:1] z B B A |\n[V:2] x G G F |\n[V:3] x D D D |\n[V:4] x B, B, A, |\n[V:5] z B, B, C |\n[V:6] x G, G, A, |\n[V:7] x G, E, A, |\n[V:8] x G, E, A, |\n%\n% BAR 12 (G-Am-G-C, diatonic)\n% S1=G4 F#4 G4 E4 | S2=E4 D4 E4 C4 | A1=B3 D4 B3 C4 | A2=G3 A3 G3 G3\n% T1=C3 A2 G2 G2 | T2=A2 F#2 E2 E2 -> T2 min G2, so E2 invalid\n% Fix T2 bar 12: A2 G2 G2 G2 (written A, G, G, G,)\n% Bar=E3 F#3 G3 E3 | B1=C2 D2 E2 C2\n[V:1] G F G E |\n[V:2] E D E C |\n[V:3] B, D B, C |\n[V:4] G, A, G, G, |\n[V:5] C A, G, G, |\n[V:6] A, G, G, G, |\n[V:7] E, F, G, E, |\n[V:8] C, D, E, C, |\n%\n% BAR 13 (D half cadence + pickup)\n% S1=D4 D4 rest D4 | S2=B3 B3 rest B3 | A1=F#3 F#3 rest F#3 | A2=A3 A3 rest A3\n% T1=A2 A2 rest A2 (written A, A, z A,) | T2=D3 D3 rest D3 (written D D z D)\n% Bar=A2 A2 rest A2 (written A, A, z A,) | B1=D2 D2 rest D2 (written D, D, z D,)\n% Note: T1 written A, = concert A2 (within T1 range B2-G4). Wait, A2 < B2. Min T1 is B2!\n% Fix T1: D3 D3 rest D3 (written D D z D = concert D3). That's comfortable.\n% T2: A2 A2 rest A2 (written A, A, z A,) \u2014 concert A2 is within T2 range (G2-E4). Fine.\n[V:1] D2 z D |\n[V:2] B,2 z B, |\n[V:3] F2 z F |\n[V:4] A,2 z A, |\n[V:5] D2 z D |\n[V:6] A,2 z A, |\n[V:7] A,2 z A, |\n[V:8] D,2 z D, |\n%\n% BAR 14 (G-C-G-D heading to final phrase)\n% S1=G4 G4 G4 F#4 | S2=E4 E4 E4 D4 | A1=B3 C4 B3 A3 | A2=G3 A3 G3 F#3\n% T1=B2 C3 B2 A2 (written B, C B, A,) \u2014 A2 below T1 min. Fix to B2 C3 B2 B2 (written B, C B, B,)\n% T2=G2 A2 G2 G2 (written G, A, G, G,)\n% Bar=G3 A3 G3 D3 (written G, A, G, D,) | B1=G2 C2 G2 D2 (written G, C, G, D,)\n[V:1] G G G F |\n[V:2] E E E D |\n[V:3] B, C B, A, |\n[V:4] G, A, G, F, |\n[V:5] B, C B, B, |\n[V:6] G, A, G, G, |\n[V:7] G, A, G, D, |\n[V:8] G, C, G, D, |\n%\n% ============================================================\n% PHRASE C (bars 15-18) \u2014 climax and final cadence\n% ============================================================\n%\n% BAR 15 (G-Am-D \u2014 upswing to climax)\n% S1=G4 A4 B4 B4 | S2=E4 F#4 G4 G4 | A1=B3 C4 D4 D4 | A2=G3 A3 B3 B3\n% T1=G2 A2 B2 B2 (written G, A, B, B,) | T2=G2 G2 G2 G2 (written G, G, G,2)\n%   \u2014 T2 stays on G2 pedal while T1 climbs\n% Bar=E3 F#3 G3 G3 (written E, F, G, G,) | B1=G2 A2 B2 B2 (written G, A, B, B,)\n% Bar and B1 move in contrary to T1 and T2 for voice independence\n[V:1] G A B2 |\n[V:2] E F G2 |\n[V:3] B, C D2 |\n[V:4] G, A, B,2 |\n[V:5] G, A, B,2 |\n[V:6] G, G, G,2 |\n[V:7] E, F, G,2 |\n[V:8] G, A, B,2 |\n%\n% BAR 16 (G-Em-D-G \u2014 CLIMAX; sintro marker; original alto ^D replaced with D)\n% S1=G4 G4 B4 C5 | S2=E4 E4 G4 A4 | A1=B3 E4 D4 A4 | A2=G3 C4 B3 F#3\n% T1=G2 B2 B2 E3 (written G, B, B, E) | T2=E2 G2 G2 C3 (written E, G, G, C)\n%   T2 beat 1: E, written = concert E2. T2 min is G2. Fix to G,\n% T2 corrected: G, G, G, C (concert G2 G2 G2 C3)\n% Bar=E3 E3 G3 A3 (written E, E, G, A,) | B1=E2 E2 G2 A2 (written E, E, G, A,)\n% Bar and B1 share same notes \u2014 differentiate:\n%   Bar=E3 G3 G3 A3 (written E, G, G, A,)\n%   B1=E2 E2 G2 A2 (written E, E, G, A,)\n[V:1] !sintro! G2 B c |\n[V:2] E2 G A |\n[V:3] (B, E) D A |\n[V:4] (G, C) B, F |\n[V:5] G, B,2 E |\n[V:6] G, G, G, C |\n[V:7] E, G, G, A, |\n[V:8] E, E, G, A, |\n%\n% BAR 17 (D-G-D \u2014 penultimate)\n% S1=D5 B4 A4 A4 | S2=B4 G4 F#4 F#4 | A1=A4 G4 F#4 E4 | A2=F#4 E4 D4 C4\n% T1=D3 D3 D3 D3 (written D D D2) | T2=B2 B2 A2 A2 (written B, B, A,2)\n% Bar=A3 B3 F#3 F#3 (written A, B, F,2) | B1=F#2 G2 D2 D2 (written F, G, D,2)\n[V:1] d B A2 |\n[V:2] B G F2 |\n[V:3] A G (F E) |\n[V:4] F E (D C) |\n[V:5] D D D2 |\n[V:6] B, B, A,2 |\n[V:7] A, B, F,2 |\n[V:8] F, G, D,2 |\n%\n% BAR 18 (Final G major \u2014 full ensemble, eintro marker)\n% S1=G4 | S2=D4 | A1=B3 | A2=G3\n% T1=D3 (written D4) | T2=B2 (written B3=B,)\n% Bar=G2 (written G,) | B1=G2 (written G,)\n% Bar/B1 share G2 \u2014 permitted cadential unison for bass grounding\n[V:1] G4 !eintro! |]\n[V:2] D4 |]\n[V:3] B,4 |]\n[V:4] G,4 |]\n[V:5] D4 |]\n[V:6] B,4 |]\n[V:7] G,4 |]\n[V:8] G,4 |]\n";
var user = {
  img_out: function(str) { document.getElementById("music").innerHTML += str; },

};
var abc = new abc2svg.Abc(user);
abc.tosvg("score", abc_src);
</script>
