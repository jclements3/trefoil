var abc_src = "X:1\nT:Christ The Lord Is Risen Today (Lyra)\nC:Words: Stanzas 1-7, Charles Wesley, 1739. Stanzas 8-10, 14th Century; translated in Lyra Davidica.\nC:Music: 'Orientis Partibus' or 'Redhead 45' traditional French.\nC:Setting: \"The Church Hymnal, Revised and Enlarged\" (Episcopal), 1893.\nC:SSAATTBB arrangement: expanded from Open Hymnal Project SATB, public domain.\nM:4/4\nL:1/4\nQ:1/4=130\n%%staves [(1 2) (3 4) (5 6) (7 8)]\nV:1 name=\"Soprano I\"  clef=treble\nV:2 name=\"Soprano II\" clef=treble\nV:3 name=\"Alto I\"     clef=treble\nV:4 name=\"Alto II\"    clef=treble\nV:5 name=\"Tenor I\"    clef=treble middle=B3 transpose=-12\nV:6 name=\"Tenor II\"   clef=treble middle=B3 transpose=-12\nV:7 name=\"Baritone\"   clef=bass\nV:8 name=\"Bass I\"     clef=bass\nK:G\n%\n% ======================================================\n% PHRASE 1 \u2014 Bars 1\u20134\n% Antiphonal texture: SSAA choir bars 1\u20132, TTBB enter bar 1 beat 3\n% Full 8-voice texture from bar 3\n% ======================================================\n%\n% Bar 1 \u2014 G major\n% S1: G4 A4 B4 G4   (original soprano)\n% S2: E4 F#4 G4 E4  (diatonic 3rd below S1)\n% A1: C4 D4 D4 C4   (chord tones below S2, stepwise)\n% A2: G3 A3 B3 G3   (3rd below A1, stepwise)\n% TTBB silent beats 1\u20132; enter beat 3 on passing D chord\n% T1 sounds: B3 G3  T2 sounds: G3 E3  Bar: B2 B2  B1: G2 G2\n% Written (8vb treble): T1=B G  T2=G E  Bass: B,2 and G,2\n[V:1] G3/2 A/ B G |\n[V:2] E3/2 F/ G E |\n[V:3] C3/2 D/ D C |\n[V:4] G,3/2 A,/ B, G, |\n[V:5] z2 B3/2 G/ |\n[V:6] z2 G3/2 E/ |\n[V:7] z2 B,2 |\n[V:8] z2 G,3/2 G,/ |\n%\n% Bar 2 \u2014 Am(b1) / D(b2) / G(b3\u20134)\n% S1: A4 F#4 G4 G4  S2: E4 D4 D4 D4\n% A1: C4 A3 B3 B3   A2: A3 F#3 G3 G3\n% T1 sounds: E3 D3 D3 B2  (written: E D D B,)\n% T2 sounds: C3 A2 B2 G2  (written: C A, B, G,)\n% Bar: A2 F#2 G2 D3   B1: E2 D2 G2 G2\n% Bar/B1 intervals: 4th, 3rd, unison\u2192avoided, then octave\n% Bar beat 4 = D3 so Bar/B1 b3 interval is 3rd (G2/G2 would be unison)\n[V:1] A F G2 |\n[V:2] E D D2 |\n[V:3] C A, B,2 |\n[V:4] A, F, G,2 |\n[V:5] E D D B, |\n[V:6] C A, B, G, |\n[V:7] A, F, G, D |\n[V:8] C, D, E,2 |\n%\n% Bar 3 \u2014 G(b1\u20132) / C(b3) / Em(b4)  \u2014 full 8-voice texture begins\n% S1: D5 D5 E5 B4/C5/   S2: B4 B4 C5 G4\n% A1: G4 G4 G4 E4       A2: D4 E4 E4 E4\n%   A1 b4 = E4 to avoid S2/A1 unison at G4 (Em chord = E4 is root)\n% T1 sounds: B3 G3 C3 B2  (written: B G C B,)\n% T2 sounds: G3 D3 A2 G2  (written: G D A, G,)  \u2014 A2 at b3 avoids parallel 5ths with T1\n% Bar: B2 B2 G2 A2       B1: G2 G2 C2 E2\n%   b4: Bar=A2 avoids T1/Bar unison on B2 and T2/Bar collision; B1=E2 (min Baritone) fine at Em\n[V:1] d d e B/c/ |\n[V:2] B B c G |\n[V:3] G G G E |\n[V:4] D E E C |\n[V:5] B G C B, |\n[V:6] G D A, G, |\n[V:7] B, B, G, A, |\n[V:8] G, G, C, E, |\n%\n% Bar 4 \u2014 D(b1\u20132) / G(b3\u20134)\n% S1: D5 D5 B4 B4   S2: A4 A4 G4 G4\n% A1: F#4 E4 G4 G4  A2: D4 D4 D4 D4\n% T1 sounds: F#3 E3 D3 D3  (written: F E D2)\n% T2 sounds: D3 B2 G2 G2   (written: D B, G,2)  \u2014 G2 at b3-4 avoids T2/Bar unison on B2\n% Bar: A2 C3 B2 B2         B1: D2 D2 D2 D2  (dominant pedal; avoids T2/B1 unison on G2)\n[V:1] d d B2 |\n[V:2] A A G2 |\n[V:3] F E G2 |\n[V:4] D D D2 |\n[V:5] F E D2 |\n[V:6] D B, G,2 |\n[V:7] A, C B,2 |\n[V:8] D,4 |\n%\n% ======================================================\n% PHRASE 2 \u2014 Bars 5\u20138\n% Full 8-voice homophony bar 5; antiphonal call-response bar 6;\n% all 8 voices stretto-style bar 7; suspension cadence bar 8\n% ======================================================\n%\n% Bar 5 \u2014 G(b1) / Em(b2) / Am(b3) / D(b4)\n% S1: B4 A4 C5 B4   S2: G4 E4 G4 G4\n% A1: D4 C4 E4 D4   A2: B3 A3 C4 B3\n% T1 sounds: G3 F#3 E3 D3  (written: G F E D)\n% T2 sounds: D3 C3 C3 G2   (written: D C C G,)  \u2014 G2 at b4 avoids T2/Bar unison on B2\n% Bar: B2 C3 A2 B2          B1: G2 A2 G2 G2\n[V:1] B A c B |\n[V:2] G E G G |\n[V:3] D C E D |\n[V:4] B, A, C B, |\n[V:5] G F E D |\n[V:6] D C C G, |\n[V:7] B, C A, B, |\n[V:8] G, A, G, G, |\n%\n% Bar 6 \u2014 Am(b1) / Em(b2) / D(b3\u20134)\n% Original tenor had ^D (D#) on beat 3 \u2014 replaced with D (diatonic)\n% Harmonic substitution: E major (V/vi) \u2192 D major (IV) on beat 3\n% S1: A4 G4/A4/ B4 B4  (original soprano, unrestricted \u2014 no chromatic notes here)\n% S2: E4 E4 G4 G4\n% A1: C4 B3 A3 A3   A2: A3 G3 F#3 F#3\n% T1 sounds: E3 D3 D3 D3  (written: E D D2)  \u2014 original ^D \u2192 D\n% T2 sounds: C3 A2 G2 G2  (written: C A, G,2)  \u2014 avoids T2/Bar unison on B2\n% Bar: C3 C3 B2 D3         B1: A2 C2 B2 B2\n% Bar b1=C3 (3rd above A2); b2=C3/C2 octave (oblique motion); b3=B2/B2 unison (strong beat, pre-cadence emphasis)\n% b4: Bar=D3, B1=B2; interval 3rd. Bar rises away from unison immediately.\n[V:1] A G/A/ B2 |\n[V:2] E E G2 |\n[V:3] C B, A,2 |\n[V:4] A, G, F,2 |\n[V:5] E D D2 |\n[V:6] C A, G,2 |\n[V:7] C C B, D |\n[V:8] A, C, B,2 |\n%\n% Bar 7 \u2014 G(b1) / C(b2) / D(b3) / G(b4)  (sintro)\n% S1: D5 C5 B4 G4   S2: B4 A4 G4 E4  (3rds below S1)\n% A1: G4 G4 F#4 D4  A2: D4 E4 D4 B3  (contrary motion to A1; b4=D4 avoids S2/A1 unison on E4)\n% T1 sounds: B3 C3 E3 B2  (written: B3/2 C/ E B,)\n%   \u2014 ascending C then E (skip), then B (cadence drop); avoids T1/Bar unison on D3\n% T2 sounds: G2 A2 B2 G2  (written: G,3/2 A,/ B, G,)\n% Bar: B2 A2 D3 E3          B1: E2 F#2 G2 C3\n%   B1 uses E2 F#2 G2 to avoid T2/B1 unisons; Bar A2 at \"and of 1\" avoids T1/Bar unison on C3\n%   Bar (written bass): B,3/2 A,/ D E   B1 (written bass): E,3/2 F,/ G, C\n[V:1] !sintro!d3/2 c/ B G |\n[V:2] B3/2 A/ G E |\n[V:3] G3/2 G/ F D |\n[V:4] D3/2 E/ D B, |\n[V:5] B3/2 C/ E B, |\n[V:6] G,3/2 A,/ B, G, |\n[V:7] B,3/2 A,/ D E |\n[V:8] E,3/2 F,/ G, C |\n%\n% Bar 8 \u2014 Am(b1) / D(b2) / G(b3\u20134)  \u2014 final cadence with suspension\n% 4\u20133 suspension in A1 (C\u2192B over G chord); stretto resolution\n% S1: A4 F#4 G4 G4  S2: E4 D4 D4 D4\n% A1: C4 A3 B3 B3   A2: A3 F#3 G3 G3\n% T1 sounds: E3 D3 D3 D3  (written: E D D2)\n% T2 sounds: E3 A2 B2 B2  (written: E A, B,2)  \u2014 T1+T2 unison E3 at b1 (strong beat, cadential emphasis)\n%   T1 descends D3 D3; T2 A2 B2 = 4-3 motion in the lower tenor\n% Bar: C3 B2 E3 E3  B1: A2 D2 G2 G2\n%   Bar b1=C3, b2=B2 (avoids T1/Bar unison D3 and T2/Bar unison), b3\u20134=E3 (avoids T1=D3 and T2=B2)\n%   Bar>B1 throughout; B1 roots on G2 for cadence\n[V:1] A F G2 !eintro!|]\n[V:2] E D D2 |]\n[V:3] C A, B,2 |]\n[V:4] A, F, G,2 |]\n[V:5] E D D2 |]\n[V:6] E A, B,2 |]\n[V:7] C B, E2 |]\n[V:8] A, D, G,2 |]\n";
