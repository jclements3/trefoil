e Bb -> Eb, with suspension)\n% Original: F3/4 G// =A/ B3/2 !eintro! (S), E3/4 E// E/ D3/2 (A), =A,3/4 B,// C/ B,3/2 (T), F,3/4 F,// F,/ B,,3/2 (B)\n% S1 note: =A (A natural) is the only accidental \u2014 S1 may sing it freely \u2713\n% T original: =A, (Ab3 natural = A3) \u2014 inner voice accidental, REPLACE.\n%   Original tenor bar 16: An3[q.] Bb3[16th] C4[8th] Bb3[q.]\n%   Replace An3 with Ab3 (nearest diatonic below A natural; Ab is the Eb-key 4th degree):\n%   New T1: Ab3[q.] Bb3[16] C4[8] Bb3[q.] \u2192 written: Ab4 Bb4 C5 Bb4\n%   Written T1: A4(=Ab4) 3/4, B4// C5/ B4 3/2\n%   This is scale degrees 4-5-6-5 in Eb = beautiful resolution \u2713\n% A original: E4[q.] E4[16] E4[8] D4[q.] \u2014 all diatonic \u2713 (Eb4 Eb4 Eb4 D4)\n% B original: F3[q.] F3[16] F3[8] Bb2[q.] \u2014 F3 and Bb2 diatonic \u2713\n%\n% Splitting:\n%   S1=F4[q.] G4[16] An4[8] Bb4[q.] (original soprano with =A natural \u2190 S1 accidental \u2713)\n%   S2=D4[q.] E4[16] F4[8] G4[q.] (diatonic line: D4 Eb4 F4 G4 = scale 1-2-3-4 of Bb?\n%     Actually in Eb major context: D4(7th) Eb4(1st) F4(2nd) G4(3rd)\n%     S2 must be diatonic (no A natural). S2 third below S1: F4 below = D4, G4 below = E4(=Eb4),\n%     An4 below diatonically = F4 or Eb4. Let's use: S2 = D4 Eb4 F4 G4 (stepwise \u2713, no accidentals \u2713)\n%     That is: D3/4 E// F/ G3/2 in ABC (D=D4, E=Eb4, F=F4, G=G4)\n%   A1=Bb3[q.] C4[16] D4[8] C4[q.] (third below S2, diatonic: Bb3 C4 D4 C4)\n%     Actually let A1 follow original alto: Eb4 Eb4 Eb4 D4 \u2192 A,3/4 style:\n%     A1=Eb4[q.] Eb4[16] Eb4[8] D4[q.] = E3/4 E// E/ D3/2 \u2713 diatonic\n%   A2=C4[q.] C4[16] C4[8] Bb3[q.] (third below A1: Eb4->C4, D4->Bb3 \u2713)\n%     A2: C3/4 C// C/ B,3/2\n%   T2 = third below T1(wr): F4[q.] G4[16] A4[8] G4[q.] written (=F3 G3 Ab3 G3 concert)\n%     T2(wr): F3/4 G// A/ G3/2\n%   Bar=third above B1: F3 above = Ab3(=A, in ABC), above F3 = Ab3, above Bb2 = D3\n%     Bar: A,3/4 A,// A,/ D,3/2? That jumps too much.\n%     Bar stepwise: A,3/4 A,/
