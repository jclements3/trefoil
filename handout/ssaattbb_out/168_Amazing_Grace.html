:6] G2 B |\n[V:7] B,,2 D, |\n[V:8] G,,2 G,,/B,,/ |\n%\n% ---- Bar 6: G then D7 ----\n% Same as bar 2\n[V:1] B2 A |\n[V:2] G2 F |\n[V:3] E2 D |\n[V:4] B,2 G, |\n[V:5] B2 A, |\n[V:6] G2 E |\n[V:7] D,2 F, |\n[V:8] D,2 C, |\n%\n% ---- Bar 7: Sustained D5 -- climax, full 8, all tied ----\n% S1=D5, B1=B2. Spread: D5-B4-E4-B3-D4-B3-D3-B2\n% A1=E4 (suspended 4th/9th over bass, resolves bar 8->D4)\n% T1snd=D4, T2snd=B3\n% Bar=D3, B1=B2\n% Check: T1=D4 vs Bar=D3: different. T2=B3 vs B1=B2: different. T2=B3 vs Bar=D3: ok.\n[V:1] d3- |\n[V:2] B3- |\n[V:3] E3 |\n[V:4] B,3- |\n[V:5] d3- |\n[V:6] B3- |\n[V:7] D,3- |\n[V:8] B,,3- |\n%\n% ---- Bar 8: G major ----\n% S1=D5(h) B4(q), S2=B4(h) G4(q)\n% A1=D4(h, resolves from E4) D4(q), A2=B3(h) B3(q)\n% T1snd=D4(h) B3(q), T2snd=B3(h) G3(q)\n% Bar=D3(h) B2(q) [3rd above B2, then 3rd above G2=B2]\n% B1=B2(h) G2(q)\n% Check: T2=B3,G3 vs Bar=D3,B2 vs B1=B2,G2 -- T2 B3!=D3,B2 ok; T2 G3!=D3,B2 ok. Clear.\n[V:1] d2 B |\n[V:2] B2 G |\n[V:3] D2 D |\n[V:4] B,2 B, |\n[V:5] d2 B |\n[V:6] B2 G |\n[V:7] D,2 B,, |\n[V:8] B,,2 G,, |\n%\n% ---- Bar 9: Running figure, antiphonal ----\n% S1=(D5 dq B4 e) D5 e B4 e, S2=(B4 dq G4 e) B4 e G4 e\n% A1=D4(h) C4(q) passing motion, A2=G3(h) B3(q)\n% TTBB: T1snd=B3(h) D4(q), T2snd=G3(h) B3(q)\n% Bar=B2(h) B2(q), B1=G2(h) G2(q)\n% Check: T2=G3,B3 vs Bar=B2 vs B1=G2 -- ok. T1=B3,D4 vs Bar=B2 vs B1=G2 -- ok.\n[V:1] (d3/2 B/) d/B/ |\n[V:2] (B3/2 G/) B/G/ |\n[V:3] D2 C |\n[V:4] G,2 B, |\n[V:5] B2 d |\n[V:6] G2 B |\n[V:7] B,,2 B,, |\n[V:8] G,,2 G,, |\n%\n% ---- Bar 10: G major ----\n% S1=G4(h) D4(q), S2=E4(h) B3(q) [S2 B3: A1=D4 so S2!=A1 ok]\n% A1=D4(h) D4(q), A2=B3(h) A3(q)\n% T1snd=B3(h) D4(q), T2snd=G3(h) B3(q)\n% Bar=D3(h) D3(q) [3rd above B2], B1=B2(h) B2(q)\n% Check: T2=G3,B3 vs Bar=D3 vs B1=B2 -- all clear.\n[V:1] G2 D |\n[V:2] E2 B, |\n[V:3] D2 D |\n[V:4] B,2 A, |\n[V:5] B2 d |\n[V:6] G2 B |\n[V:7] D,2 D, |\n[V:8] B,,2 B,, |\n%\n% ---- Bar 11: C major (IV) ----\n% S1=(E4 dq G4 e) G4 e E4 e\n% S2=(C4 dq E4 e) E4 G,,2 B,, |\n%\n% ---- Bar 13: G major ----\n% S1=G4(h) B4(e) G4(e), S2=E4(h) G4(e) E4(e)\n% A1=D4(h) B3(e) D4(e), A2=B3(h) G3(q)\n% T1snd=D4(h) B3(q) [written: d2 B], T2snd=G3 whole bar [written: G2 G]\n% B1=E3(h) D3(q), Bar=A3(h) F3(q)\n%   Check: T1=D4,B3 vs Bar=A3,F3: ok. T2=G3,G3 vs Bar=A3,F3: ok.\n%   T1=D4,B3 vs B1=E3,D3: ok. T2=G3 vs B1=E3,D3: ok. CLEAR.\n[V:1] G2 B/G/ |\n[V:2] E2 G/E/ |\n[V:3] D2 B,/D/ |\n[V:4] B,2 G, |\n[V:5] d2 B |\n[V:6] G2 G |\n[V:7] A,2 F, |\n[V:8] E,2 D, |\n%\n% ---- Bar 14: D major ----\n% S1=B4(h) A4(q), S2=G4(h) F4(q)\n% A1=E4(h) D4(q) [avoids G4=S2 unison; E is diatonic passing]\n% A2=B3(h) A3(q) [3rd below A1]\n% T1snd=D4(h) C4(q) [orig tenor D4 C4: tenor climax]\n% T2snd=B3(h) A3(q) [3rd below T1]\n% Bar=F3(h) F3(q) [3rd above D3], B1=D3(h) D3(q)\n% Check: T1=D4,C4 vs Bar=F3 vs B1=D3: T1=D4!=F3 ok, T1=C4!=F3 ok, T1=D4!=D3 ok, T1=C4!=D3 ok.\n%   T2=B3,A3 vs Bar=F3 vs B1=D3: all clear.\n[V:1] B2 A |\n[V:2] G2 F |\n[V:3] E2 D |\n[V:4] B,2 A, |\n[V:5] d2 c |\n[V:6] B2 A, |\n[V:7] F,2 F, |\n[V:8] D,2 D, |\n%\n% ---- Bar 15: G major sustained -- final cadence, all 8 ----\n% Full spread: D4-B3-B3-G3-B3-G3-B2-G2 (G major chord, complete)\n% S1=G4 (comes from A4 in bar14 stepwise), B1=G2 (final root)\n[V:1] G3- |\n[V:2] D3- |\n[V:3] B,3- |\n[V:4] G,3- |\n[V:5] B3- |\n[V:6] G3- |\n[V:7] B,,3- |\n[V:8] G,,3- |\n%\n% ---- Bar 16: final 2-beat cadence ----\n[V:1] G2 |]\n[V:2] D2 |]\n[V:3] B,2 |]\n[V:4] G,2 |]\n[V:5] B2 |]\n[V:6] G2 |]\n[V:7] B,,2 |]\n[V:8] G,,2 |]\n";
