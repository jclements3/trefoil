<script>
var abc_src = "X: 201\nT: Guide Me, O Thou Great Jehovah\nC: Words: William Williams, 1745. Translated by Peter Williams, 1771.\nC: Music: 'Cwm Rhondda' John Hughes, 1907. Setting: \"The Methodist Hymnbook\" (UK), 1933.\nC: SSAATTBB arr. for 8-voice ensemble and lever harp.\nC: copyright: public domain.\nM: 4/4\nL: 1/4\nQ: 1/4=120\n%%staves [(1 2) (3 4) (5 6) (7 8)]\nV:1 name=\"Soprano I\"  clef=treble\nV:2 name=\"Soprano II\" clef=treble\nV:3 name=\"Alto I\"     clef=treble\nV:4 name=\"Alto II\"    clef=treble\nV:5 name=\"Tenor I\"    clef=treble middle=B3 transpose=-12\nV:6 name=\"Tenor II\"   clef=treble middle=B3 transpose=-12\nV:7 name=\"Baritone\"   clef=bass\nV:8 name=\"Bass I\"     clef=bass\nK: G\n%\n% ======================================================================\n% PHRASE 1 (mm. 1-3): SSAA alone \u2014 reduced opening texture\n%   S1 = original soprano; S2 = diatonic third below;\n%   A1 = independent stepwise line; A2 = diatonic support below A1\n%   TTBB (V:5-8) silent\n% ======================================================================\n%\n% Pitch/beat plan:\n%   m1  S1: D4 E4 D4.(q+e) G4(e)  4 beats\n%       S2: B3 C4 B3.(q+e) E4(e)  third/sixth below S1\n%       A1: G3 A3 G3.(q+e) B3(e)  contrary to S2\n%       A2: G3 G3 G3.(q+e) G3(e)  sustained pedal\n%\n%   m2  S1: G4(e) F#4(e) G4(e) A4(e) B4 A4\n%       S2: E4(e) D4(e) E4(e) F#4(e) G4 F#4  \u2014 thirds below S1\n%       A1: B3    B3    D4    D4               \u2014 contrary to S1\n%       A2: G3    G3    B3    B3               \u2014 arpeggiated root/3rd\n%\n%   m3  S1: B4 G4 E4 C5\n%       S2: G4 E4 C4 A4               \u2014 thirds below S1\n%       A1: D4 C4 C4 E4               \u2014 neighbor/contrary\n%       A2: G3 G3 G3 G3               \u2014 pedal\n%\n[V:1] D E D3/2 G/ | G/F/ G/A/ B A | B G E c |\n[V:2] B, C B,3/2 E/ | E/D/ E/F/ G F | G E C A |\n[V:3] G, A, G,3/2 B,/ | B, B, D D | D C C E |\n[V:4] G, G, G,3/2 G,/ | G, G, B, B, | G, G, G, G, |\n[V:5] z4 | z4 | z4 |\n[V:6] z4 | z4 | z4 |\n[V:7] z4 | z4 | z4 |\n[V:8] z4 | z4 | z4 |\n%\n% ======================================================================\n% PHRASE 1 REPEAT (mm. 4-7): Full 8 voices enter\n%   T1 (V:5) enters with soprano melody sounding an octave below S1\n%   (canonic imitation \u2014 same written notes, transpose=-12 shifts display)\n%   T2 (V:6) = diatonic third below T1 (sounding)\n%   Baritone (V:7) = independent diatonic line above B1\n%   B1 (V:8) = original bass\n% ======================================================================\n%\n% m4  S1:B4 A4 G4(h)  S2:G4 F#4 D4(h)\n%     A1:D4 C4 B3(h)  A2:G3 A3 G3(h)\n%     T1(sounds):B3 A3 G3(h)  T2(sounds):G3 F#3 E3(h)\n%       written T1: B A G2    written T2: G F E2\n%     Bar: F#3 F#3 D3(h) [= F, F, D,2]\n%     B1: D3 D3 G2(h) [= D, D, G,,2]\n%\n% m5  S1:D4 E4 D4.(q+e) G4(e)  S2:B3 C4 B3.(q+e) E4(e)\n%     A1:D4 D4 D4.(q+e) D4(e)  A2:G3 G3 G3.(q+e) G3(e)\n%     T1(sounds):D3 E3 D3(q+e) G3(e) written: D E D3/2 G/\n%     T2(sounds):B2 C3 B2(q+e) E3(e) written: B, C B,3/2 E/\n%     Bar: D3 E3 D3(q+e) C3(e) [= D, E, D,3/2 C,/]\n%     B1: G2 C3 B2(q+e) A2(e) [= G,, C, B,, A,,]\n%\n% m6  S1: G4(e)F#4(e) G4(e)A4(e) B4 A4\n%     S2: E4(e)D4(e) E4(e)F#4(e) G4 F#4\n%     A1: D4 D4 D4 E4\n%     A2: B3 A3 B3 C4\n%     T1(sounds): G3(e)F#3(e) G3(e)A3(e) B3 A3  written: G/F/ G/A/ B A\n%     T2(sounds): E3(e)D3(e) E3(e)F#3(e) G3 F#3  written: E/D/ E/F/ G F\n%     Bar: D3(e)E3(e) F#3(e)G3(e) A3 A3 [= D,/E,/ F,/G,/ A, A,]\n%     B1: G2(e)A2(e) B2(e)C3(e) D3 D3 [= G,,/A,,/ B,,/C,/ D, D,]\n%\n% m7  S1: B4 C5 D5 C5(e)A4(e)\n%     S2: G4 A4 B4 A4  (S2 peaks at B4; S1 \u2265 S2: B4=B4 unison on beat 3; both move away)\n%     A1: D4 E4 F4 E4\n%     A2: G3 G3 G3 A3\n%     T1(sounds): B3 C4 D4 C4(e)A3(e) written: B c d c/A/\n%     T2(sounds): G3 A3 B3 A3  written: G A B A\n%     Bar: D3 C3 D3 E3 [= D, C, D, E,]\n%     B1: G3 E3 B2 C3 [= G, E, B,, C,]\n%     (Note: S1=S2=B4 on beat 3 of m7 \u2014 intentional unison at phrase peak)\n%\n[V:1] B A G2 | D E D3/2 G/ | G/F/ G/A/ B A | B c d c/A/ |\n[V:2] G F D2 | B, C B,3/2 E/ | E/D/ E/F/ G F | G A B A |\n[V:3] D C B,2 | D D D3/2 D/ | D D D E | D E F E |\n[V:4] G, A, G,2 | G, G, G,3/2 G,/ | B, A, B, C | G, G, G, A, |\n[V:5] B A G2 | D E D3/2 G/ | G/F/ G/A/ B A | B c d c/A/ |\n[V:6] G F E2 | B, C B,3/2 E/ | E/D/ E/F/ G F | G A B A |\n[V:7] F, F, D,2 | D, E, D,3/2 C,/ | D,/E,/ F,/G,/ A, A, | D, C, D, E, |\n[V:8] D, D, G,,2 | G,, C, B,, A,, | G,,/A,,/ B,,/C,/ D, D, | G, E, B,, C, |\n%\n% ======================================================================\n% PHRASE 2A (mm. 8-9): Full 8-voice homophony\n%   S1+T1 lead; S2+T2 harmonize thirds below; altos provide inner fill\n% ======================================================================\n%\n% m8  S1: G4 F#4 G4(h)\n%     S2: E4 D4 E4(h)   \u2014 third below S1\n%     A1: B3 C4 B3(h)   \u2014 contrary to S1\n%     A2: G3 A3 G3(h)   \u2014 below A1\n%     T1(sounds): G3 F#3 G3(h) written: G F G2\n%     T2(sounds): E3 D3 E3(h)  written: E D E2\n%     Bar: E3 D3 E3(h) [= E, D, E,2]  \u2014 above B1\n%     B1: D3 D3 G2(h) [= D, D, G,,2]\n%\n% m9  S1: A4.(q+e) B4(e) C5 A4\n%     S2: F#4.(q+e) G4(e) A4 F#4  \u2014 thirds below\n%     A1: C4.(q+e) D4(e) E4 C4   \u2014 inner line\n%     A2: A3.(q+e) B3(e) C4 A3   \u2014 below A1\n%     T1(sounds): A3(q+e) B3(e) C4 A3 written: A3/2 B/ c A\n%     T2(sounds): F#3(q+e) G3(e) A3 F#3 written: F3/2 G/ A F\n%     Bar: F#3(q+e) F#3(e) F#3(e)G3(e) A3 [= F,3/2 F,/ F,/G,/ A,]\n%     B1: D3(q+e) D3(e) D3(e)E3(e) F#3 [= D,3/2 D,/ D,/E,/ F,]\n%\n[V:1] G F G2 | A3/2 B/ c A |\n[V:2] E D E2 | F3/2 G/ A F |\n[V:3] B, C B,2 | C3/2 D/ E C |\n[V:4] G, A, G,2 | A,3/2 B,/ C A, |\n[V:5] G F G2 | A3/2 B/ c A |\n[V:6] E D E2 | F3/2 G/ A F |\n[V:7] E, D, E,2 | F,3/2 F,/ F,/G,/ A, |\n[V:8] D, D, G,,2 | D,3/2 D,/ D,/E,/ F, |\n%\n% ======================================================================\n% PHRASE 2B (mm. 10-11): Building intensity \u2014 all voices full\n% ======================================================================\n%\n% m10  S1: B4.(q+e) C5(e) .(D5 B4)   [B3/2 c/ .(d B)]\n%      S2: G4.(q+e) A4(e) .(B4 G4)   [G3/2 A/ .(B G)]\n%      A1: D4.(q+e) E4(e) .(F4 D4)   [D3/2 E/ .(F D)]\n%      A2: B3.(q+e) C4(e) .(D4 B3)   [B,3/2 C/ .(D B,)]\n%      T1(sounds): B3(q+e) C4(e) .(D4 B3) written: B3/2 c/ .(d B)\n%      T2(sounds): G3(q+e) A3(e) .(B3 G3) written: G3/2 A/ .(B G)\n%      Bar: G3(q+e) A3(e) .(B3 G3) [= G,3/2 A,/ .(B, G,)]\n%      B1: G3(q+e) D3(e) .(G3(e)A3(e) B3) [= G,3/2 D,/ .(G,/A,/ B,)]\n%\n% m11  S1: D5.(q+e) D5(e) D5(e)D5(e) D5(e)D5(e)  [d3/2 d/ d/d/ d/d/]\n%      S2: B4.(q+e) B4(e) B4(e)B4(e) B4(e)A4(e)  [B3/2 B/ B/B/ B/A/]\n%      A1: E4.(q+e) E4(e) E4(e)F4(e) E4(e)D4(e)  [E3/2 E/ E/F/ E/D/]\n%      A2: D4.(q+e) D4(e) D4(e)D4(e) D4(e)C4(e)  [D3/2 D/ D/D/ D/C/]\n%      T1(sounds): D4(q+e)D4(e) D4(e)D4(e)D4(e)D4(e) written: d3/2 d/ d/d/ d/d/\n%      T2(sounds): B3(q+e)B3(e) B3(e)B3(e)B3(e)A3(e) written: B3/2 B/ B/B/ B/A/\n%      Bar: F#3(q+e)F#3(e) F#3(e)G3(e)F#3(e)E3(e) [= F,3/2 F,/ F,/G,/ F,/E,/]\n%      B1: B3(q+e)B3(e) B3(e)G3(e)F#3(e)E3(e) [= B,3/2 B,/ B,/G,/ F,/E,/]\n%\n[V:1] B3/2 c/ .(d B) | d3/2 d/ d/d/ d/d/ |\n[V:2] G3/2 A/ .(B G) | B3/2 B/ B/B/ B/A/ |\n[V:3] D3/2 E/ .(F D) | E3/2 E/ E/F/ E/D/ |\n[V:4] B,3/2 C/ .(D B,) | D3/2 D/ D/D/ D/C/ |\n[V:5] B3/2 c/ .(d B) | d3/2 d/ d/d/ d/d/ |\n[V:6] G3/2 A/ .(B G) | B3/2 B/ B/B/ B/A/ |\n[V:7] G,3/2 A,/ .(B, G,) | F,3/2 F,/ F,/G,/ F,/E,/ |\n[V:8] G,3/2 D,/ .(G,/A,/ B,) | B,3/2 B,/ B,/G,/ F,/E,/ |\n%\n% ======================================================================\n% CLIMAX + CADENCE (mm. 12-14)\n%   S1/T1 hold D5/D4 (climax); altos descend with 4-3 suspension;\n%   Bar has 4-3 suspension over B1 root motion D-G\n% ======================================================================\n%\n% m12  S1: D5(w) [d4]\n%      S2: B4(h) A4(h) [B2 A2]  \u2014 stays below S1's D5\n%      A1: G4(1) B3(1) D4(2) [(G B, D2)]\n%      A2: D4(1) G3(1) A3(2) [(D G, A,2)]\n%      T1(sounds): D4(w) written: d4\n%      T2(sounds): B3(h) A3(h) written: B2 A2\n%      Bar: F#3(h) A3(h) [= F,2 A,2]\n%      B1: D3(1) F#3(1/2)A3(1/2) C4(2) [= (D, F,/A,/ C2)]\n%         (original bass pattern \u2014 provides V7 color, resolves to G in m14)\n%\n% m13  S1: D5.(q+e) C5(e) B4(e)D5(e) C5(e)A4(e)  [d3/2 c/ B/d/ c/A/]\n%      S2: B4.(q+e) A4(e) G4 E4  [B3/2 A/ G E]\n%      A1: G4.(q+e) F#4(e) E4 C4  [G3/2 F/ E C]\n%      A2: D4.(q+e) C4(e) B3 G3  [D3/2 C/ B, G,]\n%      T1(sounds): D4(q+e)C4(e) B3(e)D4(e)C4(e)A3(e) written: d3/2 c/ B/d/ c/A/\n%      T2(sounds): B3(q+e)A3(e) G3 E3  written: B3/2 A/ G E\n%      Bar: B3(q+e) A3(e) G3 E3  [= B,3/2 A,/ G, E,]\n%      B1: B3(q+e) A3(e) G3 C3  [= B,3/2 A,/ G, C,]\n%\n% m14  (final \u2014 G major chord; suspension resolutions)\n%      S1: G4 F#4 G4(h)  [G F G2]\n%      S2: D4 D4 D4(h)   [D D D2]   \u2014 fifth\n%      A1: D4 C4 B3(h)   [D C B,2]  \u2014 4-3 suspension resolving to B3\n%      A2: B3 A3 G3(h)   [B, A, G,2]  \u2014 descending inner line\n%      T1(sounds): G3 F#3 G3(h) written: G F G2\n%      T2(sounds): E3 D3 D3(h)  written: E D D2  \u2014 third/fifth at cadence\n%      Bar: D3 C3 D3(h)   [= D, C, D,2]  \u2014 inner suspension\n%      B1: D3 D3 G2(h)   [= D, D, G,,2]  \u2014 root at close\n%\n[V:1] d4 | !sintro!d3/2 c/ B/d/ c/A/ | G F G2 !eintro!|]\n[V:2] B2 A2 | B3/2 A/ G E | D D D2 |]\n[V:3] (G B, D2) | G3/2 F/ E C | D C B,2 |]\n[V:4] (D G, A,2) | D3/2 C/ B, G, | B, A, G,2 |]\n[V:5] d4 | d3/2 c/ B/d/ c/A/ | G F G2 |]\n[V:6] B2 A2 | B3/2 A/ G E | E D D2 |]\n[V:7] F,2 A,2 | B,3/2 A,/ G, E, | D, C, D,2 |]\n[V:8] (D, F,/A,/ C2) | B,3/2 A,/ G, C, | D, D, G,,2 |]\n";
