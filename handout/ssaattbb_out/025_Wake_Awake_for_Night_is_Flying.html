var abc_src = "X: 25\nT: Wake, Awake, for Night Is Flying\nC: Words: Phillipp Nicolai, 1599. Translated by Catherine Winkworth, 1858.\nC: Music: 'Wachet Auf' Phillipp Nicolai, 1599. Setting: \"Common Service Book\" (ULCA), 1917.\nC: SSAATTBB arrangement. Public domain source.\nS: Music source: 'Common Service Book with Hymnal', ULCA, 1917 Hymn 5.\nL: 1/4\nM: none\nQ: 1/4=160\nK: C\n%%staves {(1 2) (3 4) (5 6) (7 8)}\nV:1 name=\"Soprano I\"  clef=treble\nV:2 name=\"Soprano II\" clef=treble\nV:3 name=\"Alto I\"     clef=treble\nV:4 name=\"Alto II\"    clef=treble\nV:5 name=\"Tenor I\"    clef=treble middle=B3 transpose=-12\nV:6 name=\"Tenor II\"   clef=treble middle=B3 transpose=-12\nV:7 name=\"Baritone\"   clef=bass\nV:8 name=\"Bass I\"     clef=bass\n%\n% KEY: C major (0 accidentals). No transposition needed.\n% Harp (Eb storage): raise levers Ab->A, Eb->E, Bb->B = 3 levers raised for C major.\n% All other levers down. Valid key (within 3-flat / 4-sharp limit).\n%\n% DIATONIC SUBSTITUTIONS:\n%  Bars 2,3,5,6 Alto voice: ^F (F#) -> F natural [dominant 7th color omitted; V->v]\n%  Bars 1,4 Tenor voice: ^F, (F#) -> F, natural [same substitution]\n%  Bar 9 Tenor voice: _B, (Bb) -> B, natural [Bb passing tone -> B natural diatonic neighbor]\n%\n% BAR STRUCTURE (L=1/4, M=none):\n%  Br1=16  Br2=11.5  Br3=11.5  Br4=11.5(C4)\n%  Br5=16  Br6=11.5  Br7=9.5\n%  Br8=9.5  Br9=9.5  Br10=6\n%  Br11=12  Br12=12(final)\n%\n% Note: original lines 15-18 = Br1+Br2; lines 19-22 = Br3+Br4(=Br1repeat);\n%       lines 23-26 = Br5(=Br2repeat) + Br6(=Br2repeat,C2end);\n%       lines 27-30 = Br7+Br8+Br10(6 beats); lines 31-34 = Br11+Br12.\n%\n% =====================================================================\n% BAR 1  (16 quarter-beat measures)\n% S: C2 E2 G3 G G G (A G A2) G2\n% A: G,2 C2 D3 D E E (E D E D/C/) B,2  [^F not in this bar]\n% T: E,2 A,2 B,3 B, B, C (C G,2 F,) G,2  [^F,->F,]\n% B: C,2 A,,2 G,,3 G, E, C, (A,, B,, C, D,) G,,2\n% Texture: SSAA opens alone (bars 1 full); TTBB enters at beat 11.\n% =====================================================================\n%\n% V1 S1: as original. 2+2+3+1+1+1+(1+1+2)+2=16\n[V:1] C2 E2 G3 G G G (A G A2) G2 |\n% V2 S2: diatonic third below S1. A,2 C2 E3 E E E (F E F2) E2=16\n[V:2] A,2 C2 E3 E E E (F E F2) E2 |\n% V3 A1: independent melodic line rising to G then down. 2+2+3+1+1+1+(1+1+2)+2=16\n[V:3] E2 G2 B3 B A G (F E D2) E2 |\n% V4 A2: contrary motion to A1, below. 2+2+3+1+1+1+(1+1+2)+2=16\n[V:4] C2 E2 G3 G F E (E D C2) B,2 |\n% V5 T1: enters at beat 11 (z10). Last 6 beats: (A, G, A,2) G,2=6. 10+6=16.\n[V:5] z10 (A, G, A,2) G,2 |\n% V6 T2: enters at beat 13 (z12). Last 4 beats: G,2 E,2=4. 12+4=16.\n[V:6] z12 G,2 E,2 |\n% V7 Bar: inner voice below soprano, diatonic. 2+2+3+1+1+1+(1+2+1)+2=16\n% [^F, sub already applied; F, natural; C2 holds like original G,2]\n[V:7] E,2 A,2 B,3 B, B, C (C C2 F,) G,2 |\n% V8 B1: as original. 16\n[V:8] C,2 A,,2 G,,3 G, E, C, (A,, B,, C, D,) G,,2 |\n%\n% =====================================================================\n% BAR 2  (11.5 beats)\n% S: z/ G c G c e d e d2 G2\n% A: x/ C E D C G G G (G F) D2  [^F->F]\n% T: z/ E, G, B, G, C D C B, A,2 B,2  [C/B,/ -> separate C B,]\n% B: x/ C, C, G, E, C, B,, C, D,2 G,2\n% All 8 voices. z/+8 notes+d2+G2 = 0.5+8+2+2=12.5 for 10 items... need exactly 11.5.\n% S1: z/(0.5)+G c G c e d e(7)+d2(2)+G2(2) = 0.5+7+2+2=11.5 \u2014 but that's 9 note items!\n% So z/ + 9 notes = 0.5+9notes, where 7 single + d2 + G2 = 7+2+2=11. 0.5+11=11.5 \u2713\n% Each harmonization: z/ + 7 singles + one double + one double = 11.5.\n% =====================================================================\n%\n[V:1] z/ G c G c e d e d2 G2 |\n% S2: z/+E A E A c B c+G2+E2 \u2014 that's 7 singles = 7, +2+2=4, total 11. +0.5=11.5 \u2713\n[V:2] z/ E A E A c B c G2 E2 |\n% A1: z/+C E D C G A G+E2+D2 = 0.5+7+2+2=11.5 \u2713\n[V:3] z/ C E D C G A G E2 D2 |\n% A2: z/+A, C B, A, E F E+C2+B,2 = 0.5+7+2+2=11.5 \u2713\n[V:4] z/ A, C B, A, E F E C2 B,2 |\n% T1 (concert) D, G,,+C,4=11.5 \u2713\n[V:8] z/ C, A,, E, F, C, D, G,, C,4 |\n%\n% =====================================================================\n% BAR 5  (16 beats \u2014 repeat of Bar 1, full 8 voices from downbeat)\n% Full homophony. TTBB enters immediately for richer texture.\n% =====================================================================\n%\n[V:1] C2 E2 G3 G G G (A G A2) G2 |\n[V:2] A,2 C2 E3 E E E (F E F2) E2 |\n[V:3] E2 G2 B3 B A G (F E D2) E2 |\n[V:4] C2 E2 G3 G F E (E D C2) B,2 |\n% T1 full from downbeat: same as S1 (octave lower in concert pitch)\n[V:5] C2 E2 G3 G G G (A G A2) G2 |\n% T2: A,2 C2 E3 E E E (F E F2) E2 (parallels S2 at octave below)\n[V:6] A,2 C2 E3 E E E (F E F2) E2 |\n% Bar: as bar 1 (inner voice)\n[V:7] E,2 A,2 B,3 B, B, C (C C2 F,) G,2 |\n% B1: as bar 1\n[V:8] C,2 A,,2 G,,3 G, E, C, (A,, B,, C, D,) G,,2 |\n%\n% =====================================================================\n% BAR 6  (11.5 beats \u2014 repeat of bar 2 pattern)\n% Antiphonal: SSAA choir prominent, TTBB supporting.\n% =====================================================================\n%\n[V:1] z/ G c G c e d e d2 G2 |\n[V:2] z/ E A E A c B c G2 E2 |\n[V:3] z/ C E D C G A G E2 D2 |\n[V:4] z/ A, C B, A, E F E C2 B,2 |\n[V:5] z/ E G B G c d c A2 B2 |\n[V:6] z/ C E G E A B A F2 G2 |\n[V:7] z/ C, E, D, C, G, G, F, E,2 D,2 |\n[V:8] z/ C, C, G, E, C, B,, C, D,2 G,2 |\n%\n% =====================================================================\n% BAR 7  (9.5 beats \u2014 like bar 4 but ending on half-note C)\n% S: z/ G c G A E F D C2\n% Structure: z/ + 7 singles + C2 = 0.5+7+2=9.5 \u2713\n% Cadential motion. Suspension in T1/T2.\n% =====================================================================\n%\n[V:1] z/ G c G A E F D C2 |\n% S2: z/+E A E F C D B,+G2=9.5 \u2713\n[V:2] z/ E A E F C D B, G2 |\n% A1: z/+C E C D A, B, G,+E2=9.5 \u2713\n[V:3] z/ C E C D A, B, G, E2 |\n% A2: z/+A, C A, B, G, E, D,+C2=9.5 \u2713\n[V:4] z/ A, C A, B, G, E, D, C2 |\n% T1: z/+C E D B, G, A, F,+C,2=9.5 \u2713\n[V:5] z/ C E D B, G, A, F, C,2 |\n% T2: z/+A, C B, G, E, F, D,+A,,2=9.5 \u2713\n[V:6] z/ A, C B, G, E, F, D, A,,2 |\n% Bar: z/+E, G, F, D, B,, C, A,,+F,,2=9.5 \u2713\n[V:7] z/ E, G, F, D, B,, C, A,, F,,2 |\n% B1 original: z/+C, A,, E, F, C, D, G,,+C,2=9.5 \u2713\n[V:8] z/ C, A,, E, F, C, D, G,, C,2 |\n%\n% =====================================================================\n% BAR 8  (9.5 beats \u2014 first step-descent passage)\n% S: z/ G G3 F E D C2\n% A: x/ D E3 D C B, C2  [B, = B natural, diatonic OK]\n% T: z/ G, G,3 A, G, G, E,2\n% B: x/ B,, C,3 F, G, G,, C,2\n% Structure: z/+G+G3+F+E+D+C2 = 0.5+1+3+1+1+1+2=9.5 \u2713\n% Call-and-response: S1 descends (call); inner voices step; B1 grounds.\n% =====================================================================\n%\n[V:1] z/ G G3 F E D C2 |\n% S2: step descent third below S1: z/+E+F3+D+C+B,+A,2=9.5 \u2713\n[V:2] z/ E F3 D C B, A,2 |\n% A1: inner melody: z/+B,+C3+B,+A,+G,+E2=9.5 \u2713\n[V:3] z/ B, C3 B, A, G, E2 |\n% A2: below A1: z/+G,+A,3+G,+F,+E,+C2=9.5 \u2713\n[V:4] z/ G, A,3 G, F, E, C2 |\n% T1 (concert): original tenor: z/+G,+G,3+A,+G,+G,+E,2=9.5 \u2713\n[V:5] z/ G, G,3 A, G, G, E,2 |\n% T2: third below T1: z/+E,+F,3+D,+E,+E,+C,2=9.5 \u2713\n[V:6] z/ E, F,3 D, E, E, C,2 |\n% Bar: inner bass: z/+B,,+C,3+A,,+G,,+F,,+E,,2=9.5 \u2713\n[V:7] z/ B,, C,3 A,, G,, F,, E,,2 |\n% B1 original: z/+B,,+C,3+F,+G,+G,,+C,2=9.5 \u2713\n[V:8] z/ B,, C,3 F, G, G,, C,2 |\n%\n% =====================================================================\n% BAR 9  (9.5 beats \u2014 repeat of step-descent phrase)\n% S: z/ G G3 F E D C2\n% A: x/ E D3 C C B, C2  [B, diatonic OK]\n% T: z/ C B,3 A, G, G, E,2  [_B,->B, natural]\n% B: x/ C, G,,3 A,, C, G,, C,2\n% Stretto: T1 imitates S1 descent from one beat later.\n% =====================================================================\n%\n[V:1] z/ G G3 F E D C2 |\n[V:2] z/ E F3 D C B, A,2 |\n% A1: z/+C+D3+C+B,+A,+G,2=9.5 \u2713\n[V:3] z/ C D3 C B, A, G,2 |\n% A2: z/+A,+B,3+A,+G,+F,+E,2=9.5 \u2713\n[V:4] z/ A, B,3 A, G, F, E,2 |\n% T1: diatonic substitute for _B, -> B, natural. z/+G,+A,3+G,+F,+E,+C,2=9.5 \u2713\n[V:5] z/ G, A,3 G, F, E, C,2 |\n% T2: z/+E,+F,3+E,+D,+C,+A,,2=9.5 \u2713\n[V:6] z/ E, F,3 E, D, C, A,,2 |\n% Bar: z/+C,+D,3+C,+B,,+A,,+F,,2=9.5 \u2713\n[V:7] z/ C, D,3 C, B,, A,, F,,2 |\n% B1 original: z/+C,+G,,3+A,,+C,+G,,+C,2=9.5 \u2713\n[V:8] z/ C, G,,3 A,, C, G,, C,2 |\n%\n% =====================================================================\n% BAR 10  (6 beats)\n% S: D E F2 E2\n% A: B, C (C B,) C2\n% T: G, G, F,2 G,2\n% B: G,, C, D,2 C,2\n% 1+1+2+2=6 \u2713\n% =====================================================================\n%\n[V:1] D E F2 E2 |\n% S2: B, C D2 C2 = 6 \u2713\n[V:2] B, C D2 C2 |\n% A1: G, A, B,2 A,2 = 6 \u2713\n[V:3] G, A, B,2 A,2 |\n% A2: E, F, G,2 F,2 = 6 \u2713\n[V:4] E, F, G,2 F,2 |\n% T1 (concert): G, G, A,2 G,2 = 6 \u2713\n[V:5] G, G, A,2 G,2 |\n% T2: E, E, F,2 E,2 = 6 \u2713\n[V:6] E, E, F,2 E,2 |\n% Bar: G,, C, D,2 C,2 = 6 \u2713 (unison with B1 on cadential C \u2014 grounded, at cadence)\n[V:7] G,, C, D,2 C,2 |\n% B1 original: G,, C, D,2 C,2 = 6 \u2713\n[V:8] G,, C, D,2 C,2 |\n%\n% =====================================================================\n% BAR 11  CLIMAX (12 beats)\n% S: G2 A B c3 c e d c2\n% A: E2 F F E3 F G G E2\n% T: C2 C D C3 C C B, C2\n% B: C,2 F, D, A,3 A, G, G, C,2\n% 2+1+1+3+1+1+1+2=12 \u2713\n% S1 peaks at c (C5). Full 8-voice homophony. Maximum spread.\n% =====================================================================\n%\n[V:1] G2 A B c3 c e d c2 |\n% S2: E2 F G A3 A c B A2=2+1+1+3+1+1+1+2=12 \u2713\n[V:2] E2 F G A3 A c B A2 |\n% A1: C2 D E F3 F G F E2=12 \u2713\n[V:3] C2 D E F3 F G F E2 |\n% A2: A,2 B, C D3 D E D C2=12 \u2713\n[V:4] A,2 B, C D3 D E D C2 |\n% T1 (concert): G2 A B c3 c c B c2=12 \u2713\n[V:5] G2 A B c3 c c B c2 |\n% T2: E2 F G A3 A A G A2=12 \u2713\n[V:6] E2 F G A3 A A G A2 |\n% Bar: C,2 D, E, F,3 F, G, F, E,2=12 \u2713\n[V:7] C,2 D, E, F,3 F, G, F, E,2 |\n% B1 original: C,2 F,, D,, A,,3 A,, G,, G,, C,2=12 \u2713\n[V:8] C,2 F,, D,, A,,3 A,, G,, G,, C,2 |\n%\n% =====================================================================\n% BAR 12  FINAL CADENCE (12 beats)\n% S: G2 c G A E F D C4\n% A: E2 E E C C C B, C4\n% T: C2 C B, A, G, A, G, E,4\n% B: C,2 A,, E, F, C, F,, G,, C,4\n% 2+1+1+1+1+1+1+4=12 \u2713 (or 2+7 singles+4=13... let me recount)\n% G2=2, c=1, G=1, A=1, E=1, F=1, D=1, C4=4 = 12 \u2713 (7 items total not counting G2)\n% Actually: G2+c+G+A+E+F+D+C4 = 2+1+1+1+1+1+1+4=12 \u2713\n% 4-3 suspension: S2 D->C; A1 F->E; T2 sus4.\n% B1 ends on low C, (C2 concert).\n% =====================================================================\n%\n[V:1] !sintro!G2 c G A E F D C4 !eintro!|]\n% S2: E2+G+E+F+C+D+B,+C4=2+6+4... no: E2=2,G=1,E=1,F=1,C=1,D=1,B,=1,C4=4=12 \u2713\n[V:2] E2 G E F C D B, C4 |]\n% A1: C2+E+C+D+A,+B,+G,+E4=2+6+4=12 \u2713\n[V:3] C2 E C D A, B, G, E4 |]\n% A2: A,2+C+A,+B,+G,+G,+E,+C4=2+6+4=12 \u2713\n[V:4] A,2 C A, B, G, G, E, C4 |]\n% T1 (concert): C2+E+C+D+A,+B,+G,+E,4=12 \u2713\n[V:5] C2 E C D A, B, G, E,4 |]\n% T2: G,2+C+G,+A,+E,+F,+D,+C,4=12 \u2713\n[V:6] G,2 C G, A, E, F, D, C,4 |]\n% Bar: E,2+G,+E,+F,+C,+D,+B,,+G,,4=12 \u2713\n[V:7] E,2 G, E, F, C, D, B,, G,,4 |]\n% B1 original: C,2+A,,+E,+F,+C,+F,,+G,,+C,4=12 \u2713\n[V:8] C,2 A,, E, F, C, F,, G,, C,4 |]\n";
