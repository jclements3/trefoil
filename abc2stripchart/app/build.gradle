apply plugin: 'com.android.application'

android {
    namespace 'com.harp.stripchart'
    compileSdk 35

    defaultConfig {
        applicationId "com.harp.stripchart"
        minSdk 28
        targetSdk 35
        versionCode 1
        versionName "0.1.0"
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
}
